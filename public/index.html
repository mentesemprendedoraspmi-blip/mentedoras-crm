function renderProdTab(c,mk){
  if(!c.produccion)c.produccion={};
  if(!c.produccion[mk])c.produccion[mk]={};
  const reels=c.reels[mk]||[];
  const prod=c.produccion[mk];
  const totalSteps=PROD_STEPS.length;
  const totalDone=PROD_STEPS.filter((_,si)=>{
    const k='s'+si;if(!prod[k])return false;
    return reels.length>0&&reels.every(r=>prod[k][r.id]);
  }).length;

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="font-size:12px;color:var(--tx3)">${totalDone}/${totalSteps} pasos completos</div>
    <button class="btn btn-s btn-p" onclick="markAllProd('${c.id}','${mk}')"><i class="ti ti-checks"></i>Marcar todo ✓</button>
  </div>`;

  html+=PROD_STEPS.map((step,si)=>{
    const stepKey='s'+si;
    if(!prod[stepKey])prod[stepKey]={};
    const done=reels.filter(r=>prod[stepKey][r.id]).length;
    const allDone=done===reels.length&&reels.length>0;
    const isOpen=prod[stepKey]._open||false;
    return`<div class="prod-step">
      <div class="prod-step-hdr${isOpen?' open':''}" onclick="toggleProdStep('${c.id}','${mk}',${si})">
        <i class="ti ti-chevron-right arr"></i>
        <span class="prod-step-title">${step}</span>
        <span class="prod-step-prog" style="color:${allDone?'var(--ok)':'var(--tx3)'}">${done}/${reels.length}</span>
        ${allDone?'<i class="ti ti-circle-check" style="color:var(--ok);margin-left:6px"></i>':`<button class="btn btn-s" style="margin-left:auto;font-size:10px;padding:2px 7px" onclick="event.stopPropagation();markStepAll('${c.id}','${mk}',${si})">Todo ✓</button>`}
      </div>
      <div class="prod-step-body${isOpen?' open':''}" id="ps-${c.id}-${si}">
        ${reels.length?reels.map(r=>`<div class="prod-reel-row">
          <div class="chk${prod[stepKey][r.id]?' on':''}" onclick="toggleProdReel('${c.id}','${mk}',${si},'${r.id}')" ontouchend="event.preventDefault();toggleProdReel('${c.id}','${mk}',${si},'${r.id}')">${prod[stepKey][r.id]?'<i class="ti ti-check" style="font-size:9px;color:#fff"></i>':''}</div>
          <span style="font-size:13px;flex:1">${r.label}</span>
          ${prod[stepKey][r.id+'_d']?`<span style="font-size:10px;color:var(--tx3)">${fmtDate(prod[stepKey][r.id+'_d'])}</span>`:''}
        </div>`).join(''):'<div style="color:var(--tx3);font-size:12px;padding:8px 0">Sin reels este mes</div>'}
      </div>
    </div>`;
  }).join('');
  return html;
}

function markStepAll(cid,mk,si){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  if(!c.produccion)c.produccion={};if(!c.produccion[mk])c.produccion[mk]={};
  const k='s'+si;if(!c.produccion[mk][k])c.produccion[mk][k]={};
  const reels=c.reels[mk]||[];
  reels.forEach(r=>{c.produccion[mk][k][r.id]=true;c.produccion[mk][k][r.id+'_d']=today();});
  saveClient_doc(c);refreshProd(c,mk);showToast('Paso completado ✓','ok');
}

function markAllProd(cid,mk){
  const c=clients.find(c=>c.id===cid);if(!c)return;

}

function deleteReel(cid,mk,i){
  const c=clients.find(c=>c.id===cid);if(!c||!c.reels[mk])return;
  if(!confirm('¿Eliminar '+c.reels[mk][i]?.label+'?'))return;
  c.reels[mk].splice(i,1);
  // Renumber
  c.reels[mk].forEach((r,idx)=>{r.id=idx+1;r.label='Reel '+(idx+1);});
  switchReelMonth(cid,mk);saveClient_doc(c);showToast('Reel eliminado ✓','ok');
}
function addReelMonth(cid){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  const existing=Object.keys(c.reels).sort();
  const last=existing[existing.length-1]||monthKey();
  const[y,m]=last.split('-').map(Number);
  const next=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;
  if(c.reels[next]){showToast('Ese mes ya existe','err');return;}
  // Use numReels from contract
  const n=c.numReels||5;
  c.reels[next]=Array.from({length:n},(_,i)=>({id:i+1,label:'Reel '+(i+1),month:next,grabado:false,fechaGrab:'',editado:false,fechaEdit:'',subido:false,editor:'',notas:''}));
  switchReelMonth(cid,next);saveClient_doc(c);showToast('Mes añadido: '+monthLabel(next),'ok');
}
function addReel(cid,mk){
  const c=clients.find(c=>c.id===cid);if(!c||!c.reels[mk])return;
  const n=c.reels[mk].length+1;
  c.reels[mk].push({id:n,label:'Reel '+n,month:mk,grabado:false,fechaGrab:'',editado:false,fechaEdit:'',subido:false,editor:'',notas:''});
  switchReelMonth(cid,mk);saveClient_doc(c);showToast('Reel '+n+' añadido ✓','ok');
}
async function toggleReel(cid,mk,i,field){
  const c=clients.find(c=>c.id===cid);if(!c||!c.reels[mk])return;
  c.reels[mk][i][field]=!c.reels[mk][i][field];
  if(c.reels[mk][i][field]){
    if(field==='grabado'){
      c.reels[mk][i].fechaGrabTS=new Date().toISOString();
      const rid=c.reels[mk][i].id;
      const grabDate=c.reels[mk][i].fechaGrab||today();
      const d=new Date(grabDate+'T12:00:00');
      const editDate=new Date(d);editDate.setDate(d.getDate()+4);
      const trialDate=new Date(d);trialDate.setDate(d.getDate()+5);
      const pubDate=new Date(d);pubDate.setDate(d.getDate()+7);
      const fmt=dt=>dt.toISOString().split('T')[0];
      if(!c.reels[mk][i].fechaEdit)c.reels[mk][i].fechaEdit=fmt(editDate);
      if(!c.pubCal)c.pubCal={};
      if(!c.pubCal[mk])c.pubCal[mk]={};
      if(!c.pubCal[mk][rid])c.pubCal[mk][rid]={};
      const pd=c.pubCal[mk][rid];
      if(!pd.trial)pd.trial=fmt(trialDate);
      if(!pd.pub)pd.pub=fmt(pubDate);
      const nets=c.socialNets||['instagram'];
      if(nets.includes('tiktok')&&!pd.tiktok)pd.tiktok=fmt(pubDate);
      if(nets.includes('youtube')&&!pd.youtube)pd.youtube=fmt(pubDate);
      // Automatización: crear tarea de edición para el editor asignado a este reel
      const editorName=c.reels[mk][i].editor||(c.editors||[])[0];
      if(editorName){
        const t=createAutoTask(`✂️ Editar: ${c.reels[mk][i].label} — ${c.name}`,editorName,today(),c,{linkedClientId:c.id,linkedReelId:rid,linkedProdStep:'editado',linkedMonth:mk});
        if(t)autoAddDriveLink(boardCols.find(col=>col.name.toLowerCase()===editorName.toLowerCase()||col.name.toLowerCase().includes(editorName.toLowerCase()))?.id,t.id,c.name);
      }
    }
    if(field==='editado'&&c.cm){
      const rid=c.reels[mk][i].id;
      const pubDate=(c.pubCal?.[mk]?.[rid]?.pub)||today();
      createAutoTask(`📤 Publicar: ${c.reels[mk][i].label} — ${c.name}`,c.cm,pubDate,c,{linkedClientId:c.id,linkedReelId:rid,linkedProdStep:'subido',network:'ig',linkedMonth:mk});
      // Automatización: aviso inmediato de subir a Trial, solo si el cliente tiene Trials activados
      if(c.trialsEnabled!==false&&(c.socialNets||['instagram']).includes('instagram')){
        createAutoTask(`📲 Subir a Trial: ${c.reels[mk][i].label} — ${c.name}`,c.cm,today(),c,{linkedClientId:c.id,linkedReelId:rid,network:'trial_ig',linkedMonth:mk});
      }
    }
    if(field==='enviado')c.reels[mk][i].fechaEnviadoTS=new Date().toISOString();
  }
  switchReelMonth(cid,mk); // Instant UI feedback
  showToast('Guardado ✓','ok');
  await saveClient_doc(c); // Save only this client - fast and avoids blocking on unrelated clients
}

  c.reels[mk][i][field]=val;saveClient_doc(c);
}

function generatePubCal(cid,mk){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  const reels=c.reels[mk]||[];if(!reels.length)return showToast('Sin reels para generar','err');
  if(!c.pubCal)c.pubCal={};
  if(!c.pubCal[mk])c.pubCal[mk]={};
  const nets=c.socialNets||['instagram'];
  const peakHours=c.peakHours||{};
  const dayKeys=['D','L','M','X','J','V','S']; // JS getDay() 0=Sunday
  const[y,m]=mk.split('-').map(Number);
  const daysInMonth=new Date(y,m,0).getDate();
  const interval=Math.floor(daysInMonth/reels.length);
  reels.forEach((r,i)=>{
    const baseDay=Math.min((i+1)*interval,daysInMonth);
    const pubDateObj=new Date(y,m-1,baseDay);
    const dayKey=dayKeys[pubDateObj.getDay()];
    const pubDateStr=`${y}-${String(m).padStart(2,'0')}-${String(baseDay).padStart(2,'0')}`;
    // Peak hour minus 1 hour
    let pubTime='';
    if(peakHours[dayKey]){
      const[ph,pm2]=peakHours[dayKey].split(':').map(Number);
      const adj=Math.max(0,ph-1);
      pubTime=`${String(adj).padStart(2,'0')}:${String(pm2||0).padStart(2,'0')}`;
    }
    // Trial: 2 days before publication
    const trialDay=Math.max(1,baseDay-2);
    const trialDateStr=`${y}-${String(m).padStart(2,'0')}-${String(trialDay).padStart(2,'0')}`;
    if(!c.pubCal[mk][r.id])c.pubCal[mk][r.id]={};
    // Always overwrite
    if(nets.includes('instagram')){c.pubCal[mk][r.id].trial=trialDateStr;c.pubCal[mk][r.id].pub=pubDateStr;c.pubCal[mk][r.id].pubTime=pubTime;}
    if(nets.includes('tiktok')){c.pubCal[mk][r.id].tiktok=pubDateStr;c.pubCal[mk][r.id].tiktokTime=pubTime;}
    if(nets.includes('youtube')){c.pubCal[mk][r.id].youtube=pubDateStr;c.pubCal[mk][r.id].youtubeTime=pubTime;}
  });
  saveClient_doc(c);switchPubCalMonth(cid,mk);showToast('Calendario generado ✓','ok');
}

async function savePubDate(cid,mk,rid,field,val){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  if(!c.pubCal)c.pubCal={};
  if(!c.pubCal[mk])c.pubCal[mk]={};
  if(!c.pubCal[mk][rid])c.pubCal[mk][rid]={};
  c.pubCal[mk][rid][field]=val;
  // Auto-fill pub date 2 days after trial
  if(field==='trial'&&val&&!c.pubCal[mk][rid].pub){
    const d=new Date(val+'T12:00:00');
    d.setDate(d.getDate()+2);
    const pubDate=d.toISOString().split('T')[0];
    c.pubCal[mk][rid].pub=pubDate;
    // Same date for TikTok and YouTube if active
    const nets=c.socialNets||['instagram'];
    if(nets.includes('tiktok')&&!c.pubCal[mk][rid].tiktok)c.pubCal[mk][rid].tiktok=pubDate;
    if(nets.includes('youtube')&&!c.pubCal[mk][rid].youtube)c.pubCal[mk][rid].youtube=pubDate;
    setTimeout(()=>switchPubCalMonth(cid,mk),100);
  }
  saveClient_doc(c);
}

async function saveContract(id){
  const c=clients.find(c=>c.id===id);if(!c)return;
  const oldNum=c.numReels;
  c.numReels=parseInt(document.getElementById('co-reels').value)||5;
  c.price=parseInt(document.getElementById('co-price').value)||0;
  c.contractStart=document.getElementById('co-start').value;
  c.contractEnd=document.getElementById('co-end').value;
  c.contractType=document.getElementById('co-type').value;
  // If numReels changed, update future months
  if(oldNum!==c.numReels){
    const mk=monthKey();
    Object.keys(c.reels).forEach(m=>{
      if(m>=mk){
        const current=c.reels[m].length;
        if(current<c.numReels){
          for(let i=current;i<c.numReels;i++){
            c.reels[m].push({id:i+1,label:'Reel '+(i+1),month:m,grabado:false,fechaGrab:'',editado:false,fechaEdit:'',subido:false,editor:'',notas:''});
          }
        }else if(current>c.numReels){
          c.reels[m]=c.reels[m].slice(0,c.numReels);
        }
      }
    });
  }
  closeModal();renderProfile(c);saveClient_doc(c);showToast('Contrato actualizado ✓','ok');
}

        if(!snap)return;
        const allTasks={};
        snap.forEach(doc=>{const d=doc.data();if(d&&d.colId){if(!allTasks[d.colId])allTasks[d.colId]=[];allTasks[d.colId].push(d);}});
        // Always sync from Firebase - it's the single source of truth
        boardCols.forEach(col=>{
          const imgs={};(col.tasks||[]).forEach(t=>{if(t.images)imgs[t.id]=t.images;});
          col.tasks=(allTasks[col.id]||[]).map(t=>({...t,images:imgs[t.id]||[]}));
        });
        if(document.querySelector('.nav-item.on')?.dataset?.view==='board')renderBoard();
        const total=boardCols.reduce((s,c)=>(s+(c.tasks||[]).length),0);
        const el=document.getElementById('bbadge');if(el)el.textContent=total;
      });
    }catch(e){console.warn('board listener:',e);}
    try{
      db.collection('crm').doc('board_index').onSnapshot(snap=>{
        if(!snap||!snap.exists)return;
        const d=snap.data();if(!d||!d.cols)return;
        // Merge column structure changes (add/remove/rename/isFinal) while preserving loaded tasks
        const existingTasks={};
        boardCols.forEach(col=>{existingTasks[col.id]=col.tasks||[];});
        boardCols=d.cols.map(meta=>({...meta,tasks:existingTasks[meta.id]||[]}));
        if(document.querySelector('.nav-item.on')?.dataset?.view==='board')renderBoard();
      });
    }catch(e){console.warn('board_index listener:',e);}
    try{
      db.collection('crm_notifications').orderBy('u','desc').limit(20).onSnapshot(snap=>{
        if(!snap)return;
        const notifs=[];
        snap.forEach(doc=>notifs.push(doc.data()));
        const badge=document.getElementById('notif-badge');
        const unread=notifs.filter(n=>!n.read).length;
        if(badge)badge.textContent=unread||'';
        if(badge)badge.style.display=unread?'flex':'none';
        // Show in dash if open
        const notifEl=document.getElementById('dash-notifs');
        if(notifEl&&notifs.length){
          notifEl.innerHTML=notifs.slice(0,5).map(n=>`<div style="display:flex;gap:10px;padding:8px;background:var(--bg3);border-radius:var(--r);margin-bottom:6px;border-left:3px solid var(--c);${n.read?'opacity:0.6':''}">
            <div style="flex:1"><div style="font-size:12px;font-weight:500">${n.title}</div>${n.desc?`<div style="font-size:11px;color:var(--tx3);margin-top:2px">"${n.desc}"</div>`:''}</div>
            <button onclick="markNotifRead('${n.id}')" style="font-size:10px;background:none;border:none;color:var(--tx3);cursor:pointer;padding:0">✓</button>
          </div>`).join('');
        }
      });
    }catch(e){}
    try{
      db.collection('crm').doc('payments').onSnapshot(snap=>{
        if(snap&&snap.exists){const d=snap.data();
          if(d){if(d.list)paymentsList=d.list;if(d.cobros)cobrosList=d.cobros;}
        }
      });
    }catch(e){}
  }
}

function getBotResponse(txt,c){
  const tl=txt.toLowerCase();
  const mk=monthKey();
  const reels=c.reels[mk]||[];
  const driveMain=c.driveMain||'';
  const driveReels=(c.drive||{}).reelsEdit||'';
  const driveScripts=(c.drive||{}).scripts||'';
  const drivePics=(c.drive||{}).pictures||'';

  // IDENTIDAD / QUIÉN ERES
  if(tl.includes('quién eres')||tl.includes('quien eres')||tl.includes('qué eres')||tl.includes('que eres')||tl.includes('cómo te llamas')||tl.includes('como te llamas')){
    return`Soy el asistente virtual de **Mentedoras** 🤖✨ Creado con la inteligencia de Adri y Alan para ayudarte con todo lo relacionado con tu contenido. ¿En qué puedo ayudarte hoy?`;
  }
  // INFORMACIÓN INTERNA / CONFIDENCIAL
  if(tl.includes('cuántos clientes')||tl.includes('cuantos clientes')||tl.includes('otros clientes')||tl.includes('el equipo')||tl.includes('cuánto cobráis')||tl.includes('precio de otros')||tl.includes('cuántas personas')||tl.includes('herramienta')||tl.includes('qué usáis')){
    return`Eso es información interna de Mentedoras que no puedo compartir 😊 Si tienes alguna pregunta sobre tu proyecto, estaré encantado de ayudarte.`;
  }
  // SALUDOS / CONVERSACIÓN
  if(tl.includes('hola')||tl.includes('buenos')||tl.includes('buenas')||tl==='hi'||tl==='hey'||txt.length<8){
    const h=new Date().getHours();const g=h<13?'¡Buenos días':'¡Buenas';
    return`${g}, ${c.name}! 👋 Soy tu asistente de Mentedoras. Estoy aquí para contarte todo sobre tu contenido, grabaciones, entregas y más. ¿Qué necesitas?`;
  }
  if(tl.includes('cómo estás')||tl.includes('como estas')||tl.includes('qué tal')||tl.includes('que tal')){
    return`¡Muy bien, gracias por preguntar! 😄 Aquí, trabajando para que tu contenido sea el mejor. ¿Y tú qué tal? ¿En qué puedo ayudarte hoy?`;
  }
  if(tl.includes('gracias')||tl.includes('thank')||tl.includes('perfecto')||tl.includes('genial')||tl.includes('ok')){
    return`¡De nada, ${c.name}! 😊 Para eso estamos. Si necesitas cualquier cosa más, aquí me tienes. ¡Seguimos creando contenido increíble! 🚀`;
  }
  if(tl.includes('adiós')||tl.includes('adios')||tl.includes('hasta luego')||tl.includes('bye')){
    return`¡Hasta pronto, ${c.name}! 👋 Ha sido un placer. Recuerda que puedes escribirme cuando quieras. ¡Que tengas un gran día! ✨`;
  }
  // GRABACIÓN
  if(tl.includes('grab')){
    const next=reels.filter(r=>!r.grabado&&r.fechaGrab).sort((a,b)=>a.fechaGrab.localeCompare(b.fechaGrab))[0];
    if(next){
      const diff=Math.ceil((new Date(next.fechaGrab+'T12:00:00')-new Date())/864e5);
      const when=diff===0?'¡es hoy!':diff===1?'¡es mañana!':diff>0?`en ${diff} días`:'fue hace unos días';
      return`📅 Tu próxima grabación es el **${fmtDate(next.fechaGrab)}** (${next.label}) — ${when} 🎬${drivePics?`\n\n📸 ¿Necesitas preparar looks o referencias? Aquí tienes tu carpeta de fotos: [Ver fotos](${drivePics})`:''}`;
    }
    const yaGrabados=reels.filter(r=>r.grabado).length;
    if(yaGrabados===reels.length&&reels.length>0)return`✅ ¡Todos tus reels de este mes ya están grabados! Ahora están siendo editados por tu equipo. ✂️`;
    return`📅 Aún no tenemos fecha de grabación confirmada para los próximos reels. El equipo te lo confirmará en breve. También puedes solicitarla por aquí escribiendo "quiero agendar grabación".`;
  }
  // ENTREGA
  if(tl.includes('entrega')||tl.includes('cuando me')||tl.includes('cuándo me')||tl.includes('listo')||tl.includes('lista')||tl.includes('terminado')){
    const next=reels.filter(r=>r.grabado&&!r.subido&&r.fechaEdit).sort((a,b)=>a.fechaEdit.localeCompare(b.fechaEdit))[0];
    if(next){
      const diff=Math.ceil((new Date(next.fechaEdit+'T12:00:00')-new Date())/864e5);
      const when=diff<=0?'¡muy pronto!':diff===1?'mañana':diff+' días';
      return`🎬 La entrega del **${next.label}** está prevista para el **${fmtDate(next.fechaEdit)}** — ${when}${driveReels?`\n\n✂️ Cuando esté listo podrás verlo aquí: [Ver reels editados](${driveReels})`:''}`;
    }
    const sub=reels.filter(r=>r.subido).length;
    if(sub===reels.length&&reels.length>0)return`🎉 ¡Todo tu contenido de ${monthLabel(mk)} ya está entregado y publicado!${driveReels?` Puedes verlo todo aquí: [Ver reels](${driveReels})`:''}`;
    return`📤 El equipo está trabajando en tu contenido. Te avisaremos en cuanto esté listo.`;
  }
  // VER REELS / DRIVE
  if(tl.includes('ver')||tl.includes('enlace')||tl.includes('link')||tl.includes('drive')||tl.includes('carpeta')){
    if(tl.includes('guion')||tl.includes('script')){
      return driveScripts?`📝 Aquí tienes tus guiones: [Ver guiones](${driveScripts})`:`Tus guiones se te envían directamente antes de cada grabación. Si necesitas alguno, dímelo.`;
    }
    if(tl.includes('foto')||tl.includes('pic')){
      return drivePics?`📸 Aquí tienes tu carpeta de fotos: [Ver fotos](${drivePics})`:`No tenemos carpeta de fotos configurada. Contacta con el equipo.`;
    }
    if(driveReels)return`✂️ Aquí tienes todos tus reels editados: [Ver reels editados](${driveReels})${driveMain?`\n\n📁 Y tu carpeta completa: [Ver todo](${driveMain})`:''}`;
    if(driveMain)return`📁 Aquí tienes tu carpeta de Drive: [Ver todo mi contenido](${driveMain})`;
    return`No tenemos los links de Drive configurados aún. Contacta con el equipo y lo solucionamos.`;
  }
  // ESTADO REELS
  if(tl.includes('reel')||tl.includes('video')||tl.includes('vídeo')||tl.includes('contenido')||tl.includes('cómo van')||tl.includes('como van')||tl.includes('estado')){
    const sub=reels.filter(r=>r.subido).length;
    const ed=reels.filter(r=>r.editado&&!r.subido).length;
    const gr=reels.filter(r=>r.grabado&&!r.editado).length;
    const pe=reels.filter(r=>!r.grabado).length;
    if(!reels.length)return`No hay reels configurados para este mes. Contacta con el equipo para más info.`;
    let resp=`📊 **Tu contenido de ${monthLabel(mk)}:**\n✅ ${sub}/${reels.length} publicados\n✂️ ${ed} en edición\n🎬 ${gr} grabados\n⏳ ${pe} pendientes`;
    if(sub>0&&driveReels)resp+=`\n\n👀 ¿Quieres ver los editados? [Ver reels](${driveReels})`;
    return resp;
  }
  // EDITOR
  if(tl.includes('editor')||tl.includes('edita')||tl.includes('quién')||tl.includes('quien')){
    if(c.editors&&c.editors.length)return`✂️ Tu${c.editors.length>1?'s editors son':'editor es'} **${c.editors.join(' y ')}**. Son quienes dan vida a tu contenido con cada edición 🎬`;
    return`No hay editor asignado todavía. El equipo te lo confirmará en breve.`;
  }
  // CONTRATO / MESES RESTANTES
  if(tl.includes('contrato')||tl.includes('meses')||tl.includes('queda')||tl.includes('vence')||tl.includes('cuánto tiempo')||tl.includes('cuanto tiempo')){
    if(c.contractEnd){
      const diff=Math.ceil((new Date(c.contractEnd+'T12:00:00')-new Date())/864e5/30);
      const vencido=diff<0;
      if(vencido)return`⚠️ Tu contrato venció el **${fmtDate(c.contractEnd)}**. Contacta con Adri o Alan para renovarlo y seguir creando contenido juntos.`;
      const total=c.price?c.price*diff:0;
      return`📄 Tu contrato es válido hasta el **${fmtDate(c.contractEnd)}**.\n📅 Te quedan **${diff} mes${diff!==1?'es':''} restante${diff!==1?'s':''}**${total?`\n💰 Pagos pendientes: **${total.toLocaleString('es')}€** (${diff} × ${c.price}€)`:''}`;
    }
    if(c.contractStart)return`📄 Llevas trabajando con Mentedoras desde el **${fmtDate(c.contractStart)}**. ¡Ya somos un equipo! 💪`;
    return`No tengo datos de tu contrato. Contacta con Adri o Alan para más información.`;
  }
  // FACTURA / PAGO
  if(tl.includes('factura')||tl.includes('pago')||tl.includes('pagado')||tl.includes('cobro')||tl.includes('precio')){
    const cobro=cobrosList.find(co=>co.cliente===c.name&&co.month===mk);
    if(c.price){
      if(cobro?.paid)return`💰 Tu pago de **${c.price}€** de ${monthLabel(mk)} está **recibido y confirmado** ✅ ¡Gracias! Seguimos creando.`;
      return`💰 Tu mensualidad es **${c.price}€**. El estado de ${monthLabel(mk)}: **pendiente de recibir**. Si ya realizaste el pago y no se refleja, contacta con Adri o Alan.`;
    }
    return`Para información sobre facturas y pagos, contacta directamente con Adri o Alan. 💼`;
  }
  // REUNIÓN / MEETING
  if(tl.includes('reunión')||tl.includes('reunion')||tl.includes('meeting')||tl.includes('llamada')||tl.includes('hablar')||tl.includes('agendar')){
    const nextMeet=calEvents.filter(e=>e.type==='meet'&&e.client===c.name&&e.date>=today()).sort((a,b)=>a.date.localeCompare(b.date))[0];
    if(nextMeet)return`📞 Tienes una reunión con nosotros el **${fmtDate(nextMeet.date)}**: "${nextMeet.title}"\n\n¿Necesitas cambiarla o tienes alguna pregunta?`;
    createPortalAutoTask(c.name+' quiere agendar una reunión: "'+txt+'"');
    return`¡Claro! Puedes solicitar una reunión directamente desde el botón **"Agendar reunión"** que tienes arriba. También le avisaré al equipo ahora mismo 👋`;
  }
  // GUIONES / SCRIPTS
  if(tl.includes('guion')||tl.includes('guión')||tl.includes('script')){
    return driveScripts?`📝 Aquí tienes tus guiones: [Ver guiones](${driveScripts})\n\nSi tienes algún cambio o corrección, dímelo aquí mismo.`:`Tus guiones se preparan antes de cada grabación y te los enviamos para revisión. ¿Tienes alguna duda sobre el contenido?`;
  }
  // SERVICIOS
  if(tl.includes('servicio')||tl.includes('incluye')||tl.includes('qué hac')||tl.includes('que hac')){
    const svcs=(Array.isArray(c.services)?c.services:[]).map(id=>SERVICES.find(s=>s.id===id)?.label).filter(Boolean);
    if(svcs.length)return`📋 Los servicios incluidos en tu contrato con Mentedoras son:\n${svcs.map(s=>'• '+s).join('\n')}\n\n¿Tienes alguna duda sobre alguno de ellos?`;
    return`Para conocer los detalles de tu contrato, contacta con Adri o Alan.`;
  }
  // NO SABE → tarjeta automática
  createPortalAutoTask(c.name+' pregunta: "'+txt+'"');
  return`Hmm, esa pregunta se escapa de lo que sé 😅 Pero no te preocupes — le acabo de avisar a Adri y Alan con tu mensaje y te responderán lo antes posible. También puedes escribirles directamente si es urgente. 👋`;
}

// TOAST

function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');
  setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),3200);
}

loadTheme();
// Register service worker for PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
(async()=>{
  const isPortal=await checkRoute();
  if(!isPortal){
    const saved=sessionStorage.getItem('mu');
    if(saved){try{CU=JSON.parse(saved);showApp();}catch(e){}}
  }
})();
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('lp')&&document.getElementById('lp').style.display!=='none')doLogin();
});
