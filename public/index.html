<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentedoras</title>
<meta name="theme-color" content="#00E5E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mentedoras">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c:#00E5E5;--cd:#00B8B8;--cdim:rgba(0,229,229,.12);--c-rgb:0,229,229;
  --bg:#111418;--bg2:#181D23;--bg3:#1E2530;--bg4:#252D38;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --tx:#F0F4F8;--tx2:#8FA3B8;--tx3:#4A6078;
  --ok:#22C55E;--ok2:#4ADE80;--warn:#F59E0B;--err:#EF4444;
  --p:#A855F7;--pd:#9333EA;--pdim:rgba(168,85,247,.14);
  --r:8px;--rl:12px;--rxl:16px;
  --s1:0 1px 4px rgba(0,0,0,.4);--s2:0 4px 16px rgba(0,0,0,.5);--s3:0 8px 32px rgba(0,0,0,.6);
  --grad-brand:linear-gradient(135deg,#00E5E5,#00B8B8);
  --grad-brand-soft:linear-gradient(135deg,rgba(0,229,229,.16),rgba(0,229,229,.04));
  --grad-accent:linear-gradient(135deg,#00E5E5,#A855F7);
  --grad-danger:linear-gradient(135deg,#F87171,#B91C1C);
  --glow-brand:0 0 24px rgba(var(--c-rgb),.25);
  --glow-danger:0 0 24px rgba(239,68,68,.3)
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
body.light{--bg:#F0F4F8;--bg2:#fff;--bg3:#E8EEF5;--bg4:#D8E2ED;--bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.13);--tx:#1A2332;--tx2:#4A5568;--tx3:#8FA3B8}
body.blue{--bg:#0A1628;--bg2:#0F2040;--bg3:#162850;--bg4:#1D3360;--bd:rgba(0,229,229,.1);--bd2:rgba(0,229,229,.18);--tx:#E8F4FF;--tx2:#7FB3D3;--tx3:#3A6080}
::-webkit-scrollbar{width:6px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
input,select,textarea{color:var(--tx);background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--c)}
select option{background:var(--bg3)}
button{cursor:pointer;font-family:'DM Sans',sans-serif}

/* LOGIN */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(0,229,229,.08),transparent 60%),var(--bg)}
.lb{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rxl);padding:40px;width:100%;max-width:360px;box-shadow:var(--s3)}
.lb-logo{text-align:center;margin-bottom:28px}
.lb-logo h1{font-size:26px;font-weight:600;color:var(--c);letter-spacing:-.03em;font-style:italic}
.lb-logo p{font-size:11px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.lf{margin-bottom:13px}
.lf label{font-size:11px;font-weight:500;color:var(--tx2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:38px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);font-size:16px;padding:0}
.lb-btn{width:100%;padding:11px;background:var(--grad-brand);color:#0A0E12;border:none;border-radius:var(--r);font-size:14px;font-weight:600;margin-top:4px;transition:all .15s;box-shadow:0 2px 8px rgba(var(--c-rgb),.2)}
.lb-btn:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:var(--glow-brand)}
.lb-err{font-size:12px;color:var(--err);text-align:center;margin-top:9px;display:none}

/* APP */
.app{display:none;height:100vh;overflow:hidden}
.app.on{display:flex}

/* SIDEBAR */
.sb{width:228px;min-width:228px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;transition:transform .3s}
.sb-top{padding:16px 14px 12px;border-bottom:1px solid var(--bd)}
.sb-logo{font-size:18px;font-weight:600;font-style:italic;background:var(--grad-accent);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--c)}
.sb-sub{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.sb-u{display:flex;align-items:center;gap:8px;margin-top:10px;background:var(--bg3);border-radius:var(--r);padding:7px 9px;border:1px solid var(--bd)}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--cdim);border:1px solid rgba(0,229,229,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--c);flex-shrink:0}
.sb-uname{font-size:12px;font-weight:500}
.sb-nav{padding:8px 8px 0;flex-shrink:0}
.nl{font-size:10px;color:var(--tx3);padding:6px 8px 3px;text-transform:uppercase;letter-spacing:.07em;font-weight:500}
.ni{position:relative;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--tx2);transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.on{background:var(--grad-brand-soft);color:var(--c);font-weight:600;box-shadow:inset 0 0 0 1px rgba(var(--c-rgb),.2)}
.ni.on::before{content:'';position:absolute;left:-8px;top:2px;bottom:2px;width:3px;border-radius:0 3px 3px 0;background:var(--c)}
.ni i{font-size:15px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--err);color:#fff;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600}
.sb-clients{padding:0 8px;overflow-y:auto;flex:1}
.sb-cl-hdr{display:flex;align-items:center;gap:6px;padding:6px 0 6px}
.sb-cl-hdr input{font-size:12px;padding:5px 9px;flex:1}
.sb-cl-hdr .btn-icon{width:28px;height:28px;border-radius:var(--r);background:var(--c);color:var(--bg);border:none;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sci{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.sci:hover{background:var(--bg3)}
.sci.on{background:var(--cdim)}
.sc-av{width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--c);flex-shrink:0}
.sc-n{font-size:12px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sci.on .sc-n{color:var(--c)}
.sb-bot{margin:8px;flex-shrink:0}
.sb-out{width:100%;padding:8px 12px;border-radius:var(--r);background:transparent;border:1px solid var(--bd);color:var(--tx3);font-size:12px;display:flex;align-items:center;gap:7px;transition:all .15s}
.sb-out:hover{background:var(--bg3);color:var(--tx2)}
.theme-row{display:flex;gap:5px;padding:8px 0 0;align-items:center}
.theme-row span{font-size:10px;color:var(--tx3);flex:1}
.th-btn{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
.th-btn:hover{transform:scale(1.15)}
.th-btn.on{border-color:var(--c)}
.th-dark{background:radial-gradient(circle,#252D38,#111418)}
.th-light{background:radial-gradient(circle,#fff,#E8EEF5)}
.th-blue{background:radial-gradient(circle,#1D3360,#0A1628)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:13px 22px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbl{display:flex;align-items:center;gap:10px}
.tb-ic{width:32px;height:32px;background:var(--cdim);border-radius:var(--r);display:flex;align-items:center;justify-content:center}
.tb-ic i{font-size:16px;color:var(--c)}
.tb-t{font-size:15px;font-weight:600}
.tba{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);font-size:13px;font-weight:500;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg4);color:var(--tx)}
.btn-p{background:var(--grad-brand);color:#0A0E12;border-color:transparent;font-weight:600;box-shadow:0 2px 8px rgba(var(--c-rgb),.25)}
.btn-p:hover{filter:brightness(1.08);box-shadow:var(--glow-brand);transform:translateY(-1px)}
.btn-s{padding:5px 10px;font-size:12px}
.btn-danger{color:var(--err);border-color:rgba(239,68,68,.3)}
.btn-mega{background:var(--grad-danger);color:#fff;border-color:transparent;font-weight:600;box-shadow:0 2px 8px rgba(239,68,68,.25)}
.btn-mega:hover{filter:brightness(1.08);box-shadow:var(--glow-danger);transform:translateY(-1px)}
.cnt{flex:1;overflow-y:auto;padding:20px}
.view{display:none}
.view.on{display:block}

/* CARDS & STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.scard{position:relative;overflow:hidden;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--c))}
.scard-c{--accent:var(--c);--accent-tint:var(--cdim)}
.scard-err{--accent:var(--err);--accent-tint:rgba(239,68,68,.12)}
.scard-purple{--accent:var(--p);--accent-tint:var(--pdim)}
.scard-ok{--accent:var(--ok2);--accent-tint:rgba(74,222,128,.14)}
.scard-ic{width:34px;height:34px;border-radius:var(--r);background:var(--accent-tint,var(--cdim));display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.scard-ic i{font-size:17px;color:var(--accent,var(--c))}
.scard-v{font-size:26px;font-weight:600;letter-spacing:-.02em}
.scard-l{font-size:12px;color:var(--tx3);margin-top:1px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}

/* CLIENT GRID */
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;cursor:pointer;transition:all .15s}
.cc:hover{border-color:rgba(0,229,229,.3);box-shadow:0 0 0 1px var(--cdim),var(--s2)}
.cc-av{width:36px;height:36px;border-radius:50%;background:var(--grad-brand-soft);border:1px solid rgba(0,229,229,.25);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--c)}
.cc-n{font-size:14px;font-weight:600;margin-top:8px}
.cc-t{font-size:11px;color:var(--tx3);margin-top:2px}
.cc-ft{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin:2px}

/* PROFILE */
.prof-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.prof-av{width:50px;height:50px;border-radius:50%;background:var(--cdim);border:1px solid rgba(0,229,229,.25);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:var(--c)}
.prof-name{font-size:19px;font-weight:600}
.prof-type{font-size:13px;color:var(--tx3);margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.tab{padding:8px 14px;font-size:13px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--c);border-bottom-color:var(--c);border-bottom-width:2px;font-weight:600;background:var(--cdim);border-radius:6px 6px 0 0}
.tc{display:none}
.tc.on{display:block}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.card-t{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card-t i{font-size:13px;color:var(--c);background:var(--cdim);width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.pf{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)}
.pf:last-child{border-bottom:none}
.pf-l{font-size:12px;color:var(--tx3)}
.pf-v{font-size:13px;font-weight:500}
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.link-pill{display:inline-flex;align-items:center;gap:5px;background:var(--cdim);color:var(--c);padding:4px 9px;border-radius:var(--r);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid rgba(0,229,229,.15)}

/* SERVICES */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.svc-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.svc-item.on{border-color:var(--c);background:var(--cdim)}
.svc-chk{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--bd2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.svc-item.on .svc-chk{background:var(--c);border-color:var(--c)}
.svc-label{font-size:12px;color:var(--tx2);line-height:1.4}
.svc-item.on .svc-label{color:var(--c)}

/* REEL TABLE */
.month-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.mbtn{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid var(--bd2);background:transparent;color:var(--tx3);transition:all .15s}
.mbtn.on{background:var(--cdim);color:var(--c);border-color:var(--c)}
.rtable{width:100%;border-collapse:collapse}
.rtable th{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:left;border-bottom:1px solid var(--bd)}
.rtable td{padding:7px 10px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--tx2);vertical-align:middle}
.rtable tr:last-child td{border-bottom:none}
.rtable tr:hover td{background:var(--bg3)}
.chk{width:16px;height:16px;border-radius:3px;border:1px solid var(--bd2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chk:hover{border-color:var(--c)}
.chk.on{background:var(--ok);border-color:var(--ok)}

/* PRODUCTION */
.prod-step{margin-bottom:8px;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.prod-step-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--bg3);transition:background .15s}
.prod-step-hdr:hover{background:var(--bg4)}
.prod-step-hdr i{font-size:14px;color:var(--tx3);transition:transform .2s}
.prod-step-hdr.open i.arr{transform:rotate(90deg)}
.prod-step-title{font-size:13px;font-weight:500;flex:1}
.prod-step-prog{font-size:11px;color:var(--tx3)}
.prod-step-body{display:none;padding:8px 14px 12px;background:var(--bg2)}
.prod-step-body.open{display:block}
.prod-reel-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--bd)}
.prod-reel-row:last-child{border-bottom:none}

/* FASE 0 */
.cl0-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.cl0-item:hover{background:var(--bg3)}
.cl0-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cl0-chk.on{background:var(--c);border-color:var(--c)}
.cl0-txt{font-size:13px;color:var(--tx2)}
.cl0-txt.on{color:var(--tx3);text-decoration:line-through}
.prog-bar{height:4px;background:var(--bd);border-radius:4px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:var(--c);border-radius:4px;transition:width .3s}

/* BOARD */
.bw{overflow-x:auto;padding-bottom:8px}
.bcols{display:flex;gap:12px;min-width:max-content;align-items:flex-start}
.bcol{width:240px;flex-shrink:0;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:12px;display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.bcol.dov{border-color:var(--c);background:var(--cdim)}
.bcol.col-dragging{opacity:.5;border:2px dashed var(--c)}
.bcol-body{overflow-y:auto;flex:1;padding-right:2px}
.bch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd);position:relative;cursor:grab;flex-shrink:0}
.bch:active{cursor:grabbing}
.bcn{font-size:12px;font-weight:600}
.bcol-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.bcc{background:var(--bg3);font-size:10px;padding:1px 6px;border-radius:20px;color:var(--tx3)}
.dot-btn{cursor:pointer;color:var(--tx3);font-size:16px;padding:2px 4px;border-radius:4px}
.dot-btn:hover{background:var(--bg4);color:var(--tx)}
.drop-menu{position:absolute;right:0;top:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:4px;z-index:50;min-width:170px;box-shadow:var(--s3);display:none}
.drop-menu.open{display:block}
.dm-item{padding:7px 10px;font-size:12px;color:var(--tx2);cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:7px}
.dm-item:hover{background:var(--bg3);color:var(--tx)}
.dm-item.danger{color:var(--err)}
.bcard{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:11px 12px;margin-bottom:7px;cursor:grab;user-select:none;transition:all .15s;position:relative}
.bcard:hover{border-color:var(--bd2);box-shadow:var(--s1)}
.bcard.dragging{opacity:.4;border:1px dashed var(--c)}
.bcard.drag-over{border-top:2px solid var(--c)}
.bc-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px}
.bc-chk{width:15px;height:15px;border-radius:3px;border:1px solid var(--bd2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.bc-chk.on{background:var(--ok);border-color:var(--ok)}
.bc-title{font-size:12px;line-height:1.4;flex:1}
.bc-title.done{text-decoration:line-through;color:var(--tx3)}
.badd{width:100%;padding:7px;border:1px dashed var(--bd);border-radius:var(--r);background:transparent;font-size:12px;color:var(--tx3);display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px;transition:all .15s;flex-shrink:0}
.badd:hover{border-color:var(--c);color:var(--c);background:var(--cdim)}
.add-col-btn{width:200px;flex-shrink:0;background:var(--bg2);border:1px dashed var(--bd2);border-radius:var(--rl);padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--tx3);font-size:13px;transition:all .15s;align-self:flex-start}
.add-col-btn:hover{border-color:var(--c);color:var(--c);background:var(--cdim)}

/* PIPELINE */
.pw{overflow-x:auto;padding-bottom:8px}
.pcols{display:flex;gap:10px;min-width:1300px}
.pcol{flex:1;min-width:130px}

.cal-ev.del{background:rgba(34,197,94,.2);color:#4ADE80}
.cal-ev.meet{background:var(--cdim);color:var(--c)}

const FIREBASE_CONFIG={apiKey:"AIzaSyBjPyF0q4KMH2LZ7qfBb9wvjZm2usYyIQM",authDomain:"mentedoras-crm.firebaseapp.com",projectId:"mentedoras-crm",storageBucket:"mentedoras-crm.firebasestorage.app",messagingSenderId:"965240949854",appId:"1:965240949854:web:151aebe243214b55c5f8cf"};
let db=null,fbReady=false;

function initFB(){
  return new Promise(r=>{
    if(fbReady){r();return;}
    const s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
    s1.onload=()=>{
      const s2=document.createElement('script');
      s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';
      s2.onload=()=>{
        try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.firestore();fbReady=true;}catch(e){console.warn('FB:',e);}
        r();
      };s2.onerror=r;document.head.appendChild(s2);
    };s1.onerror=r;document.head.appendChild(s1);
  });
}
async function fbSet(col,id,data){
  try{localStorage.setItem('fb_'+col+'_'+id,JSON.stringify(data));}catch(e){}
  if(!fbReady)await initFB();
  if(db){try{await db.collection(col).doc(id).set(data);}catch(e){console.warn('fbSet:',e);}}
}
async function fbGet(col,id){
  if(!fbReady)await initFB();
  if(db){try{const d=await db.collection(col).doc(id).get();if(d.exists)return d.data();}catch(e){}}
  try{const d=localStorage.getItem('fb_'+col+'_'+id);return d?JSON.parse(d):null;}catch(e){return null;}
}
async function fbListen(col,id,cb){
  if(!fbReady)await initFB();
  if(!db)return;
  try{db.collection(col).doc(id).onSnapshot(snap=>{if(snap&&snap.exists)cb(snap.data());});}catch(e){console.warn('fbListen:',e);}
}

function mkReels(n,month){
  return Array.from({length:n},(_,i)=>({id:i+1,label:'Reel '+(i+1),month,grabado:false,fechaGrab:'',editado:false,fechaEdit:'',subido:false,editor:'',notas:''}));
}
function mkMonths(n){
  const now=new Date(),months={};
  for(let i=0;i<3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    months[k]=mkReels(n,k);
  }
  return months;
}

function mkProd(months){
  const p={};
  Object.keys(months).forEach(mk=>{p[mk]={};});
  return p;
}

function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}

function fmtDate(d){if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('es-ES',{day:'numeric',month:'short'});}
function monthKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function monthLabel(k){if(!k)return'';const[y,m]=k.split('-');return MONTHS[parseInt(m)-1]+' '+y;}
function dstatus(d){
  if(!d)return{cls:'',lbl:'Sin fecha'};
  const diff=Math.ceil((new Date(d+'T12:00:00')-new Date())/864e5);
  if(diff<0)return{cls:'badge-err',lbl:'🔴 '+fmtDate(d)};
  if(diff<=3)return{cls:'badge-warn',lbl:'🟡 '+fmtDate(d)};
  return{cls:'badge-ok',lbl:'🟢 '+fmtDate(d)};
}

let _lastClientsSave=null;
let _clientSaveQueue=new Set(); // tracks client IDs pending save to batch them
let _clientSaveTimer=null;
async function saveClients(){
  // Save each client as its own document - prevents the race condition where
  // a realtime listener overwrites a newly-created or just-edited client
  // with a stale version from before the write completed.
  _lastClientsSave=new Date().toISOString();
  try{
    for(const c of clients){
      await fbSet('client_docs',c.id,{...c,u:_lastClientsSave});
    }
    await fbSet('crm','clients_index',{ids:clients.map(c=>c.id),u:_lastClientsSave});
    // Mirror to legacy single-document format for cliente.html portal compatibility
    await fbSet('crm','clients',{list:clients,u:_lastClientsSave});
  }catch(e){console.error('saveClients:',e);}
}
async function saveClient_doc(c){
  // Save a single client without touching others - use this when only one client changed
  _lastClientsSave=new Date().toISOString();
  try{
    await fbSet('client_docs',c.id,{...c,u:_lastClientsSave});
    // Mirror full list to legacy format for cliente.html portal compatibility
    await fbSet('crm','clients',{list:clients,u:_lastClientsSave});
  }catch(e){console.error('saveClient_doc:',e);}
}

async function loadClients(){
  try{
    const index=await fbGet('crm','clients_index');
    if(index&&index.ids&&index.ids.length){
      if(!fbReady)await initFB();
      const snap=await db.collection('client_docs').get();
      const byId={};
      snap.forEach(doc=>{byId[doc.id]=doc.data();});
      const loaded=index.ids.map(id=>{
        const fc=byId[id];
        if(!fc)return null;
        const def=clients.find(c=>c.id===fc.id)||{};
        return{...def,...fc,msgs:fc.msgs||[],reels:fc.reels||mkMonths(fc.numReels||5),fase0:fc.fase0||mkFase0(),produccion:fc.produccion||{},editors:Array.isArray(fc.editors)?fc.editors:[],services:Array.isArray(fc.services)?fc.services:[]};
      }).filter(Boolean);
      if(loaded.length){clients=loaded;return true;}
    }
    // Fallback to old single-document format if no migrated data exists yet
    const sc=await fbGet('crm','clients');
    if(sc&&sc.list&&sc.list.length){
      clients=sc.list.map(fc=>{
        const def=clients.find(c=>c.id===fc.id)||{};
        return{...def,...fc,msgs:fc.msgs||[],reels:fc.reels||mkMonths(fc.numReels||5),fase0:fc.fase0||mkFase0(),produccion:fc.produccion||{},editors:Array.isArray(fc.editors)?fc.editors:[],services:Array.isArray(fc.services)?fc.services:[]};
      });
      return true;
    }
  }catch(e){console.warn('loadClients:',e);}
  return false;
}
async function saveBoard(){

    await fbSet('crm','board_index',{cols:boardCols.map(c=>({id:c.id,name:c.name,color:c.color||'',isFinal:c.isFinal||false})),u:_lastBoardSave});
    for(const col of boardCols){for(const task of(col.tasks||[])){const{images,...td}=task;await fbSet('board_tasks',String(task.id),{...td,colId:col.id,u:_lastBoardSave});}}
    const imgs={};boardCols.forEach(col=>{(col.tasks||[]).forEach(t=>{if(t.images&&t.images.length)imgs[t.id]=t.images;});});
    if(Object.keys(imgs).length)await fbSet('crm','board_images',{data:imgs,u:_lastBoardSave});
  }catch(e){console.error('saveBoard:',e);}
}

async function loadBoard(){
  try{
    const index=await fbGet('crm','board_index');
    if(index&&index.cols){
      if(!fbReady)await initFB();
      const snap=await db.collection('board_tasks').get();
      const allTasks={};
      snap.forEach(doc=>{const d=doc.data();if(d&&d.colId){if(!allTasks[d.colId])allTasks[d.colId]=[];allTasks[d.colId].push(d);}});
      boardCols=index.cols.map(meta=>({...meta,tasks:(allTasks[meta.id]||[])}));
      try{const si=await fbGet('crm','board_images');if(si&&si.data){boardCols.forEach(col=>{(col.tasks||[]).forEach(t=>{if(si.data[t.id])t.images=si.data[t.id];});});}}catch(e){}
      return true;
    }
    const sb=await fbGet('crm','board');
    if(sb&&sb.cols){boardCols=sb.cols;return true;}
  }catch(e){console.warn('loadBoard:',e);}
  return false;
}

async function loadAll(){
  if(!fbReady)await initFB();
  try{
    // Load users FIRST so login works for Firebase users
    const su=await fbGet('crm','users');
    if(su&&su.users){
      USERS={...USERS,...su.users};
      // Re-render board if open so column visibility updates with new users
      if(CU&&document.getElementById('view-board')?.classList.contains('on'))renderBoard();
    }

    await loadClients();
    await loadBoard();
    await loadIdeas();
    const se=await fbGet('crm','events');
    if(se&&se.list)calEvents=se.list;
    const sp=await fbGet('crm','payments');
    if(sp){if(sp.list)paymentsList=sp.list;if(sp.cobros)cobrosList=sp.cobros;}
  }catch(e){console.warn('loadAll:',e);}
  render();
  // Check for auto CM tasks daily
  // Auto-refresh every 30 seconds to catch any missed updates
  setInterval(async()=>{
    if(!CU)return;
    try{
      await loadBoard();
      if(document.getElementById('view-board')?.classList.contains('on'))renderBoard();
    }catch(e){}
    try{
      await loadClients();
      if(activeClient){const u=clients.find(c=>c.id===activeClient.id);if(u){activeClient=u;if(document.getElementById('view-profile')?.classList.contains('on'))renderProfile(u);}}
    }catch(e){}
  },30000);
  // Check auto tasks for CM
  setTimeout(checkAutoTasksForCM, 2000);
  // real-time
  if(db){
    try{
      db.collection('client_docs').onSnapshot(snap=>{
        if(!snap)return;
        const byId={};
        snap.forEach(doc=>{byId[doc.id]=doc.data();});
        const ids=Object.keys(byId);
        if(!ids.length)return; // don't wipe local data if collection is momentarily empty (e.g. still migrating)
        clients=ids.map(id=>{
          const fc=byId[id];
          const def=clients.find(c=>c.id===id)||{};
          return{...def,...fc,msgs:fc.msgs||[],reels:fc.reels||mkMonths(fc.numReels||5),fase0:fc.fase0||mkFase0(),produccion:fc.produccion||{},editors:Array.isArray(fc.editors)?fc.editors:[],services:Array.isArray(fc.services)?fc.services:[]};
        });
        // Refresh dashboard
        if(document.getElementById('view-dash')?.classList.contains('on'))renderDash();
        // Refresh sidebar
        renderSB();
        // Refresh active client profile if open
        if(activeClient){
          const u=clients.find(c=>c.id===activeClient.id);
          if(u){
            activeClient=u;
            if(document.getElementById('view-profile')?.classList.contains('on'))renderProfile(u);
          }
        }
      });
    }catch(e){console.warn('client_docs listener:',e);}
    try{
      db.collection('improvement_ideas').onSnapshot(snap=>{
        if(!snap)return;
        ideas=[];
        snap.forEach(doc=>ideas.push(doc.data()));
        if(document.getElementById('view-ideas')?.classList.contains('on'))renderIdeasBoard();
      });
    }catch(e){console.warn('improvement_ideas listener:',e);}
    try{
      db.collection('board_tasks').onSnapshot(snap=>{
        if(!snap)return;
        const allTasks={};
        snap.forEach(doc=>{const d=doc.data();if(d&&d.colId){if(!allTasks[d.colId])allTasks[d.colId]=[];allTasks[d.colId].push(d);}});
        boardCols.forEach(col=>{
          const imgs={};(col.tasks||[]).forEach(t=>{if(t.images)imgs[t.id]=t.images;});
          col.tasks=(allTasks[col.id]||[]).map(t=>({...t,images:imgs[t.id]||[]}));
        });
        if(document.getElementById('view-board')?.classList.contains('on'))renderBoard();
        renderBoardBadge();
      });
    }catch(e){console.warn('board_tasks listener:',e);}
    try{
      db.collection('crm').doc('board_index').onSnapshot(snap=>{
        if(!snap||!snap.exists)return;
        const d=snap.data();if(!d||!d.cols)return;
        const existingTasks={};
        boardCols.forEach(col=>{existingTasks[col.id]=col.tasks||[];});
        boardCols=d.cols.map(meta=>({...meta,tasks:existingTasks[meta.id]||[]}));
        if(document.getElementById('view-board')?.classList.contains('on'))renderBoard();
      });
    }catch(e){console.warn('board_index listener:',e);}
    try{
      db.collection('crm_notifications').orderBy('u','desc').limit(20).onSnapshot(snap=>{
        if(!snap)return;
        const notifs=[];
        snap.forEach(doc=>notifs.push(doc.data()));

        if(notifEl&&document.getElementById('view-dash')?.classList.contains('on')){

            <button onclick="markNotifRead('${n.id}')" style="font-size:10px;background:none;border:none;color:var(--tx3);cursor:pointer;padding:0">✓</button>
          </div>`).join('');
        }
      });
    }catch(e){console.warn('crm_notifications listener:',e);}
  }

  closeModal();renderIdeasBoard();showToast('Idea eliminada','ok');
  try{if(!fbReady)await initFB();await db.collection('improvement_ideas').doc(String(id)).delete();}catch(e){}
}

async function doLogin(){
  const u=document.getElementById('li-u').value.trim().toLowerCase();
  const p=document.getElementById('li-p').value.trim().toLowerCase();
  const errEl=document.getElementById('lb-err');
  const btn=document.querySelector('.lb-btn');
  if(btn){btn.textContent='Verificando...';btn.disabled=true;}
  // Always reload users from Firebase before checking
  try{
    if(!fbReady)await initFB();
    const su=await fbGet('crm','users');
    if(su&&su.users)USERS={...USERS,...su.users};
  }catch(e){console.warn('FB users load failed:',e);}
  if(btn){btn.textContent='Entrar al CRM';btn.disabled=false;}
  const key=Object.keys(USERS).find(k=>k===u);
  if(key&&USERS[key].pass.toLowerCase()===p){
    errEl.style.display='none';
    CU={...USERS[key],key};
    sessionStorage.setItem('mu',JSON.stringify(CU));
    showApp();
  }else{
    errEl.textContent='Usuario o contraseña incorrectos.';
    errEl.style.display='block';
  }
}
function doLogout(){
  CU=null;
  sessionStorage.removeItem('mu');
  // Full reload to clear all in-memory state
  window.location.reload();
}

function renderDash(){
  const mk=monthKey();
  let totalGrab=0,totalReels=0,editing=0,pendSubir=0;
  const mc=myClients();
  mc.forEach(c=>{
    const r=c.reels[mk]||[];
    totalReels+=r.length;
    totalGrab+=r.filter(r=>r.grabado).length;
    editing+=r.filter(r=>r.editado&&!r.subido).length;
    pendSubir+=r.filter(r=>r.grabado&&!r.editado).length;
  });
  const overdue=mc.filter(c=>c.delivery&&new Date(c.delivery+'T12:00:00')<new Date()).length;
  const todayStr=today();

  // Today's events
  const todayEvents=calEvents.filter(e=>e.date===todayStr);
  const expiringSoon=isPMup()?clients.filter(c=>c.contractEnd&&new Date(c.contractEnd+'T12:00:00')>=new Date()&&new Date(c.contractEnd+'T12:00:00')<=new Date(Date.now()+30*864e5)):[];

  let html=``;

  html+=`<div id="dash-notifs"></div>`;
  // Today's tasks - only show tasks from user's own column
  const myColName=CU?.name||'';
  const todayTasks=boardCols
    .filter(col=>isCEO()||col.name.toLowerCase()===myColName.toLowerCase())
    .flatMap(col=>(col.tasks||[]).filter(t=>t.date===today()&&!t.done).map(t=>({...t,colName:col.name})));
  if(todayTasks.length){
    html+=`<div style="background:rgba(var(--c-rgb,0,229,229),.08);border:1px solid rgba(var(--c-rgb,0,229,229),.2);border-radius:var(--r);padding:12px 14px;margin-bottom:14px">
      <div style="font-weight:600;font-size:13px;margin-bottom:8px">📋 ${todayTasks.length} tarea${todayTasks.length>1?'s':''} para hoy</div>
      ${todayTasks.slice(0,5).map(t=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0;border-top:1px solid var(--bd)">
        <div class="chk" style="width:14px;height:14px;border-radius:3px;flex-shrink:0" onclick="toggleTask('${boardCols.find(col=>col.tasks?.some(tt=>String(tt.id)===String(t.id)))?.id}','${t.id}')"></div>
        <span style="flex:1">${t.title}</span>
        <span style="color:var(--tx3);font-size:10px">${t.colName}</span>
      </div>`).join('')}
      ${todayTasks.length>5?`<div style="font-size:11px;color:var(--tx3);margin-top:6px">+${todayTasks.length-5} más en el tablero</div>`:''}
    </div>`;
  }
  if(CU?.level==='cm'){
    const upcoming=[];
    const limitDate=new Date(Date.now()+7*864e5).toISOString().split('T')[0];
    clients.filter(c=>c.cm===CU.name).forEach(c=>{
      Object.keys(c.pubCal||{}).forEach(mk2=>{
        Object.entries(c.pubCal[mk2]).forEach(([rid,pd])=>{
          const reel=(c.reels[mk2]||[]).find(r=>r.id===rid||String(r.id)===String(rid));
          if(!reel)return;
          [['pub','📸 Instagram'],['tiktok','🎵 TikTok'],['youtube','▶️ YouTube']].forEach(([key,label])=>{
            if(pd[key]&&pd[key]>=today()&&pd[key]<=limitDate&&!reel.subido){
              upcoming.push({client:c.name,reel:reel.label,date:pd[key],label});
            }
          });
        });
      });
    });
    if(upcoming.length){
      upcoming.sort((a,b)=>a.date.localeCompare(b.date));
      html+=`<div class="card" style="margin-bottom:14px">
        <div class="card-t"><i class="ti ti-calendar-event"></i>📅 Qué publicar y cuándo (próximos 7 días)</div>
        ${upcoming.map(u=>`<div class="pf"><span style="font-size:12px">${u.label} — <strong>${u.reel}</strong> (${u.client})</span><span class="badge ${u.date===today()?'badge-warn':''}" style="font-size:10px">${fmtDate(u.date)}</span></div>`).join('')}
      </div>`;
    }
  }
  if(CU?.level==='editor'){
    const pending=[];
    mc.forEach(c=>{
      Object.keys(c.reels||{}).forEach(mk2=>{
        (c.reels[mk2]||[]).forEach(r=>{
          if(r.editor===CU.name&&r.grabado&&!r.editado)pending.push({client:c.name,reel:r.label,fechaGrab:r.fechaGrab});
        });
      });
    });
    if(pending.length){
      html+=`<div class="card" style="margin-bottom:14px">
        <div class="card-t"><i class="ti ti-scissors"></i>✂️ Reels pendientes de editar</div>
        ${pending.map(p=>`<div class="pf"><span style="font-size:12px"><strong>${p.reel}</strong> — ${p.client}</span>${p.fechaGrab?`<span style="font-size:11px;color:var(--tx3)">Grabado ${fmtDate(p.fechaGrab)}</span>`:''}</div>`).join('')}
      </div>`;
    }
  }
  if(isPMup()){
    const pendingEnvio=[];
    mc.forEach(c=>{
      Object.keys(c.reels||{}).forEach(mk2=>{
        (c.reels[mk2]||[]).forEach(r=>{
          if(r.grabado&&!r.enviado&&!r.editado){
            const grabTime=r.fechaGrab?new Date(r.fechaGrab+'T12:00:00'):null;
            const hoursAgo=grabTime?Math.round((new Date()-grabTime)/3600000):0;
            pendingEnvio.push({client:c.name,reel:r.label,hours:hoursAgo,month:mk2});
          }
        });
      });
    });
    if(pendingEnvio.length){
      pendingEnvio.sort((a,b)=>a.month.localeCompare(b.month)||a.client.localeCompare(b.client));
      // Group by month
      const byMonth={};
      pendingEnvio.forEach(p=>{if(!byMonth[p.month])byMonth[p.month]=[];byMonth[p.month].push(p);});
      const months=Object.keys(byMonth).sort();
      html+=`<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:12px 14px;margin-bottom:14px">
        <div style="font-weight:600;color:var(--warn);margin-bottom:10px;font-size:13px">📤 ${pendingEnvio.length} reel${pendingEnvio.length>1?'s':''} grabado${pendingEnvio.length>1?'s':''} sin enviar al editor</div>
        ${months.map(m=>`
          <div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 4px">${monthLabel(m)}</div>
          ${byMonth[m].map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:4px 0;border-top:1px solid rgba(245,158,11,.15)">
            <span><strong>${p.client}</strong> — ${p.reel}</span>
            ${p.hours>=24?`<span style="color:var(--err);font-weight:600;font-size:11px">⚠️ +${p.hours}h sin enviar</span>`:`<span style="color:var(--warn);font-size:11px">${p.hours>0?p.hours+'h':'Hoy'}</span>`}
          </div>`).join('')}
        `).join('')}
      </div>`;
    }
  }

  if(expiringSoon.length){
    html+=`<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--warn)">
      <i class="ti ti-alert-triangle"></i> <strong>${expiringSoon.length} contrato${expiringSoon.length>1?'s':''}</strong> vence${expiringSoon.length>1?'n':''} en menos de 30 días: ${expiringSoon.map(c=>c.name).join(', ')}
    </div>`;
  }

  // Today's summary
  if(todayEvents.length){
    html+=`<div class="card" style="margin-bottom:14px;border-left:3px solid var(--c)">
      <div class="card-t"><i class="ti ti-calendar-event"></i>Hoy — ${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
      ${todayEvents.map(e=>`<div class="pf"><span style="font-size:13px">${e.type==='grab'?'🎬':e.type==='del'?'📤':'📞'} ${e.title}</span>${e.client?`<span style="font-size:11px;color:var(--tx3)">${e.client}</span>`:''}</div>`).join('')}
    </div>`;
  }

  html+=`<div class="sg">
    <div class="scard scard-c" onclick="${isPMup()?'toggleClientBreakdown()':''}" style="cursor:${isPMup()?'pointer':'default'}">
      <div class="scard-ic"><i class="ti ti-users"></i></div>
      <div class="scard-v">${mc.length}</div>
      <div class="scard-l">Clientes activos</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:6px">
        ${isPMup()?`<span style="font-size:10px;padding:2px 6px;border-radius:20px;background:rgba(34,197,94,.15);color:#4ADE80">💰 ${mc.filter(c=>c.clientType==='pago'||!c.clientType).length}</span>`:''}
        ${isPMup()?`<span style="font-size:10px;padding:2px 6px;border-radius:20px;background:rgba(0,229,229,.12);color:var(--c)">🤝 ${mc.filter(c=>c.clientType==='intercambio').length}</span>`:''}
        ${isPMup()?`<span style="font-size:10px;padding:2px 6px;border-radius:20px;background:rgba(239,68,68,.12);color:var(--err)">📉 ${mc.filter(c=>c.clientType==='perdida').length}</span>`:''}
      </div>
    </div>
    <div class="scard scard-err"><div class="scard-ic"><i class="ti ti-alarm"></i></div><div class="scard-v" style="color:var(--err)">${overdue}</div><div class="scard-l">Entregas vencidas</div></div>
    <div class="scard scard-purple"><div class="scard-ic"><i class="ti ti-cut"></i></div><div class="scard-v">${editing}</div><div class="scard-l">Reels en edición</div></div>
    <div class="scard scard-ok"><div class="scard-ic"><i class="ti ti-video"></i></div><div class="scard-v">${totalGrab}/${totalReels}</div><div class="scard-l">Grabados este mes</div></div>
  </div>
  <div class="sh"><div class="st">Clientes</div>
    <input type="text" placeholder="🔍 Buscar cliente..." style="font-size:12px;padding:5px 10px;width:160px" oninput="filterDashClients(this.value)" id="dash-search">
  </div>
  <div class="cg" id="dash-clients">${renderClientCards(mc,mk)}</div>`;
  document.getElementById('view-dash').innerHTML=html;
}

function renderClientCards(mc,mk){
  return mc.map(c=>{
      const r=c.reels[mk]||[];
      const clientManagesUpload=!(Array.isArray(c.services)?c.services:[]).some(s=>['content_5','content_8_cm','podcast_reels_edit','youtube'].includes(s));
      const done=clientManagesUpload?r.filter(r=>r.editado).length:r.filter(r=>r.subido).length;
      const ed=r.filter(r=>r.editado&&!r.subido).length;
      const gr=r.filter(r=>r.grabado&&!r.editado).length;
      const pe=r.filter(r=>!r.grabado).length;
      const svcs=(Array.isArray(c.services)?c.services:[]).map(id=>SERVICES.find(s=>s.id===id)?.label).filter(Boolean);
      return`<div class="cc" onclick="openProfile('${c.id}')">
        <div class="cc-av">${ini(c.name)}</div>
        <div class="cc-n">${c.name}</div>
        <div class="cc-t">${c.type}</div>
        ${svcs.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:6px">${svcs.slice(0,2).map(s=>`<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:var(--cdim);color:var(--c)">${s.split('(')[0].trim()}</span>`).join('')}${svcs.length>2?`<span style="font-size:10px;color:var(--tx3)">+${svcs.length-2}</span>`:''}</div>`:''}
        <div class="cc-ft">
          ${r.length?`<div style="display:flex;flex-wrap:wrap;gap:3px">
            ${done?`<span class="chip" style="background:rgba(34,197,94,.12);color:#4ADE80">${clientManagesUpload?'✂️':'✅'} ${done}/${r.length}</span>`:''}
            ${!clientManagesUpload&&ed?`<span class="chip" style="background:rgba(192,132,252,.12);color:#C084FC">✂️ ${ed}/${r.length}</span>`:''}
            ${gr?`<span class="chip" style="background:rgba(245,158,11,.12);color:var(--warn)">🎬 ${gr}/${r.length}</span>`:''}
            ${pe?`<span class="chip" style="background:var(--bg3);color:var(--tx3)">⏳ ${pe}/${r.length}</span>`:''}

// COLUMN DRAG (reorder columns)
function startDragCol(e,colId){
  dragBoardColId=colId;
  e.dataTransfer.setData('colId',colId);
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=e.target.closest('.bcol');if(el)el.classList.add('col-dragging');},0);
}
function endDragCol(e){
  document.querySelectorAll('.bcol.col-dragging').forEach(el=>el.classList.remove('col-dragging'));
  dragBoardColId=null;
}

// COLUMN DROP ZONE
function boardColDragOver(e,colId){
  e.preventDefault();e.stopPropagation();
  if(dragBoardColId&&dragBoardColId!==colId){
    // Column reorder
    document.querySelectorAll('.bcol').forEach(c=>c.classList.remove('dov'));
    document.querySelector(`.bcol[data-col="${colId}"]`)?.classList.add('dov');
  }else if(dragTaskColId){
    document.querySelectorAll('.bcol').forEach(c=>c.classList.remove('dov'));
    document.querySelector(`.bcol[data-col="${colId}"]`)?.classList.add('dov');
  }
}
function boardColDragLeave(e,colId){
  if(!e.currentTarget.contains(e.relatedTarget)){
    document.querySelector(`.bcol[data-col="${colId}"]`)?.classList.remove('dov');
  }
}
function boardColDrop(e,targetColId){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.bcol').forEach(c=>c.classList.remove('dov'));
  document.querySelectorAll('.bcard.drag-over').forEach(c=>c.classList.remove('drag-over'));
  // Column reorder
  if(dragBoardColId&&dragBoardColId!==targetColId){
    const fromIdx=boardCols.findIndex(c=>c.id===dragBoardColId);
    const toIdx=boardCols.findIndex(c=>c.id===targetColId);
    if(fromIdx>=0&&toIdx>=0){
      const[col]=boardCols.splice(fromIdx,1);
      boardCols.splice(toIdx,0,col);
      saveIndex();renderBoard();showToast('Columna movida ✓','ok');
    }
    return;
  }
  // Task to column
  if(dragTaskColId&&dragTaskId){
    if(dragTaskColId===targetColId)return;
    const fromCol=boardCols.find(c=>c.id===dragTaskColId);
    const toCol=boardCols.find(c=>c.id===targetColId);
    if(!fromCol||!toCol)return;
    const ti=fromCol.tasks.findIndex(t=>String(t.id)===String(dragTaskId));
    if(ti>=0){const[task]=fromCol.tasks.splice(ti,1);toCol.tasks.unshift(task);}
    dragTaskColId=null;dragTaskId=null;
    const movedT=toCol.tasks.find(t=>String(t.id)===String(task?.id));if(movedT)saveBoardTask(movedT,toCol.id);saveIndex();renderBoard();showToast('Tarea movida ✓','ok');
  }
}

// TASK DRAG (reorder within column or move between columns)
function startDragTask(e,colId,taskId){
  dragTaskColId=colId;dragTaskId=taskId;
  e.dataTransfer.setData('taskData',JSON.stringify({colId,taskId}));
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
  setTimeout(()=>{const el=e.target.closest('.bcard');if(el)el.classList.add('dragging');},0);
}
function endDragTask(e){
  document.querySelectorAll('.bcard.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.bcard.drag-over').forEach(el=>el.classList.remove('drag-over'));
  document.querySelectorAll('.bcol.dov').forEach(el=>el.classList.remove('dov'));
  dragTaskColId=null;dragTaskId=null;
}
function taskDragOver(e,colId,taskIndex){
  e.preventDefault();e.stopPropagation();
  if(!dragTaskColId)return;
  document.querySelectorAll('.bcard.drag-over').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
  // Handle drop within same column to reorder
  e.currentTarget.ondrop=function(ev){
    ev.preventDefault();ev.stopPropagation();
    document.querySelectorAll('.bcol').forEach(c=>c.classList.remove('dov'));
    document.querySelectorAll('.bcard.drag-over').forEach(c=>c.classList.remove('drag-over'));
    if(!dragTaskColId||!dragTaskId)return;
    const fromCol=boardCols.find(c=>c.id===dragTaskColId);
    const toCol=boardCols.find(c=>c.id===colId);
    if(!fromCol||!toCol)return;
    const fromIdx=fromCol.tasks.findIndex(t=>String(t.id)===String(dragTaskId));
    if(fromIdx<0)return;
    if(dragTaskColId===colId){
      // Reorder within same column
      const[task]=fromCol.tasks.splice(fromIdx,1);
      const insertAt=taskIndex>fromIdx?taskIndex:taskIndex;
      toCol.tasks.splice(insertAt,0,task);
    }else{
      // Move to different column at position
      const[task]=fromCol.tasks.splice(fromIdx,1);
      toCol.tasks.splice(taskIndex,0,task);
    }
    dragTaskColId=null;dragTaskId=null;
    const movedT2=toCol.tasks.find(t=>String(t.id)===String(task?.id));if(movedT2)saveBoardTask(movedT2,toCol.id);saveIndex();renderBoard();showToast('Tarea movida ✓','ok');
  };
}
function setupBoardAutoScroll(){
  const bw=document.getElementById('bw-scroll');if(!bw)return;
  bw.addEventListener('dragover',e=>{
    const rect=bw.getBoundingClientRect();
    const edge=80;
    if(e.clientX<rect.left+edge)bw.scrollLeft-=10;
    else if(e.clientX>rect.right-edge)bw.scrollLeft+=10;
  });
}
// drag vars declared above
async function toggleTask(colId,taskId){
  const col=boardCols.find(c=>c.id===colId);
  const t=col?.tasks.find(t=>String(t.id)===String(taskId));
  if(!t)return;
  t.done=!t.done;
  if(t.done)t.doneAt=today();
  // Automatización: si esta tarjeta está enlazada a un reel, sincronizar su estado en la ficha del cliente
  if(t.linkedClientId&&t.linkedReelId&&t.linkedProdStep){
    const lc=clients.find(c=>c.id===t.linkedClientId);
    if(lc){
      const monthsToCheck=t.linkedMonth?[t.linkedMonth]:Object.keys(lc.reels||{});
      for(const mk of monthsToCheck){
        const r=(lc.reels[mk]||[]).find(r=>r.id===t.linkedReelId);
        if(r){
          r[t.linkedProdStep]=t.done;
          if(t.done&&t.linkedProdStep==='subido')r.fechaSubidoTS=new Date().toISOString();
          await saveClient_doc(lc);
          if(activeClient?.id===lc.id&&document.getElementById('view-profile')?.classList.contains('on'))renderProfile(lc);
          break;
        }
      }
    }
  }
  // Update UI instantly
  renderBoard();
  // If marked done, move to finalized column if one is set
  if(t.done){
    const finalCol=boardCols.find(c=>c.isFinal);
    if(finalCol&&finalCol.id!==colId){
      col.tasks=col.tasks.filter(tt=>String(tt.id)!==String(taskId));
      t.movedFrom=col.name;
      t.movedAt=new Date().toLocaleDateString('es-ES');
      finalCol.tasks.unshift(t);
      renderBoard();
      showToast(`✅ Tarea movida a "${finalCol.name}"`, 'ok');
      // Save async in background - only the moved task needs updating
      saveBoardTask(t,finalCol.id);
      return;
    }
  }
  // Save async in background - don't block UI
  saveBoardTask(t,colId);
}

function setFinalCol(colId){
  // Toggle - if already final, unset it
  boardCols.forEach(c=>{c.isFinal=c.id===colId?!c.isFinal:false;});
  const col=boardCols.find(c=>c.id===colId);
  saveIndex();renderBoard();
  showToast(col?.isFinal?`⭐ "${col?.name}" es ahora la columna Finalizado`:`"${col?.name}" ya no es Finalizado`,'ok');

function clearColTasks(colId){

async function col_clear(colId){

  col.tasks=[];renderBoard();

function deleteCol(colId){
  const col=boardCols.find(c=>c.id===colId);if(!col)return;
  const mc=document.getElementById('modal-c');
  mc.innerHTML=`<div class="modal-t">¿Eliminar "${col.name}"?</div>

    <div class="modal-acts">
      <button class="btn btn-s" onclick="closeModal()">Cancelar</button>

async function col_delete(colId){
  const col=boardCols.find(c=>c.id===colId);
  if(col){await Promise.all(col.tasks.map(t=>deleteBoardTask(t.id)));}
  boardCols=boardCols.filter(c=>c.id!==colId);

function addBoardCol(){
  const name=prompt('Nombre de la nueva columna:');
  if(!name)return;
  boardCols.push({id:'col'+Date.now(),name,color:'var(--bd2)',tasks:[]});
  saveIndex();renderBoard();showToast('Columna añadida ✓','ok');

function toggleColMenu(id){
  document.querySelectorAll('.drop-menu').forEach(m=>m.classList.remove('open'));
  const m=document.getElementById('cm-'+id);if(m)m.classList.toggle('open');
}
document.addEventListener('click',e=>{if(!e.target.closest('.dot-btn'))document.querySelectorAll('.drop-menu').forEach(m=>m.classList.remove('open'));});
function copyCol(id){
  const col=boardCols.find(c=>c.id===id);if(!col)return;
  const newCol={...col,id:'col'+Date.now(),name:col.name+' (copia)',tasks:JSON.parse(JSON.stringify(col.tasks)).map((t,i)=>({...t,id:Date.now()+i+Math.random()}))};
  const idx=boardCols.findIndex(c=>c.id===id);
  boardCols.splice(idx+1,0,newCol);
  saveIndex();for(const t of newCol.tasks)saveBoardTask(t,newCol.id);renderBoard();showToast('Lista copiada ✓','ok');

function handleImageUpload(event,colId,taskId){
  const files=event.target.files;
  if(!files.length)return;
  const col=boardCols.find(c=>c.id===colId);
  const t=col?.tasks.find(t=>String(t.id)===String(taskId));if(!t)return;
  if(!t.images)t.images=[];
  let loaded=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=async e=>{
      t.images.push(e.target.result);
      loaded++;
      if(loaded===files.length){
        // Save images to Firebase immediately
        try{
          const si=await fbGet('crm','board_images')||{data:{}};
          if(!si.data)si.data={};
          si.data[t.id]=t.images;
          await fbSet('crm','board_images',{data:si.data,u:new Date().toISOString()});
        }catch(e){}
        openTaskDetail(colId,taskId);
        showToast(`${loaded} imagen${loaded>1?'es':''} subida${loaded>1?'s':''} ✓`,'ok');
      }
    };
    reader.readAsDataURL(file);
  });
}
function handleImageDrop(event,colId,taskId){
  event.preventDefault();
  const el=document.getElementById('td-drop');if(el)el.style.borderColor='var(--bd2)';
  const files=event.dataTransfer.files;
  if(!files.length)return;
  handleImageUpload({target:{files}},colId,taskId);
}
async function removeTaskImage(colId,taskId,i){

  const t=col?.tasks.find(t=>String(t.id)===String(taskId));if(!t||!t.images)return;

}

function checkAutoTasksForCM(){
  const todayStr=today();
  clients.forEach(c=>{
    if(!c.cm||!c.pubCal)return;
    const mk=monthKey();
    const pubCalMonth=c.pubCal[mk]||{};
    const reels=c.reels[mk]||[];
    reels.forEach(r=>{
      const pd=pubCalMonth[r.id]||{};
      // Check trial date
      if(pd.trial===todayStr&&!pd.trialTaskCreated){
        createAutoTask(`📤 Trial Instagram — ${r.label} (${c.name})`,c.cm,todayStr,c,{linkedClientId:c.id,linkedReelId:r.id,network:'trial_ig',linkedMonth:mk});
        pd.trialTaskCreated=true;
      }
      // Check pub date
      if(pd.pub===todayStr&&!pd.pubTaskCreated){
        const timeStr=pd.pubTime?` a las ${pd.pubTime}`:'';
        createAutoTask(`📸 Publicar Instagram${timeStr} — ${r.label} (${c.name})`,c.cm,todayStr,c,{linkedClientId:c.id,linkedReelId:r.id,linkedProdStep:'subido',network:'ig',linkedMonth:mk});
        pd.pubTaskCreated=true;
      }
      // Check tiktok
      if(pd.tiktok===todayStr&&!pd.tiktokTaskCreated){
        const timeStr=pd.tiktokTime?` a las ${pd.tiktokTime}`:'';
        createAutoTask(`🎵 Publicar TikTok${timeStr} — ${r.label} (${c.name})`,c.cm,todayStr,c,{linkedClientId:c.id,linkedReelId:r.id,linkedProdStep:'subido',network:'tiktok',linkedMonth:mk});
        pd.tiktokTaskCreated=true;
      }
    });
  });
  saveClients();
}

function createAutoTask(title,cmName,date,client,linked=null){
  // Find the column with the CM's name
  let col=boardCols.find(c=>c.name.toLowerCase()===cmName.toLowerCase());
  // If not found by exact match, try partial
  if(!col)col=boardCols.find(c=>c.name.toLowerCase().includes(cmName.toLowerCase()));
  // If still not found, don't create - we don't want it in random columns
  if(!col)return null;
  // Avoid duplicates
  if(col.tasks.some(t=>t.title===title&&t.date===date))return null;
  const newAutoTask={id:Date.now()+Math.random(),title,client:client?.name||'',date,done:false,createdBy:'Sistema',autoTask:true,
    ...(linked?{linkedClientId:linked.linkedClientId,linkedReelId:linked.linkedReelId,linkedProdStep:linked.linkedProdStep??null,network:linked.network??null,linkedMonth:linked.linkedMonth??null}:{})};
  col.tasks.unshift(newAutoTask);
  saveBoardTask(newAutoTask,col.id);saveIndex();
  renderBoard();
  showToast(`📋 Tarea para ${cmName} creada`,'ok');
  return newAutoTask;
}
function autoAddDriveLink(colId,taskId,clientName){
  const c=clients.find(c=>c.name===clientName);
  if(!c)return;
  const driveUrl=c.driveMain||(c.drive||{}).reelsEdit||'';
  if(!driveUrl)return;
  const col=boardCols.find(col=>col.id===colId);
  if(!col)return;
  const t=col.tasks.find(t=>t.id==taskId||t.id===taskId);
  if(!t)return;
  if(!t.links)t.links=[];
  if(t.links.some(l=>l.url===driveUrl))return;
  t.links.push({url:driveUrl,label:'📁 Drive — '+clientName});
  saveBoardTask(t,colId);
  openTaskDetail(colId,taskId);
}
async function saveTaskDetail(colId,taskId){
  const col=boardCols.find(c=>c.id===colId);
  const t=col?.tasks.find(t=>String(t.id)===String(taskId));
  if(!t)return;
  // Read ALL values BEFORE closing modal
  t.title=document.getElementById('td-title')?.value||t.title;
  t.date=document.getElementById('td-date')?.value||'';
  t.client=document.getElementById('td-cl')?.value||'';
  t.desc=document.getElementById('td-desc')?.value||'';
  t.labels=[...document.querySelectorAll('[id^="lc-"]')].filter(el=>el.dataset.sel==='1').map(el=>parseInt(el.id.replace('lc-','')));
  const tdType=document.getElementById('td-type')?.value||'normal';
  if(tdType==='normal'){
    t.linkedClientId=null;t.linkedReelId=null;t.linkedProdStep=null;t.network=null;t.linkedMonth=null;
  }else{
    const meta=NT_TYPE_META[tdType];
    const tc=clients.find(cl=>cl.name===t.client);
    const mk=document.getElementById('td-month')?.value||monthKey();
    const reelId=document.getElementById('td-reel')?.value;
    const reel=((tc?.reels||{})[mk]||[]).find(r=>String(r.id)===String(reelId));
    if(!tc||!reel)return showToast('Elige un cliente y un reel para este tipo de tarea','err');
    t.linkedClientId=tc.id;t.linkedReelId=reel.id;t.linkedProdStep=meta.step;t.network=meta.network;t.linkedMonth=mk;
  }
  // checklist already saved live via addCheck/toggleCheck/removeCheck
  // Save task to Firebase BEFORE closing
  await saveBoardTask(t,colId);
  // Save images separately if any
  if(t.images&&t.images.length){
    try{
      const si=await fbGet('crm','board_images')||{data:{}};
      if(!si.data)si.data={};
      si.data[t.id]=t.images;
      await fbSet('crm','board_images',{data:si.data,u:new Date().toISOString()});
    }catch(e){}
  }
  closeModal();
  renderBoard();
  showToast('Tarjeta guardada ✓','ok');
}

function createPortalAutoTask(title){
  const adriCol=boardCols.find(c=>c.id==='adri');
  const alanCol=boardCols.find(c=>c.id==='alan');
  const baseId=Date.now();
  if(adriCol){const t1={id:baseId,title,client:activePortalClient?.name||'',date:today(),done:false};adriCol.tasks.unshift(t1);saveBoardTask(t1,adriCol.id);}
  if(alanCol){const t2={id:baseId+1,title,client:activePortalClient?.name||'',date:today(),done:false};alanCol.tasks.unshift(t2);saveBoardTask(t2,alanCol.id);}
  renderBoardBadge();
}

// ============================================================
// PUBLICACIONES (última publicación IG/TikTok por cliente)
// ============================================================
function inferNetworkFromTitle(title){
  if(!title)return null;
  if(/^📤 Trial Instagram|^📲 Subir a Trial/.test(title))return'trial_ig';
  if(/^📸 Publicar Instagram|^📤 Publicar:/.test(title))return'ig';
  if(/^🎵 Publicar TikTok/.test(title))return'tiktok';
  return null;
}
function renderPublicaciones(){
  // Solo clientes con un CM asignado (a los que sí les subimos contenido), y si soy CM, solo los míos
  const mc=myClients().filter(c=>c.cm&&(CU?.level!=='cm'||c.cm===CU.name));
  const todayD=today();
  const daysSince=d=>d?Math.max(0,Math.floor((new Date(todayD+'T12:00:00')-new Date(d+'T12:00:00'))/864e5)):null;
  // Recorre TODAS las tarjetas del tablero: para cada una marcada como hecha y con una red asociada,
  // guarda por cliente+red la fecha de completado más reciente. El cliente se resuelve por
  // linkedClientId si la tarjeta está enlazada, o si no por coincidencia de nombre (tarjetas antiguas/manuales).
  // Se usa doneAt si existe, y si no la fecha puesta en la propia tarjeta (tarjetas completadas antes de
  // que existiera doneAt) — así una tarjeta ya marcada como hecha no aparece como "Nunca" por falta de dato.
  // La red se lee de t.network si existe, y si no se infiere del título (tarjetas creadas antes de que
  // existiera ese campo) para que el histórico ya en el tablero cuente desde ya.
  const last={};
  const bumpLast=(cid,net,d)=>{if(!cid||!net||!d)return;if(!last[cid])last[cid]={};if(!last[cid][net]||d>last[cid][net])last[cid][net]=d;};
  boardCols.forEach(col=>{
    (col.tasks||[]).forEach(t=>{
      if(!t.done)return;
      const net=t.network||inferNetworkFromTitle(t.title);
      if(!net)return;
      const d=t.doneAt||t.date;
      let cid=t.linkedClientId;
      if(!cid){const found=clients.find(cl=>cl.name===t.client);cid=found?.id;}
      bumpLast(cid,net,d);
    });
  });
  // Respaldo: mucho contenido se marca "subido" directamente en la ficha del cliente sin pasar por
  // una tarjeta del tablero. En ese caso usamos la fecha de publicación del Calendario (se calcula
  // sola al marcar un reel como grabado) para que no salga "Nunca" cuando sí hay una fecha real.
  mc.forEach(c=>{
    Object.keys(c.pubCal||{}).forEach(mk=>{
      const reels=c.reels[mk]||[];
      Object.entries(c.pubCal[mk]).forEach(([rid,pd])=>{
        const reel=reels.find(r=>String(r.id)===String(rid));
        if(!reel||!reel.subido)return;
        bumpLast(c.id,'ig',pd.pub);
        bumpLast(c.id,'tiktok',pd.tiktok);
      });
    });
  });
  const rows=mc.map(c=>{
    const l=last[c.id]||{};
    const hasTikTok=(c.socialNets||['instagram']).includes('tiktok');
    const hasTrial=c.trialsEnabled!==false&&(c.socialNets||['instagram']).includes('instagram');
    const trialDays=hasTrial?daysSince(l.trial_ig):null;
    const igDays=daysSince(l.ig);
    const ttDays=hasTikTok?daysSince(l.tiktok):null;
    const urgency=Math.max(igDays===null?9999:igDays,hasTikTok?(ttDays===null?9999:ttDays):-1,hasTrial?(trialDays===null?9999:trialDays):-1);
    return{c,trialDays,igDays,ttDays,hasTikTok,hasTrial,urgency};
  }).sort((a,b)=>b.urgency-a.urgency);
  const fmtAgo=days=>{
    if(days===null)return`<span style="color:var(--err);font-weight:600">Nunca</span>`;
    if(days===0)return`<span style="color:var(--ok2)">Hoy</span>`;
    if(days<=3)return`<span style="color:var(--tx2)">Hace ${days}d</span>`;
    if(days<=10)return`<span style="color:var(--warn)">Hace ${days}d</span>`;
    return`<span style="color:var(--err);font-weight:600">Hace ${days}d</span>`;
  };
  document.getElementById('view-publicaciones').innerHTML=`
    <div class="card">
      <div class="card-t"><i class="ti ti-chart-line"></i>Última publicación por cliente</div>
      <div style="font-size:11px;color:var(--tx3);margin-bottom:10px">Ordenado por más tiempo sin publicar primero — se calcula con las tarjetas del tablero marcadas como hechas (Subir a Trial Instagram / Subir a Instagram / Subir a TikTok). Haz clic en un cliente para ver el detalle por reel.</div>
      <table style="width:100%;font-size:13px;border-collapse:collapse">
        <tr style="color:var(--tx3);font-size:11px;text-transform:uppercase">
          <th style="text-align:left;padding:6px;font-weight:500">Cliente</th>
          <th style="text-align:right;padding:6px;font-weight:500">📲 Trial Instagram</th>
          <th style="text-align:right;padding:6px;font-weight:500"><i class="ti ti-brand-instagram"></i> Instagram</th>
          <th style="text-align:right;padding:6px;font-weight:500"><i class="ti ti-brand-tiktok"></i> TikTok</th>
        </tr>
        ${rows.map(r=>`<tr style="border-top:1px solid var(--bd);cursor:pointer" onclick="openPubClientDetail('${r.c.id}')">
          <td style="padding:8px 6px;font-weight:500">${r.c.name}</td>
          <td style="padding:8px 6px;text-align:right">${r.hasTrial?fmtAgo(r.trialDays):'<span style="color:var(--tx3)">—</span>'}</td>
          <td style="padding:8px 6px;text-align:right">${fmtAgo(r.igDays)}</td>
          <td style="padding:8px 6px;text-align:right">${r.hasTikTok?fmtAgo(r.ttDays):'<span style="color:var(--tx3)">—</span>'}</td>
        </tr>`).join('')}
      </table>
      ${!rows.length?`<div style="text-align:center;padding:30px;color:var(--tx3)">Sin clientes para mostrar.</div>`:''}
    </div>`;
}
function openPubClientDetail(clientId){
  const c=clients.find(cl=>cl.id===clientId);if(!c)return;
  const mk=monthKey();
  const reels=(c.reels||{})[mk]||[];
  const hasTikTok=(c.socialNets||['instagram']).includes('tiktok');
  const hasTrial=c.trialsEnabled!==false&&(c.socialNets||['instagram']).includes('instagram');
  // Recorre las tarjetas del tablero enlazadas a este cliente: fecha de subida (hechas) o "Pendiente" (creadas, sin marcar)
  const byReel={},pending={};
  boardCols.forEach(col=>{
    (col.tasks||[]).forEach(t=>{
      const net=t.network||inferNetworkFromTitle(t.title);
      if(!net||!t.linkedReelId)return;
      let cid=t.linkedClientId;
      if(!cid){const found=clients.find(cl=>cl.name===t.client);cid=found?.id;}
      if(cid!==clientId)return;
      if(t.linkedMonth&&t.linkedMonth!==mk)return; // pertenece a otro mes, no mezclar con los reels de este mes
      if(t.done){
        const d=t.doneAt||t.date;if(!d)return;
        if(!byReel[t.linkedReelId])byReel[t.linkedReelId]={};
        if(!byReel[t.linkedReelId][net]||d>byReel[t.linkedReelId][net])byReel[t.linkedReelId][net]=d;
      }else{
        if(!t.date)return;
        if(!pending[t.linkedReelId])pending[t.linkedReelId]={};
        if(!pending[t.linkedReelId][net]||t.date<pending[t.linkedReelId][net])pending[t.linkedReelId][net]=t.date;
      }
    });
  });
  // Respaldo: reels marcados "subido" directamente en la ficha, sin tarjeta de por medio
  Object.keys(c.pubCal||{}).forEach(pmk=>{
    const pReels=c.reels[pmk]||[];
    Object.entries(c.pubCal[pmk]).forEach(([rid,pd])=>{
      const reel=pReels.find(r=>String(r.id)===String(rid));
      if(!reel||!reel.subido)return;
      if(!byReel[rid])byReel[rid]={};
      if(pd.pub&&(!byReel[rid].ig||pd.pub>byReel[rid].ig))byReel[rid].ig=pd.pub;
      if(pd.tiktok&&(!byReel[rid].tiktok||pd.tiktok>byReel[rid].tiktok))byReel[rid].tiktok=pd.tiktok;
    });
  });
  const netCols=[
    ...(hasTrial?[{key:'trial_ig',label:'Trial IG'}]:[]),
    {key:'ig',label:'Instagram'},
    ...(hasTikTok?[{key:'tiktok',label:'TikTok'}]:[]),
  ];
  const cell=(reelId,key)=>{
    const done=byReel[reelId]?.[key];
    if(done)return`<span style="color:var(--ok2)">${fmtDate(done)}</span>`;
    const pend=pending[reelId]?.[key];
    if(pend)return`<span style="color:var(--warn)">${fmtDate(pend)} <span style="font-size:11px">(pendiente)</span></span>`;
    return`<span style="color:var(--tx3)">—</span>`;
  };
  const mc=document.getElementById('modal-c');
  mc.style.maxWidth='560px';
  mc.innerHTML=`<div class="modal-t">${c.name} — Reels de ${monthLabel(mk)}</div>
    <table style="width:100%;font-size:13px;border-collapse:collapse;margin-top:8px">
      <tr style="color:var(--tx3);font-size:11px;text-transform:uppercase">
        <th style="text-align:left;padding:6px;font-weight:500">Reel</th>
        ${netCols.map(nc=>`<th style="text-align:right;padding:6px;font-weight:500">${nc.label}</th>`).join('')}
      </tr>
      ${reels.length?reels.map(r=>`<tr style="border-top:1px solid var(--bd)">
        <td style="padding:8px 6px;font-weight:500">${r.label}</td>
        ${netCols.map(nc=>`<td style="padding:8px 6px;text-align:right">${cell(r.id,nc.key)}</td>`).join('')}
      </tr>`).join(''):`<tr><td colspan="${netCols.length+1}" style="text-align:center;padding:20px;color:var(--tx3)">Sin reels este mes.</td></tr>`}
    </table>
    <div class="modal-acts"><button class="btn btn-s" onclick="closeModal()">Cerrar</button></div>`;
  document.getElementById('mo').classList.add('open');
}

function renderCal(){
  if(calView==='week'){renderCalWeek();return;}
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const startDay=first.getDay()||7;
  const days=['L','M','X','J','V','S','D'];
  const nav2=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <button class="btn btn-s" onclick="calNav(-1)"><i class="ti ti-chevron-left"></i></button>
    <button class="btn btn-s" onclick="calGoToday()">Hoy</button>
    <button class="btn btn-s" onclick="calNav(1)"><i class="ti ti-chevron-right"></i></button>
    <div class="st" style="flex:1">${MONTHS[calMonth]} ${calYear}</div>
    <select class="mbtn" onchange="calChangeView(this.value)" style="border-radius:20px;padding:4px 10px">
      <option value="month"${calView==='month'?' selected':''}>Mes</option>
      <option value="week"${calView==='week'?' selected':''}>Semana</option>
    </select>
    <button class="btn btn-s btn-p" onclick="openModal('event')"><i class="ti ti-plus"></i>Evento</button>
  </div>`;
  let grid=`<div class="cal-grid">${days.map(d=>`<div class="cal-day-hdr">${d}</div>`).join('')}`;
  for(let i=1;i<startDay;i++)grid+=`<div class="cal-day om"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today();
    const evs=[...calEvents.filter(e=>e.date===ds),...(boardCols||[]).flatMap(col=>col.tasks||[]).filter(t=>t.date===ds).map(t=>({title:t.title,type:'task',date:ds,color:'#C084FC',time:t.time||''}))];
    evs.sort((a,b)=>(a.time||'23:59').localeCompare(b.time||'23:59'));
    const typeColors={grab:'var(--warn)',del:'var(--c)',meet:'#4ADE80',task:'#C084FC'};
    const visible=evs.slice(0,3);
    const hidden=evs.length-3;
    grid+=`<div class="cal-day${isT?' today':''}" onclick="showCalDay('${ds}',event)" style="cursor:pointer">
      <div class="cal-dn">${d}</div>
      ${visible.map(e=>{
        const col=e.color||typeColors[e.type]||'var(--c)';
        const timeStr=e.time?e.time.replace(':00','').replace(/^0/,'')+' '  :'';
        const short=(timeStr+e.title).substring(0,14);
        return`<div style="font-size:10px;padding:1px 3px;border-radius:2px;margin-top:2px;overflow:hidden;white-space:nowrap;background:${col}22;color:${col};border-left:2px solid ${col}">${short}</div>`;
      }).join('')}
      ${hidden>0?`<div style="font-size:9px;color:var(--tx3);margin-top:2px;padding:0 2px">+${hidden} más</div>`:''}
    </div>`;
  }
  grid+='</div><div id="cal-day-detail" style="margin-top:8px"></div>';
  document.getElementById('view-cal').innerHTML=nav2+grid;
}
function showCalDay(ds,evt){
  evt&&evt.stopPropagation();
  const evs=[...calEvents.filter(e=>e.date===ds),...(boardCols||[]).flatMap(col=>col.tasks||[]).filter(t=>t.date===ds).map(t=>({title:'📋 '+t.title,type:'task',date:ds,color:'#C084FC'}))];
  evs.sort((a,b)=>(a.time||'23:59').localeCompare(b.time||'23:59'));
  const el=document.getElementById('cal-day-detail');if(!el)return;
  const[y,m,d]=ds.split('-');
  const label=parseInt(d)+' de '+MONTHS[parseInt(m)-1]+' '+y;
  if(el.dataset.date===ds){el.innerHTML='';el.dataset.date='';return;}
  el.dataset.date=ds;
  const typeColors={grab:'var(--warn)',del:'var(--c)',meet:'#4ADE80',task:'#C084FC'};
  el.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rl);padding:14px;animation:fadeIn .15s ease">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:13px;font-weight:600">${label}</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-s btn-p" onclick="openModal('event','',null,'${ds}')"><i class="ti ti-plus"></i>Añadir</button>
        <button class="btn btn-s" onclick="document.getElementById('cal-day-detail').innerHTML='';document.getElementById('cal-day-detail').dataset.date=''"><i class="ti ti-x"></i></button>
      </div>
    </div>
    ${evs.length?evs.map(e=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:8px;background:var(--bg3);border-radius:var(--r);margin-bottom:6px;border-left:3px solid ${e.color||typeColors[e.type]||'var(--c)'}">
      ${e.time?`<span style="font-size:11px;font-weight:600;color:${e.color||typeColors[e.type]||'var(--c)'};white-space:nowrap;min-width:40px">${e.time}</span>`:'<span style="min-width:40px"></span>'}
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${e.title}</div>
        ${e.client?`<div style="font-size:11px;color:var(--tx3);margin-top:2px">${e.client}</div>`:''}
      </div>
    </div>`).join(''):`<div style="text-align:center;padding:12px;color:var(--tx3);font-size:13px">Sin eventos. <span style="color:var(--c);cursor:pointer" onclick="openModal('event','',null,'${ds}')">Añadir uno</span></div>`}
  </div>`;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function renderCalWeek(){
  const todayDate=new Date();
  const dow=todayDate.getDay()||7;
  const monday=new Date(todayDate);monday.setDate(todayDate.getDate()-dow+1);
  const days=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
  const hours=Array.from({length:14},(_,i)=>i+8);
  const nav2=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
    <button class="btn btn-s" onclick="calGoToday()">Hoy</button>
    <div class="st" style="flex:1">Semana del ${monday.getDate()} ${MONTHS[monday.getMonth()]}</div>
    <select class="mbtn" onchange="calChangeView(this.value)" style="border-radius:20px;padding:4px 10px">
      <option value="month">Mes</option>
      <option value="week" selected>Semana</option>
    </select>
    <button class="btn btn-s btn-p" onclick="openModal('event')"><i class="ti ti-plus"></i>Evento</button>
  </div>`;
  let table=`<div style="overflow-x:auto"><table class="week-table">
    <tr><th class="week-hr"></th>${weekDates.map((d,i)=>{
      const isT=d.toISOString().split('T')[0]===today();
      return`<th><div style="font-size:11px;color:var(--tx3)">${days[i]}</div>
        <div style="font-size:18px;font-weight:600;color:${isT?'var(--c)':'var(--tx)'};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto;background:${isT?'var(--cdim)':'transparent'}">${d.getDate()}</div>
      </th>`;
    }).join('')}</tr>
    ${hours.map(h=>`<tr>
      <td class="week-hr">${h}:00</td>
      ${weekDates.map(d=>{
        const ds=d.toISOString().split('T')[0];
        const evs=calEvents.filter(e=>e.date===ds);
        return`<td onclick="openModal('event','',null,'${ds}')">
          ${evs.map(e=>`<div class="cal-ev ${e.type}">${e.title}</div>`).join('')}
        </td>`;
      }).join('')}
    </tr>`).join('')}
  </table></div>`;
  document.getElementById('view-cal').innerHTML=nav2+table;
}
function calNav(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function calGoToday(){calYear=new Date().getFullYear();calMonth=new Date().getMonth();calView='month';renderCal();}
function calChangeView(v){calView=v;renderCal();}

function renderPayments(){
  const payees=Object.values(USERS).filter(u=>u.level!=='ceo').map(u=>({name:u.name,role:u.role})).sort((a,b)=>a.name.localeCompare(b.name));
  const totalPend=paymentsList.filter(p=>!p.paid).reduce((s,p)=>s+p.importe,0);
  const totalPaid=paymentsList.filter(p=>p.paid).reduce((s,p)=>s+p.importe,0);
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div class="st">Pagos equipo</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span style="font-size:12px;background:rgba(34,197,94,.12);color:#4ADE80;padding:4px 10px;border-radius:20px;font-weight:600">✓ Pagado: ${totalPaid.toLocaleString('es')}€</span>
      <span style="font-size:12px;background:rgba(245,158,11,.12);color:var(--warn);padding:4px 10px;border-radius:20px;font-weight:600">⏳ Pendiente: ${totalPend.toLocaleString('es')}€</span>
    </div>
  </div>`;
  payees.forEach(({name,role})=>{
    const all=paymentsList.filter(p=>p.editor===name).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const pend=all.filter(p=>!p.paid).reduce((s,p)=>s+p.importe,0);
    html+=`<div class="card" style="margin-bottom:14px">
      <div class="card-t" style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">
        <i class="ti ti-user"></i>${name} · ${role}
        ${pend>0?`<span style="font-size:11px;background:rgba(245,158,11,.12);color:var(--warn);padding:2px 8px;border-radius:20px">${pend.toLocaleString('es')}€ pendiente</span>`:''}
        <button class="btn btn-s" style="margin-left:auto" onclick="openModal('payment','${name}')"><i class="ti ti-plus"></i>Añadir</button>
      </div>
      ${all.length?`<table class="pay-table" style="width:100%">
        <tr><th>Concepto</th><th>Importe</th><th>Fecha</th><th>Mes</th><th>Estado</th><th></th></tr>
        ${all.map((p,i)=>{
          const globalIdx=paymentsList.indexOf(p);
          return`<tr>
            <td>${p.concepto}</td>
            <td style="color:var(--c);font-weight:600">${currSymbol(p.currency||'EUR')+p.importe}</td>
            <td style="font-size:11px;color:var(--tx3)">${p.date?fmtDate(p.date):'—'}</td>
            <td style="font-size:11px;color:var(--tx3)">${monthLabel(p.month)||p.month}</td>
            <td><span class="badge ${p.paid?'badge-ok':'badge-warn'}" style="cursor:pointer" onclick="togglePayGlobal(${globalIdx})">${p.paid?'✓ Pagado':'Pendiente'}</span></td>
            <td style="display:flex;gap:4px">
              <button class="btn btn-s" onclick="editPayGlobal(${globalIdx})"><i class="ti ti-pencil"></i></button>
              <button class="btn btn-s btn-danger" onclick="delPayGlobal(${globalIdx})"><i class="ti ti-trash"></i></button>
            </td>
          </tr>`;
        }).join('')}
      </table>`:`<div style="text-align:center;padding:16px;color:var(--tx3);font-size:12px">Sin pagos registrados</div>`}
    </div>`;
  });
  document.getElementById('view-payments').innerHTML=html;
}

async function togglePayGlobal(i){if(paymentsList[i]){paymentsList[i].paid=!paymentsList[i].paid;savePayments();renderPayments();}}
function delPayGlobal(i){if(!confirm('¿Eliminar?'))return;paymentsList.splice(i,1);savePayments();renderPayments();showToast('Eliminado','ok');}
function editPayGlobal(i){
  const p=paymentsList[i];if(!p)return;
  const mc=document.getElementById('modal-c');
  mc.innerHTML=`<div class="modal-t">Editar pago — ${p.editor}</div>
    <div class="f"><label>Concepto</label><input id="ep-c" value="${p.concepto}"></div>
    <div class="fg2">
      <div class="f"><label>Importe (€)</label><input id="ep-i" type="number" value="${p.importe}"></div>
