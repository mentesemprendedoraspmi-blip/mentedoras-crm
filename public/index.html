<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentedoras</title>
<meta name="theme-color" content="#00E5E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mentedoras">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c:#00E5E5;--cd:#00B8B8;--cdim:rgba(0,229,229,.12);
  --bg:#111418;--bg2:#181D23;--bg3:#1E2530;--bg4:#252D38;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);
  --tx:#F0F4F8;--tx2:#8FA3B8;--tx3:#4A6078;
  --ok:#22C55E;--warn:#F59E0B;--err:#EF4444;
  --r:8px;--rl:12px;--rxl:16px;
  --s1:0 1px 4px rgba(0,0,0,.4);--s2:0 4px 16px rgba(0,0,0,.5);--s3:0 8px 32px rgba(0,0,0,.6)
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
body.light{--bg:#F0F4F8;--bg2:#fff;--bg3:#E8EEF5;--bg4:#D8E2ED;--bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.13);--tx:#1A2332;--tx2:#4A5568;--tx3:#8FA3B8}
body.blue{--bg:#0A1628;--bg2:#0F2040;--bg3:#162850;--bg4:#1D3360;--bd:rgba(0,229,229,.1);--bd2:rgba(0,229,229,.18);--tx:#E8F4FF;--tx2:#7FB3D3;--tx3:#3A6080}
::-webkit-scrollbar{width:6px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--tx3)}
input,select,textarea{color:var(--tx);background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--c)}
select option{background:var(--bg3)}
button{cursor:pointer;font-family:'DM Sans',sans-serif}

/* LOGIN */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(0,229,229,.08),transparent 60%),var(--bg)}
.lb{background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--rxl);padding:40px;width:100%;max-width:360px;box-shadow:var(--s3)}
.lb-logo{text-align:center;margin-bottom:28px}
.lb-logo h1{font-size:26px;font-weight:600;color:var(--c);letter-spacing:-.03em;font-style:italic}
.lb-logo p{font-size:11px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.lf{margin-bottom:13px}
.lf label{font-size:11px;font-weight:500;color:var(--tx2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:38px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);font-size:16px;padding:0}
.lb-btn{width:100%;padding:11px;background:var(--c);color:var(--bg);border:none;border-radius:var(--r);font-size:14px;font-weight:600;margin-top:4px}
.lb-btn:hover{background:var(--cd)}
.lb-err{font-size:12px;color:var(--err);text-align:center;margin-top:9px;display:none}

/* APP */
.app{display:none;height:100vh;overflow:hidden}
.app.on{display:flex}

/* SIDEBAR */
.sb{width:228px;min-width:228px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;transition:transform .3s}
.sb-top{padding:16px 14px 12px;border-bottom:1px solid var(--bd)}
.sb-logo{font-size:18px;font-weight:600;color:var(--c);font-style:italic}
.sb-sub{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.sb-u{display:flex;align-items:center;gap:8px;margin-top:10px;background:var(--bg3);border-radius:var(--r);padding:7px 9px;border:1px solid var(--bd)}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--cdim);border:1px solid rgba(0,229,229,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--c);flex-shrink:0}
.sb-uname{font-size:12px;font-weight:500}
.sb-nav{padding:8px 8px 0;flex-shrink:0}
.nl{font-size:10px;color:var(--tx3);padding:6px 8px 3px;text-transform:uppercase;letter-spacing:.07em;font-weight:500}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--tx2);transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.on{background:var(--cdim);color:var(--c);font-weight:500}
.ni i{font-size:15px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--err);color:#fff;font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600}
.sb-clients{padding:0 8px;overflow-y:auto;flex:1}
.sb-cl-hdr{display:flex;align-items:center;gap:6px;padding:6px 0 6px}
.sb-cl-hdr input{font-size:12px;padding:5px 9px;flex:1}
.sb-cl-hdr .btn-icon{width:28px;height:28px;border-radius:var(--r);background:var(--c);color:var(--bg);border:none;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sci{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.sci:hover{background:var(--bg3)}
.sci.on{background:var(--cdim)}
.sc-av{width:24px;height:24px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--c);flex-shrink:0}
.sc-n{font-size:12px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sci.on .sc-n{color:var(--c)}
.sb-bot{margin:8px;flex-shrink:0}
.sb-out{width:100%;padding:8px 12px;border-radius:var(--r);background:transparent;border:1px solid var(--bd);color:var(--tx3);font-size:12px;display:flex;align-items:center;gap:7px;transition:all .15s}
.sb-out:hover{background:var(--bg3);color:var(--tx2)}
.theme-row{display:flex;gap:5px;padding:8px 0 0;align-items:center}
.theme-row span{font-size:10px;color:var(--tx3);flex:1}
.th-btn{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
.th-btn:hover{transform:scale(1.15)}
.th-btn.on{border-color:var(--c)}
.th-dark{background:radial-gradient(circle,#252D38,#111418)}
.th-light{background:radial-gradient(circle,#fff,#E8EEF5)}
.th-blue{background:radial-gradient(circle,#1D3360,#0A1628)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:13px 22px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tbl{display:flex;align-items:center;gap:10px}
.tb-ic{width:32px;height:32px;background:var(--cdim);border-radius:var(--r);display:flex;align-items:center;justify-content:center}
.tb-ic i{font-size:16px;color:var(--c)}
.tb-t{font-size:15px;font-weight:600}
.tba{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);font-size:13px;font-weight:500;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg4);color:var(--tx)}
.btn-p{background:var(--c);color:var(--bg);border-color:var(--c);font-weight:600}
.btn-p:hover{background:var(--cd)}
.btn-s{padding:5px 10px;font-size:12px}
.btn-danger{color:var(--err);border-color:rgba(239,68,68,.3)}
.cnt{flex:1;overflow-y:auto;padding:20px}
.view{display:none}
.view.on{display:block}

/* CARDS & STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.scard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px}
.scard-ic{width:34px;height:34px;border-radius:var(--r);background:var(--cdim);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.scard-ic i{font-size:17px;color:var(--c)}
.scard-v{font-size:26px;font-weight:600;letter-spacing:-.02em}
.scard-l{font-size:12px;color:var(--tx3);margin-top:1px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}

/* CLIENT GRID */
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;cursor:pointer;transition:all .15s}
.cc:hover{border-color:rgba(0,229,229,.3);box-shadow:0 0 0 1px var(--cdim),var(--s2)}
.cc-av{width:36px;height:36px;border-radius:50%;background:var(--cdim);border:1px solid rgba(0,229,229,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--c)}
.cc-n{font-size:14px;font-weight:600;margin-top:8px}
.cc-t{font-size:11px;color:var(--tx3);margin-top:2px}
.cc-ft{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;margin:2px}

/* PROFILE */
.prof-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.prof-av{width:50px;height:50px;border-radius:50%;background:var(--cdim);border:1px solid rgba(0,229,229,.25);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:var(--c)}
.prof-name{font-size:19px;font-weight:600}
.prof-type{font-size:13px;color:var(--tx3);margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.tab{padding:8px 14px;font-size:13px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--c);border-bottom-color:var(--c);font-weight:500}
.tc{display:none}
.tc.on{display:block}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.card-t{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card-t i{font-size:14px;color:var(--c)}
.pf{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd)}
.pf:last-child{border-bottom:none}
.pf-l{font-size:12px;color:var(--tx3)}
.pf-v{font-size:13px;font-weight:500}
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.link-pill{display:inline-flex;align-items:center;gap:5px;background:var(--cdim);color:var(--c);padding:4px 9px;border-radius:var(--r);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;border:1px solid rgba(0,229,229,.15)}

/* SERVICES */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.svc-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.svc-item.on{border-color:var(--c);background:var(--cdim)}
.svc-chk{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--bd2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.svc-item.on .svc-chk{background:var(--c);border-color:var(--c)}
.svc-label{font-size:12px;color:var(--tx2);line-height:1.4}
.svc-item.on .svc-label{color:var(--c)}

/* REEL TABLE */
.month-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.mbtn{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid var(--bd2);background:transparent;color:var(--tx3);transition:all .15s}
.mbtn.on{background:var(--cdim);color:var(--c);border-color:var(--c)}
.rtable{width:100%;border-collapse:collapse}
.rtable th{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:left;border-bottom:1px solid var(--bd)}
.rtable td{padding:7px 10px;border-bottom:1px solid var(--bd);font-size:12px;color:var(--tx2);vertical-align:middle}
.rtable tr:last-child td{border-bottom:none}
.rtable tr:hover td{background:var(--bg3)}
.chk{width:16px;height:16px;border-radius:3px;border:1px solid var(--bd2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chk:hover{border-color:var(--c)}
.chk.on{background:var(--ok);border-color:var(--ok)}

/* PRODUCTION */
.prod-step{margin-bottom:8px;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.prod-step-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--bg3);transition:background .15s}
.prod-step-hdr:hover{background:var(--bg4)}
.prod-step-hdr i{font-size:14px;color:var(--tx3);transition:transform .2s}
.prod-step-hdr.open i.arr{transform:rotate(90deg)}
.prod-step-title{font-size:13px;font-weight:500;flex:1}
.prod-step-prog{font-size:11px;color:var(--tx3)}
.prod-step-body{display:none;padding:8px 14px 12px;background:var(--bg2)}
.prod-step-body.open{display:block}
.prod-reel-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--bd)}
.prod-reel-row:last-child{border-bottom:none}

/* FASE 0 */
.cl0-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .15s}
.cl0-item:hover{background:var(--bg3)}
.cl0-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cl0-chk.on{background:var(--c);border-color:var(--c)}
.cl0-txt{font-size:13px;color:var(--tx2)}
.cl0-txt.on{color:var(--tx3);text-decoration:line-through}
.prog-bar{height:4px;background:var(--bd);border-radius:4px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:var(--c);border-radius:4px;transition:width .3s}

/* BOARD */
.bw{overflow-x:auto;padding-bottom:8px}
.bcols{display:flex;gap:12px;min-width:max-content;align-items:flex-start}
.bcol{width:240px;flex-shrink:0;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:12px;display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.bcol.dov{border-color:var(--c);background:var(--cdim)}
.bcol.col-dragging{opacity:.5;border:2px dashed var(--c)}
.bcol-body{overflow-y:auto;flex:1;padding-right:2px}
.bch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd);position:relative;cursor:grab;flex-shrink:0}
.bch:active{cursor:grabbing}
.bcn{font-size:12px;font-weight:600}
.bcc{background:var(--bg3);font-size:10px;padding:1px 6px;border-radius:20px;color:var(--tx3)}
.dot-btn{cursor:pointer;color:var(--tx3);font-size:16px;padding:2px 4px;border-radius:4px}
.dot-btn:hover{background:var(--bg4);color:var(--tx)}
.drop-menu{position:absolute;right:0;top:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r);padding:4px;z-index:50;min-width:170px;box-shadow:var(--s3);display:none}
.drop-menu.open{display:block}
.dm-item{padding:7px 10px;font-size:12px;color:var(--tx2);cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:7px}
.dm-item:hover{background:var(--bg3);color:var(--tx)}
.dm-item.danger{color:var(--err)}
.bcard{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:11px 12px;margin-bottom:7px;cursor:grab;user-select:none;transition:all .15s;position:relative}
.bcard:hover{border-color:var(--bd2);box-shadow:var(--s1)}
.bcard.dragging{opacity:.4;border:1px dashed var(--c)}
.bcard.drag-over{border-top:2px solid var(--c)}
.bc-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px}
.bc-chk{width:15px;height:15px;border-radius:3px;border:1px solid var(--bd2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.bc-chk.on{background:var(--ok);border-color:var(--ok)}
.bc-title{font-size:12px;line-height:1.4;flex:1}
.bc-title.done{text-decoration:line-through;color:var(--tx3)}
.badd{width:100%;padding:7px;border:1px dashed var(--bd);border-radius:var(--r);background:transparent;font-size:12px;color:var(--tx3);display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px;transition:all .15s;flex-shrink:0}
.badd:hover{border-color:var(--c);color:var(--c);background:var(--cdim)}
.add-col-btn{width:200px;flex-shrink:0;background:var(--bg2);border:1px dashed var(--bd2);border-radius:var(--rl);padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--tx3);font-size:13px;transition:all .15s;align-self:flex-start}
.add-col-btn:hover{border-color:var(--c);color:var(--c);background:var(--cdim)}

/* PIPELINE */
.pw{overflow-x:auto;padding-bottom:8px}
.pcols{display:flex;gap:10px;min-width:1300px}
.pcol{flex:1;min-width:130px}
.pch{font-size:10px;font-weight:600;color:var(--tx3);padding:0 4px 8px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd);margin-bottom:8px}
.pcard{background:var(--bg2);border:1px solid var(--bd);border-left:2px solid var(--c);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;cursor:grab;transition:all .15s;user-select:none}
.pcard:hover{border-color:var(--bd2);box-shadow:var(--s1)}
.pcard.dragging{opacity:.5}
.pcol.dov{background:var(--cdim);border-radius:var(--r)}
.pempty{border:1px dashed var(--bd);border-radius:var(--r);padding:14px;text-align:center;font-size:11px;color:var(--tx3);min-height:60px}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-hdr{font-size:11px;font-weight:600;color:var(--tx3);text-align:center;padding:6px 0;text-transform:uppercase}
.cal-day{min-height:80px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:6px;cursor:pointer;transition:border-color .15s}
.cal-day:hover{border-color:var(--bd2)}
.cal-day.today{border-color:var(--c)}
.cal-day.om{opacity:.3}
.cal-dn{font-size:11px;font-weight:600;color:var(--tx3);margin-bottom:4px}
.cal-day.today .cal-dn{color:var(--c)}
.cal-ev{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-ev.grab{background:rgba(245,158,11,.2);color:var(--warn)}
.cal-ev.del{background:rgba(34,197,94,.2);color:#4ADE80}
.cal-ev.meet{background:var(--cdim);color:var(--c)}

/* WEEK VIEW */
.week-table{width:100%;border-collapse:collapse;min-width:700px}
.week-table th{padding:8px 4px;text-align:center;border-left:1px solid var(--bd)}
.week-table td{border-left:1px solid var(--bd);border-top:1px solid var(--bd);padding:2px;min-height:36px;vertical-align:top;cursor:pointer}
.week-table td:hover{background:var(--cdim)}
.week-hr{padding:4px 6px;font-size:10px;color:var(--tx3);vertical-align:top;white-space:nowrap;width:45px}

/* PAYMENTS */
.pay-table{width:100%;border-collapse:collapse}
.pay-table th{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--bd)}
.pay-table td{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:13px;color:var(--tx2)}
.pay-table tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
.badge-ok{background:rgba(34,197,94,.12);color:#4ADE80}
.badge-warn{background:rgba(245,158,11,.12);color:var(--warn)}
.badge-err{background:rgba(239,68,68,.12);color:var(--err)}

/* FIN */
.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.fin-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;text-align:center}
.fin-v{font-size:28px;font-weight:600;color:var(--c);letter-spacing:-.02em}
.fin-l{font-size:12px;color:var(--tx3);margin-top:4px}

/* PORTAL */
.portal{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column}
.portal.open{display:flex}
.portal-hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.portal-body{flex:1;overflow-y:auto;padding:20px 16px}
.portal-inner{max-width:600px;margin:0 auto}
.portal-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rxl);padding:20px;margin-bottom:16px}
.portal-box-t{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.mbtn-big{padding:14px 22px;border-radius:var(--rl);border:1.5px solid var(--bd2);background:var(--bg3);color:var(--tx);font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.mbtn-big:hover,.mbtn-big.on{background:var(--cdim);border-color:var(--c);color:var(--c)}
.reel-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.reel-row:last-child{border-bottom:none}
.portal-chat{border:1px solid var(--bd);border-radius:var(--rxl);overflow:hidden}
.portal-chat-hdr{padding:14px 18px;background:var(--bg3);border-bottom:1px solid var(--bd)}
.portal-msgs{height:280px;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.portal-inp-row{padding:12px 16px;border-top:1px solid var(--bd);display:flex;gap:8px}
.portal-inp{flex:1;padding:9px 13px;border:1px solid var(--bd2);border-radius:20px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--tx);background:var(--bg3)}
.portal-inp:focus{outline:none;border-color:var(--c)}
.portal-send{padding:9px 16px;background:var(--c);color:var(--bg);border:none;border-radius:20px;font-size:13px;font-weight:600;display:flex;align-items:center}
.sugg-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.sugg-btn:hover{border-color:var(--c);color:var(--c);background:var(--cdim)}
.portal-stat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;text-align:center}
.portal-stat-v{font-size:24px;font-weight:600;color:var(--c)}
.portal-stat-l{font-size:11px;color:var(--tx3);margin-top:3px}
.portal-dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.portal-next{background:var(--cdim);border:1px solid rgba(0,229,229,.2);border-radius:var(--rl);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}

.portal-next-v{font-size:16px;font-weight:600;margin-top:2px}

.msg.team{align-self:flex-end}
.msg-bub{padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5}

.msg-time{font-size:10px;color:var(--tx3);margin-top:3px;padding:0 4px}
.msg.team .msg-time{text-align:right}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--bd2);color:var(--tx);padding:10px 15px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:500;transform:translateY(60px);opacity:0;transition:all .3s;box-shadow:var(--s3)}
.toast.show{transform:translateY(0);opacity:1}

.toast.err{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3);color:var(--err)}

/* WELCOME */

/* OVERLAY */
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:70}

let db=null,fbReady=false;

function initFB(){
  return new Promise(r=>{
    if(fbReady){r();return;}
    const s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
    s1.onload=()=>{
      const s2=document.createElement('script');
      s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';
      s2.onload=()=>{
        try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.firestore();fbReady=true;}catch(e){console.warn('FB:',e);}
        r();
      };s2.onerror=r;document.head.appendChild(s2);
    };s1.onerror=r;document.head.appendChild(s1);
  });
}
async function fbSet(col,id,data){
  try{localStorage.setItem('fb_'+col+'_'+id,JSON.stringify(data));}catch(e){}
  if(!fbReady)await initFB();
  if(db){try{await db.collection(col).doc(id).set(data);}catch(e){console.warn('fbSet:',e);}}
}
async function fbGet(col,id){
  if(!fbReady)await initFB();
  if(db){try{const d=await db.collection(col).doc(id).get();if(d.exists)return d.data();}catch(e){}}
  try{const d=localStorage.getItem('fb_'+col+'_'+id);return d?JSON.parse(d):null;}catch(e){return null;}
}
async function fbListen(col,id,cb){
  if(!fbReady)await initFB();
  if(!db)return;
  try{db.collection(col).doc(id).onSnapshot(snap=>{if(snap&&snap.exists)cb(snap.data());});}catch(e){console.warn('fbListen:',e);}
}

// ============================================================

// ============================================================
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('es-ES',{day:'numeric',month:'short'});}
function monthKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function monthLabel(k){if(!k)return'';const[y,m]=k.split('-');return MONTHS[parseInt(m)-1]+' '+y;}
function dstatus(d){
  if(!d)return{cls:'',lbl:'Sin fecha'};
  const diff=Math.ceil((new Date(d+'T12:00:00')-new Date())/864e5);
  if(diff<0)return{cls:'badge-err',lbl:'🔴 '+fmtDate(d)};
  if(diff<=3)return{cls:'badge-warn',lbl:'🟡 '+fmtDate(d)};
  return{cls:'badge-ok',lbl:'🟢 '+fmtDate(d)};
}
function isCEO(){return CU?.level==='ceo';}
function isPMup(){return CU?.level==='ceo'||CU?.level==='pm';}
function isCMup(){return CU?.level==='ceo'||CU?.level==='pm'||CU?.level==='cm';}
function myClients(){
  if(isCMup())return clients;
  // editors see only assigned clients
  return clients.filter(c=>(c.editors||[]).includes(CU?.name));
}

async function saveClients(){await fbSet('crm','clients',{list:clients,u:new Date().toISOString()});}
async function saveBoard(){await fbSet('crm','board',{cols:boardCols,u:new Date().toISOString()});}

async function saveUsers(){await fbSet('crm','users',{users:USERS,u:new Date().toISOString()});}

async function loadAll(){
  if(!fbReady)await initFB();
  try{
    const sc=await fbGet('crm','clients');
    if(sc&&sc.list&&sc.list.length){
      clients=sc.list.map(fc=>{
        const def=clients.find(c=>c.id===fc.id)||{};
        return{...def,...fc,msgs:fc.msgs||[],reels:fc.reels||mkMonths(fc.numReels||5),fase0:fc.fase0||mkFase0(),produccion:fc.produccion||{},editors:Array.isArray(fc.editors)?fc.editors:[],services:Array.isArray(fc.services)?fc.services:[]};
      });
    }
    const sb=await fbGet('crm','board');
    if(sb&&sb.cols)boardCols=sb.cols;
    const se=await fbGet('crm','events');
    if(se&&se.list)calEvents=se.list;
    const sp=await fbGet('crm','payments');
    if(sp){if(sp.list)paymentsList=sp.list;if(sp.cobros)cobrosList=sp.cobros;}
    const su=await fbGet('crm','users');
    if(su&&su.users)USERS={...USERS,...su.users};
  }catch(e){console.warn('loadAll:',e);}
  render();
  // real-time
  if(db){
    try{
      db.collection('crm').doc('clients').onSnapshot(snap=>{
        if(snap&&snap.exists){
          const d=snap.data();
          if(d&&d.list&&d.list.length){
            clients=d.list.map(fc=>{
              const def=clients.find(c=>c.id===fc.id)||{};
              return{...def,...fc,msgs:fc.msgs||[],reels:fc.reels||mkMonths(fc.numReels||5),fase0:fc.fase0||mkFase0(),produccion:fc.produccion||{},editors:Array.isArray(fc.editors)?fc.editors:[],services:Array.isArray(fc.services)?fc.services:[]};
            });
            renderDash();renderSB();
            if(activeClient){
              const u=clients.find(c=>c.id===activeClient.id);
              if(u){activeClient=u;if(document.getElementById('view-profile').classList.contains('on'))renderProfile(u);}
            }
            if(activePortalClient){
              const u=clients.find(c=>c.id===activePortalClient.id);
              if(u){activePortalClient=u;if(activePortalMonth)renderPortalMonth(u,activePortalMonth);}
            }
          }
        }
      });
    }catch(e){}
  }
}

function doLogin(){

function renderDash(){
  const mk=monthKey();
  let totalGrab=0,totalReels=0,editing=0,pendSubir=0;
  const mc=myClients();
  mc.forEach(c=>{
    const r=c.reels[mk]||[];
    totalReels+=r.length;
    totalGrab+=r.filter(r=>r.grabado).length;
    editing+=r.filter(r=>r.editado&&!r.subido).length;
    pendSubir+=r.filter(r=>r.grabado&&!r.editado).length;
  });
  const overdue=mc.filter(c=>c.delivery&&new Date(c.delivery+'T12:00:00')<new Date()).length;
  document.getElementById('view-dash').innerHTML=`
    <div class="sg">
      <div class="scard"><div class="scard-ic"><i class="ti ti-users"></i></div><div class="scard-v">${mc.length}</div><div class="scard-l">Clientes activos</div></div>
      <div class="scard"><div class="scard-ic"><i class="ti ti-alarm" style="color:var(--err)"></i></div><div class="scard-v" style="color:var(--err)">${overdue}</div><div class="scard-l">Entregas vencidas</div></div>
      <div class="scard"><div class="scard-ic"><i class="ti ti-cut"></i></div><div class="scard-v">${editing}</div><div class="scard-l">Reels en edición</div></div>
      <div class="scard"><div class="scard-ic"><i class="ti ti-video"></i></div><div class="scard-v">${totalGrab}/${totalReels}</div><div class="scard-l">Grabados este mes</div></div>
    </div>
    <div class="sh"><div class="st">Clientes</div></div>
    <div class="cg">${mc.map(c=>{
      const r=c.reels[mk]||[];
      const clientManagesUpload=!(Array.isArray(c.services)?c.services:[]).some(s=>['content_5','content_8_cm','podcast_reels_edit','youtube'].includes(s));
      const done=clientManagesUpload?r.filter(r=>r.editado).length:r.filter(r=>r.subido).length;
      const ed=r.filter(r=>r.editado&&!r.subido).length;
      const gr=r.filter(r=>r.grabado&&!r.editado).length;
      const pe=r.filter(r=>!r.grabado).length;
      const svcs=(Array.isArray(c.services)?c.services:[]).map(id=>SERVICES.find(s=>s.id===id)?.label).filter(Boolean);
      return`<div class="cc" onclick="openProfile('${c.id}')">
        <div class="cc-av">${ini(c.name)}</div>
        <div class="cc-n">${c.name}</div>
        <div class="cc-t">${c.type}</div>
        ${svcs.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:6px">${svcs.slice(0,2).map(s=>`<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:var(--cdim);color:var(--c)">${s.split('(')[0].trim()}</span>`).join('')}${svcs.length>2?`<span style="font-size:10px;color:var(--tx3)">+${svcs.length-2}</span>`:''}</div>`:''}
        <div class="cc-ft">
          ${r.length?`<div style="display:flex;flex-wrap:wrap;gap:3px">
            ${done?`<span class="chip" style="background:rgba(34,197,94,.12);color:#4ADE80">${clientManagesUpload?'✂️':'✅'} ${done}/${r.length}</span>`:''}
            ${!clientManagesUpload&&ed?`<span class="chip" style="background:rgba(192,132,252,.12);color:#C084FC">✂️ ${ed}/${r.length}</span>`:''}
            ${gr?`<span class="chip" style="background:rgba(245,158,11,.12);color:var(--warn)">🎬 ${gr}/${r.length}</span>`:''}
            ${pe?`<span class="chip" style="background:var(--bg3);color:var(--tx3)">⏳ ${pe}/${r.length}</span>`:''}

function renderPipeline(){

    const pc=myClients().filter(c=>c.phase===i);
    return`<div class="pcol" data-phase="${i}" ondragover="event.preventDefault();this.classList.add('dov')" ondragleave="this.classList.remove('dov')" ondrop="dropPL(event,${i})">
      <div class="pch">${i+1}. ${ph.length>14?ph.slice(0,14)+'…':ph}<span style="background:var(--bg3);font-size:10px;padding:1px 5px;border-radius:20px;color:var(--tx3)">${pc.length}</span></div>
      ${pc.map(c=>`<div class="pcard" draggable="true" ondragstart="event.dataTransfer.setData('cid','${c.id}')" ondragend="this.classList.remove('dragging')" onclick="openProfile('${c.id}')">
        <div style="font-size:13px;font-weight:600">${c.name}</div>
        <div style="font-size:11px;color:var(--tx3);margin-top:2px">${c.type}</div>
      </div>`).join('')}
      ${!pc.length?'<div class="pempty">Vacío</div>':''}
    </div>`;
  }).join('')}</div></div>`;
}
function dropPL(e,phase){
  e.preventDefault();document.querySelectorAll('.pcol').forEach(c=>c.classList.remove('dov'));
  const id=e.dataTransfer.getData('cid');const c=clients.find(c=>c.id===id);
  if(c){c.phase=phase;renderPipeline();renderDash();saveClients();showToast('Fase → '+PHASES[phase],'ok');}
}

// COLUMN DRAG (reorder columns)
function startDragCol(e,colId){
  dragBoardColId=colId;
  e.dataTransfer.setData('colId',colId);
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=e.target.closest('.bcol');if(el)el.classList.add('col-dragging');},0);
}
function endDragCol(e){
  document.querySelectorAll('.bcol.col-dragging').forEach(el=>el.classList.remove('col-dragging'));
  dragBoardColId=null;
}

// COLUMN DROP ZONE
function boardColDragOver(e,colId){
  e.preventDefault();e.stopPropagation();
  if(dragBoardColId&&dragBoardColId!==colId){
    // Column reorder
    document.querySelectorAll('.bcol').forEach(c=>c.classList.remove('dov'));
    document.querySelector(`.bcol[data-col="${colId}"]`)?.classList.add('dov');
  }else if(dragTaskColId){
    document.querySelectorAll('.bcol').forEach(c=>c.classList.remove('dov'));
    document.querySelector(`.bcol[data-col="${colId}"]`)?.classList.add('dov');
  }
}
function boardColDragLeave(e,colId){
  if(!e.currentTarget.contains(e.relatedTarget)){
    document.querySelector(`.bcol[data-col="${colId}"]`)?.classList.remove('dov');
  }
}
function boardColDrop(e,targetColId){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.bcol').forEach(c=>c.classList.remove('dov'));
  document.querySelectorAll('.bcard.drag-over').forEach(c=>c.classList.remove('drag-over'));
  // Column reorder
  if(dragBoardColId&&dragBoardColId!==targetColId){
    const fromIdx=boardCols.findIndex(c=>c.id===dragBoardColId);
    const toIdx=boardCols.findIndex(c=>c.id===targetColId);
    if(fromIdx>=0&&toIdx>=0){
      const[col]=boardCols.splice(fromIdx,1);
      boardCols.splice(toIdx,0,col);
      saveBoard();renderBoard();showToast('Columna movida ✓','ok');
    }
    return;
  }
  // Task to column
  if(dragTaskColId&&dragTaskId){
    if(dragTaskColId===targetColId)return;
    const fromCol=boardCols.find(c=>c.id===dragTaskColId);
    const toCol=boardCols.find(c=>c.id===targetColId);
    if(!fromCol||!toCol)return;
    const ti=fromCol.tasks.findIndex(t=>String(t.id)===String(dragTaskId));
    if(ti>=0){const[task]=fromCol.tasks.splice(ti,1);toCol.tasks.unshift(task);}
    dragTaskColId=null;dragTaskId=null;
    saveBoard();renderBoard();showToast('Tarea movida ✓','ok');
  }
}

// TASK DRAG (reorder within column or move between columns)
function startDragTask(e,colId,taskId){
  dragTaskColId=colId;dragTaskId=taskId;
  e.dataTransfer.setData('taskData',JSON.stringify({colId,taskId}));
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
  setTimeout(()=>{const el=e.target.closest('.bcard');if(el)el.classList.add('dragging');},0);
}
function endDragTask(e){
  document.querySelectorAll('.bcard.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.bcard.drag-over').forEach(el=>el.classList.remove('drag-over'));
  document.querySelectorAll('.bcol.dov').forEach(el=>el.classList.remove('dov'));
  dragTaskColId=null;dragTaskId=null;
}
function taskDragOver(e,colId,taskIndex){
  e.preventDefault();e.stopPropagation();
  if(!dragTaskColId)return;
  document.querySelectorAll('.bcard.drag-over').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
  // Handle drop within same column to reorder
  e.currentTarget.ondrop=function(ev){
    ev.preventDefault();ev.stopPropagation();
    document.querySelectorAll('.bcol').forEach(c=>c.classList.remove('dov'));
    document.querySelectorAll('.bcard.drag-over').forEach(c=>c.classList.remove('drag-over'));
    if(!dragTaskColId||!dragTaskId)return;
    const fromCol=boardCols.find(c=>c.id===dragTaskColId);
    const toCol=boardCols.find(c=>c.id===colId);
    if(!fromCol||!toCol)return;
    const fromIdx=fromCol.tasks.findIndex(t=>String(t.id)===String(dragTaskId));
    if(fromIdx<0)return;
    if(dragTaskColId===colId){
      // Reorder within same column
      const[task]=fromCol.tasks.splice(fromIdx,1);
      const insertAt=taskIndex>fromIdx?taskIndex:taskIndex;
      toCol.tasks.splice(insertAt,0,task);
    }else{
      // Move to different column at position
      const[task]=fromCol.tasks.splice(fromIdx,1);
      toCol.tasks.splice(taskIndex,0,task);
    }
    dragTaskColId=null;dragTaskId=null;
    saveBoard();renderBoard();showToast('Tarea movida ✓','ok');
  };
}
function setupBoardAutoScroll(){
  const bw=document.getElementById('bw-scroll');if(!bw)return;
  bw.addEventListener('dragover',e=>{
    const rect=bw.getBoundingClientRect();
    const edge=80;
    if(e.clientX<rect.left+edge)bw.scrollLeft-=10;
    else if(e.clientX>rect.right-edge)bw.scrollLeft+=10;
  });
}
// drag vars declared above
function toggleTask(colId,taskId){
  const col=boardCols.find(c=>c.id===colId);
  const t=col?.tasks.find(t=>String(t.id)===String(taskId));
  if(t){t.done=!t.done;saveBoard();renderBoard();}
}

function addBoardCol(){

}
function toggleColMenu(id){

}
document.addEventListener('click',e=>{if(!e.target.closest('.dot-btn'))document.querySelectorAll('.drop-menu').forEach(m=>m.classList.remove('open'));});
function copyCol(id){
  const col=boardCols.find(c=>c.id===id);if(!col)return;
  const newCol={...col,id:'col'+Date.now(),name:col.name+' (copia)',tasks:JSON.parse(JSON.stringify(col.tasks))};
  const idx=boardCols.findIndex(c=>c.id===id);
  boardCols.splice(idx+1,0,newCol);
  saveBoard();renderBoard();showToast('Lista copiada ✓','ok');

function moveColLeft(id){
  const idx=boardCols.findIndex(c=>c.id===id);
  if(idx>0){[boardCols[idx-1],boardCols[idx]]=[boardCols[idx],boardCols[idx-1]];saveBoard();renderBoard();}
}
function moveColRight(id){
  const idx=boardCols.findIndex(c=>c.id===id);
  if(idx<boardCols.length-1){[boardCols[idx],boardCols[idx+1]]=[boardCols[idx+1],boardCols[idx]];saveBoard();renderBoard();}
}

function doMoveAll(fromId){

function sortCol(id,by){

  if(by==='name')col.tasks.sort((a,b)=>a.title.localeCompare(b.title));
  saveBoard();renderBoard();showToast('Ordenado ✓','ok');
}

function saveTaskDetail(colId,taskId){
  const col=boardCols.find(c=>c.id===colId);const t=col?.tasks.find(t=>t.id==taskId);if(!t)return;
  t.title=document.getElementById('td-title').value;
  t.date=document.getElementById('td-date').value;
  t.client=document.getElementById('td-cl').value;
  t.desc=document.getElementById('td-desc').value;
  t.labels=[...document.querySelectorAll('[id^="lc-"]')].filter(el=>el.dataset.sel==='1').map(el=>parseInt(el.id.replace('lc-','')));
  closeModal();saveBoard();renderBoard();showToast('Tarjeta guardada ✓','ok');
}
function toggleLabel(i,colId,taskId){
  const el=document.getElementById('lc-'+i);if(!el)return;
  const L=LABELS[i];const sel=el.dataset.sel=el.dataset.sel==='1'?'':'1';
  el.style.background=sel?L.bg:'var(--bg3)';el.style.color=sel?L.c:'var(--tx3)';
}
function deleteTask(colId,taskId){
  if(!confirm('¿Eliminar esta tarjeta?'))return;
  const col=boardCols.find(c=>c.id===colId);if(!col)return;
  col.tasks=col.tasks.filter(t=>t.id!=taskId);
  closeModal();saveBoard();renderBoard();showToast('Tarjeta eliminada','ok');
}
function addLink(colId,taskId){
  const col=boardCols.find(c=>c.id===colId);const t=col?.tasks.find(t=>t.id==taskId);if(!t)return;
  if(!t.links)t.links=[];
  t.links.push({url:'',label:''});
  openTaskDetail(colId,taskId);
}
function removeLink(colId,taskId,i){
  const col=boardCols.find(c=>c.id===colId);const t=col?.tasks.find(t=>t.id==taskId);if(!t)return;
  t.links.splice(i,1);openTaskDetail(colId,taskId);
}
function updateLink(colId,taskId,i,field,val){
  const col=boardCols.find(c=>c.id===colId);const t=col?.tasks.find(t=>t.id==taskId);if(!t||!t.links[i])return;
  t.links[i][field]=val;saveBoard();

function addCheck(colId,taskId){
  const inp=document.getElementById('new-check');if(!inp||!inp.value.trim())return;

function removeCheck(colId,taskId,i){
  const col=boardCols.find(c=>c.id===colId);const t=col?.tasks.find(t=>t.id==taskId);if(!t)return;
  t.checklist.splice(i,1);openTaskDetail(colId,taskId);

function toggleCheck(colId,taskId,i){

function renderReelTable(c,mk){
  const reels=c.reels[mk]||[];
  if(!reels.length)return`<div style="text-align:center;padding:30px;color:var(--tx3)">Sin reels para este mes</div>`;
  return`<div class="card">
    <table class="rtable" style="width:100%">
      <tr><th>Reel</th><th>Grabado</th><th>F.Grab.</th><th>Editado</th><th>F.Entrega</th><th>Subido</th><th>Editor</th><th>Notas</th></tr>
      ${reels.map((r,i)=>`<tr>
        <td style="font-weight:600;color:var(--tx)">${r.label}</td>
        <td><div class="chk${r.grabado?' on':''}" onclick="toggleReel('${c.id}','${mk}',${i},'grabado')">${r.grabado?'<i class="ti ti-check" style="font-size:9px;color:#fff"></i>':''}</div></td>
        <td><input type="date" value="${r.fechaGrab||''}" style="width:130px;padding:3px 6px;font-size:11px" onchange="updateReel('${c.id}','${mk}',${i},'fechaGrab',this.value)"></td>
        <td><div class="chk${r.editado?' on':''}" onclick="toggleReel('${c.id}','${mk}',${i},'editado')">${r.editado?'<i class="ti ti-check" style="font-size:9px;color:#fff"></i>':''}</div></td>
        <td><input type="date" value="${r.fechaEdit||''}" style="width:130px;padding:3px 6px;font-size:11px" onchange="updateReel('${c.id}','${mk}',${i},'fechaEdit',this.value)"></td>
        <td><div class="chk${r.subido?' on':''}" onclick="toggleReel('${c.id}','${mk}',${i},'subido')">${r.subido?'<i class="ti ti-check" style="font-size:9px;color:#fff"></i>':''}</div></td>
        <td><select style="width:88px;padding:3px 5px;font-size:11px" onchange="updateReel('${c.id}','${mk}',${i},'editor',this.value)">
          <option value="">—</option>${['Dani','Darwin','Dante','Oscar'].map(e=>`<option${r.editor===e?' selected':''}>${e}</option>`).join('')}
        </select></td>
        <td><input type="text" value="${r.notas||''}" placeholder="Notas..." style="font-size:11px;padding:3px 6px" onchange="updateReel('${c.id}','${mk}',${i},'notas',this.value)"></td>
      </tr>`).join('')}
    </table>
    <button class="badd" style="margin-top:8px" onclick="addReel('${c.id}','${mk}')"><i class="ti ti-plus" style="font-size:11px"></i>Añadir reel</button>
  </div>`;
}

function renderProdTab(c,mk){
  if(!c.produccion)c.produccion={};
  if(!c.produccion[mk])c.produccion[mk]={};
  const reels=c.reels[mk]||[];
  const prod=c.produccion[mk];
  return PROD_STEPS.map((step,si)=>{
    const stepKey='s'+si;
    if(!prod[stepKey])prod[stepKey]={};
    const done=reels.filter(r=>prod[stepKey][r.id]).length;
    const isOpen=prod[stepKey]._open||false;
    return`<div class="prod-step">
      <div class="prod-step-hdr${isOpen?' open':''}" onclick="toggleProdStep('${c.id}','${mk}',${si})">
        <i class="ti ti-chevron-right arr"></i>
        <span class="prod-step-title">${step}</span>
        <span class="prod-step-prog">${done}/${reels.length}</span>
        ${done===reels.length&&reels.length>0?'<i class="ti ti-circle-check" style="color:var(--ok);margin-left:6px"></i>':''}
      </div>
      <div class="prod-step-body${isOpen?' open':''}" id="ps-${c.id}-${si}">
        ${reels.length?reels.map(r=>`<div class="prod-reel-row">
          <div class="chk${prod[stepKey][r.id]?' on':''}" onclick="toggleProdReel('${c.id}','${mk}',${si},'${r.id}')">${prod[stepKey][r.id]?'<i class="ti ti-check" style="font-size:9px;color:#fff"></i>':''}</div>
          <span style="font-size:13px;flex:1">${r.label}</span>
          ${prod[stepKey][r.id+'_d']?`<span style="font-size:10px;color:var(--tx3)">${fmtDate(prod[stepKey][r.id+'_d'])}</span>`:''}
        </div>`).join(''):'<div style="color:var(--tx3);font-size:12px;padding:8px 0">Sin reels este mes</div>'}
      </div>
    </div>`;
  }).join('');
}

function toggleProdStep(cid,mk,si){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  if(!c.produccion)c.produccion={};if(!c.produccion[mk])c.produccion[mk]={};
  const k='s'+si;if(!c.produccion[mk][k])c.produccion[mk][k]={};
  c.produccion[mk][k]._open=!c.produccion[mk][k]._open;
  document.getElementById('tc-prod').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="st">Producción mensual</div></div>${renderProdTab(c,mk)}`;
}
function toggleProdReel(cid,mk,si,rid){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  if(!c.produccion)c.produccion={};if(!c.produccion[mk])c.produccion[mk]={};
  const k='s'+si;if(!c.produccion[mk][k])c.produccion[mk][k]={};
  c.produccion[mk][k][rid]=!c.produccion[mk][k][rid];
  if(c.produccion[mk][k][rid])c.produccion[mk][k][rid+'_d']=today();
  saveClients();
  document.getElementById('tc-prod').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="st">Producción mensual</div></div>${renderProdTab(c,mk)}`;
}
function switchProdMonth(cid,mk){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  const reelMonths=Object.keys(c.reels||{}).sort();
  document.getElementById('tc-prod').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div class="st">Producción mensual</div>
    <div class="month-sel">${reelMonths.map(m=>`<button class="mbtn${m===mk?' on':''}" onclick="switchProdMonth('${c.id}','${m}')">${monthLabel(m)}</button>`).join('')}</div>
  </div>${renderProdTab(c,mk)}`;
}

function switchTab(tab){activeTab=tab;if(activeClient)renderProfile(activeClient);}
function switchReelMonth(cid,mk){
  activeReelMonth=mk;
  const c=clients.find(c=>c.id===cid);if(!c)return;
  const reelMonths=Object.keys(c.reels||{}).sort();
  document.getElementById('tc-reels').innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div class="st">Reels por mes</div>
    <div class="month-sel">${reelMonths.map(m=>`<button class="mbtn${m===mk?' on':''}" onclick="switchReelMonth('${c.id}','${m}')">${monthLabel(m)}</button>`).join('')}<button class="mbtn" onclick="addReelMonth('${c.id}')"><i class="ti ti-plus" style="font-size:11px"></i>Mes</button></div>
  </div>${renderReelTable(c,mk)}`;
}
function addReelMonth(cid){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  const existing=Object.keys(c.reels).sort();
  const last=existing[existing.length-1]||monthKey();
  const[y,m]=last.split('-').map(Number);
  const next=m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;
  if(c.reels[next]){showToast('Ese mes ya existe','err');return;}
  c.reels[next]=mkReels(c.numReels,next);
  switchReelMonth(cid,next);saveClients();showToast('Mes añadido: '+monthLabel(next),'ok');
}
function addReel(cid,mk){
  const c=clients.find(c=>c.id===cid);if(!c||!c.reels[mk])return;
  const n=c.reels[mk].length+1;
  c.reels[mk].push({id:n,label:'Reel '+n,month:mk,grabado:false,fechaGrab:'',editado:false,fechaEdit:'',subido:false,editor:'',notas:''});
  switchReelMonth(cid,mk);saveClients();showToast('Reel '+n+' añadido ✓','ok');
}
function toggleReel(cid,mk,i,field){
  const c=clients.find(c=>c.id===cid);if(!c||!c.reels[mk])return;
  c.reels[mk][i][field]=!c.reels[mk][i][field];
  saveClients();switchReelMonth(cid,mk);
}
function updateReel(cid,mk,i,field,val){
  const c=clients.find(c=>c.id===cid);if(!c||!c.reels[mk])return;
  c.reels[mk][i][field]=val;saveClients();
}

async function checkRoute(){
  const h=window.location.hash;
  if(!h.startsWith('#/cliente/'))return false;
  const cid=h.replace('#/cliente/','');
  if(!fbReady)await initFB();
  try{
    const saved=await fbGet('crm','clients');
    if(saved&&saved.list&&saved.list.length){
      clients=saved.list.map(fc=>{
        const def=clients.find(c=>c.id===fc.id)||{};
        return{...def,...fc,msgs:fc.msgs||[],reels:fc.reels||mkMonths(fc.numReels||5),fase0:fc.fase0||mkFase0(),produccion:fc.produccion||{}};
      });
    }
  }catch(e){}
  const c=clients.find(c=>c.id===cid);
  if(c){showPortal(c);return true;}
  return false;
}
window.addEventListener('hashchange',async()=>{const r=await checkRoute();if(!r)document.getElementById('portal').classList.remove('open');});

function showPortal(c){
  activePortalClient=c;
  document.getElementById('portal-cname').textContent=c.name;
  document.getElementById('lp').style.display='none';
  document.getElementById('app').classList.remove('on');
  renderPortalDashboard(c);
  document.getElementById('portal-month-box').style.display='none';
  document.getElementById('portal-reels-section').style.display='none';
  renderPortalMsgs(c);
  document.getElementById('portal').classList.add('open');
  showSuggestions();
  // welcome
  const h=new Date().getHours();
  const g=h<13?'¡Buenos días':h<20?'¡Buenas tardes':'¡Buenas noches';
  document.getElementById('w-emoji').textContent='🎉';
  document.getElementById('w-title').textContent=g+', '+c.name+'!';
  document.getElementById('w-sub').textContent='Aquí tienes toda la información de tu contenido 🚀';
  document.getElementById('welcome').classList.add('open');
  // realtime
  if(db){try{db.collection('crm').doc('clients').onSnapshot(snap=>{
    if(snap&&snap.exists){const d=snap.data();if(d&&d.list){
      clients=d.list.map(fc=>{const def=clients.find(cc=>cc.id===fc.id)||{};return{...def,...fc,msgs:fc.msgs||[],reels:fc.reels||mkMonths(fc.numReels||5),fase0:fc.fase0||mkFase0(),produccion:fc.produccion||{},editors:Array.isArray(fc.editors)?fc.editors:[],services:Array.isArray(fc.services)?fc.services:[]};});
      const u=clients.find(cc=>cc.id===c.id);
      if(u){activePortalClient=u;renderPortalDashboard(u);if(activePortalMonth)renderPortalMonth(u,activePortalMonth);}
    }}
  });}catch(e){}}
}

function renderPortalDashboard(c){
  const mk=monthKey();
  const reels=c.reels[mk]||[];
  const sub=reels.filter(r=>r.subido).length;
  const editing=reels.filter(r=>r.editado&&!r.subido).length;
  const grabbed=reels.filter(r=>r.grabado&&!r.editado).length;
  const pend=reels.filter(r=>!r.grabado).length;
  const nextGrab=reels.filter(r=>!r.grabado&&r.fechaGrab).sort((a,b)=>a.fechaGrab.localeCompare(b.fechaGrab))[0];
  const nextEdit=reels.filter(r=>r.grabado&&!r.subido&&r.fechaEdit).sort((a,b)=>a.fechaEdit.localeCompare(b.fechaEdit))[0];
  const months=Object.keys(c.reels||{}).sort();
  const cobro=cobrosList.find(co=>co.cliente===c.name&&co.month===mk);
  document.getElementById('portal-dashboard').innerHTML=`
    <div style="margin-bottom:20px">
      <div style="font-size:22px;font-weight:600;margin-bottom:4px">Hola, ${c.name} 👋</div>
      <div style="font-size:14px;color:var(--tx3)">Aquí tienes el estado de tu contenido</div>
    </div>
    ${nextGrab?`<div class="portal-next">
      <div class="portal-next-ic">📅</div>
      <div><div class="portal-next-t">Próxima grabación</div><div class="portal-next-v">${fmtDate(nextGrab.fechaGrab)} · ${nextGrab.label}</div></div>
    </div>`:''}
    ${nextEdit?`<div class="portal-next" style="background:rgba(192,132,252,.08);border-color:rgba(192,132,252,.2)">
      <div class="portal-next-ic">🎬</div>
      <div><div class="portal-next-t" style="color:#C084FC">Próxima entrega</div><div class="portal-next-v">${fmtDate(nextEdit.fechaEdit)} · ${nextEdit.label}</div></div>
    </div>`:''}
    <div class="portal-dash-grid">
      <div class="portal-stat"><div class="portal-stat-v" style="color:#4ADE80">${sub}/${reels.length}</div><div class="portal-stat-l">✅ Publicados</div></div>
      <div class="portal-stat"><div class="portal-stat-v" style="color:#C084FC">${editing}</div><div class="portal-stat-l">✂️ En edición</div></div>
      <div class="portal-stat"><div class="portal-stat-v" style="color:var(--warn)">${grabbed}</div><div class="portal-stat-l">🎬 Grabados</div></div>
      <div class="portal-stat"><div class="portal-stat-v" style="color:var(--tx3)">${pend}</div><div class="portal-stat-l">⏳ Pendientes</div></div>
    </div>
    ${c.contractEnd||c.price?`<div class="portal-box" style="margin-bottom:16px">
      <div class="portal-box-t">Tu contrato</div>
      ${c.contractStart?`<div class="pf"><span class="pf-l">Inicio</span><span class="pf-v">${fmtDate(c.contractStart)}</span></div>`:''}
      ${c.contractEnd?`<div class="pf"><span class="pf-l">Fin</span><span class="pf-v">${fmtDate(c.contractEnd)}</span></div>`:''}
      ${c.price?`<div class="pf"><span class="pf-l">Mensualidad</span><span class="pf-v" style="color:var(--c);font-weight:600">${c.price}€</span></div>`:''}
      ${c.price?`<div class="pf"><span class="pf-l">Estado del pago</span><span class="badge ${cobro?.paid?'badge-ok':'badge-warn'}">${cobro?.paid?'✓ Recibido':'Pendiente'}</span></div>`:''}
    </div>`:''}
    ${months.length?`<div class="portal-box" style="margin-bottom:16px">
      <div class="portal-box-t">Ver contenido por mes</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${months.map(m=>`<button class="mbtn-big" style="padding:10px 16px;font-size:13px" onclick="selectPortalMonth('${c.id}','${m}')">${monthLabel(m)}</button>`).join('')}
      </div>
    </div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <button onclick="openMeetingModal()" style="padding:14px;border-radius:var(--rl);border:1.5px solid rgba(0,229,229,.3);background:var(--cdim);color:var(--c);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px"><i class="ti ti-calendar-plus" style="font-size:18px"></i>Agendar reunión</button>
      <button onclick="selectPortalMonth('${c.id}','${months[months.length-1]||monthKey()}')" style="padding:14px;border-radius:var(--rl);border:1.5px solid var(--bd2);background:var(--bg3);color:var(--tx2);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px"><i class="ti ti-video" style="font-size:18px"></i>Ver mis reels</button>
    </div>
    ${calcAchievements(c)}`;}

function selectPortalMonth(cid,mk){
  const c=clients.find(c=>c.id===cid);if(!c)return;
  activePortalMonth=mk;
  document.getElementById('portal-reels-section').style.display='';
  document.getElementById('portal-month-title').textContent='Tu contenido — '+monthLabel(mk);
  renderPortalMonth(c,mk);
  setTimeout(()=>document.getElementById('portal-reels-section').scrollIntoView({behavior:'smooth'}),100);
  // contract info
  const contractBox=document.getElementById('portal-contract-info');
  const contractContent=document.getElementById('portal-contract-content');
  if(c.contractStart||c.contractEnd){
    contractBox.style.display='';
    contractContent.innerHTML=`
      ${c.contractStart?`<div class="pf"><span class="pf-l">Inicio contrato</span><span class="pf-v">${fmtDate(c.contractStart)}</span></div>`:''}
      ${c.contractEnd?`<div class="pf"><span class="pf-l">Fin contrato</span><span class="pf-v">${fmtDate(c.contractEnd)}</span></div>`:''}
      ${c.contractType?`<div class="pf"><span class="pf-l">Tipo</span><span class="pf-v">${c.contractType}</span></div>`:''}`;
  }
  // invoice info
  const invoiceBox=document.getElementById('portal-invoice-box');
  const invoiceContent=document.getElementById('portal-invoice-content');
  const mk2=monthKey();
  const cobro=cobrosList.find(co=>co.cliente===c.name&&co.month===mk2);
  if(c.price){
    invoiceBox.style.display='';
    invoiceContent.innerHTML=`
      <div class="pf"><span class="pf-l">Mensualidad</span><span class="pf-v" style="color:var(--c);font-weight:600">${c.price}€</span></div>
      <div class="pf"><span class="pf-l">Estado del pago</span><span class="badge ${cobro?.paid?'badge-ok':'badge-warn'}">${cobro?.paid?'✓ Recibido':'Pendiente de recibir'}</span></div>`;
  }
}

function resetPortalMonth(){
  document.getElementById('portal-reels-section').style.display='none';
  activePortalMonth='';
}

function renderPortalMonth(c,mk){
  const reels=c.reels[mk]||[];
  const sub=reels.filter(r=>r.subido).length;
  const ed=reels.filter(r=>r.editado&&!r.subido).length;
  const gr=reels.filter(r=>r.grabado&&!r.editado).length;
  const pe=reels.filter(r=>!r.grabado).length;
  const strip=document.getElementById('portal-status-strip');
  if(strip)strip.innerHTML=`
    ${sub?`<span class="chip" style="background:rgba(34,197,94,.12);color:#4ADE80;padding:5px 12px;font-size:12px">✅ ${sub} publicados</span>`:''}
    ${ed?`<span class="chip" style="background:rgba(192,132,252,.12);color:#C084FC;padding:5px 12px;font-size:12px">✂️ ${ed} en edición</span>`:''}
    ${gr?`<span class="chip" style="background:rgba(245,158,11,.12);color:var(--warn);padding:5px 12px;font-size:12px">🎬 ${gr} grabados</span>`:''}
    ${pe?`<span class="chip" style="background:var(--bg3);color:var(--tx3);padding:5px 12px;font-size:12px">⏳ ${pe} pendientes</span>`:''}`;
  const rl=document.getElementById('portal-reels-list');
  if(rl)rl.innerHTML=reels.map(r=>{
    let estado='⏳ Pendiente';let color='var(--tx3)';
    if(r.subido){estado='✅ Publicado';color='#4ADE80';}
    else if(r.editado){estado='✂️ En edición';color='#C084FC';}
    else if(r.grabado){estado='🎬 Grabado';color='var(--warn)';}
    return`<div class="reel-row">
      <div>
        <div style="font-size:13px;font-weight:500">${r.label}</div>
        <div style="font-size:11px;color:var(--tx3);margin-top:2px">${r.editor?'Editor: '+r.editor:''} ${r.fechaEdit?'· Entrega: '+fmtDate(r.fechaEdit):''}</div>
      </div>
      <span style="font-size:12px;font-weight:600;color:${color}">${estado}</span>
    </div>`;
  }).join('');
}

function renderPortalMsgs(c){
  const el=document.getElementById('portal-msgs');if(!el)return;
  if(!c.msgs.length){
    el.innerHTML=`<div style="text-align:center;color:var(--tx3);font-size:13px;padding:30px">
      <div style="font-size:28px;margin-bottom:8px">👋</div>
      ¡Hola ${c.name}! Soy tu asistente.<br>Pregúntame lo que necesites.
    </div>`;
    return;
  }
  el.innerHTML=c.msgs.map(m=>{
    const txt=(m.text||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    return`<div class="msg ${m.from==='client'?'client':'team'}">
      <div class="msg-bub">${txt}</div>
      <div class="msg-time">${m.time||''}</div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function calcAchievements(c){
  const allReels=Object.values(c.reels||{}).flat();
  const totalPublished=allReels.filter(r=>r.subido).length;
  const months=Object.keys(c.reels||{}).length;
  if(!totalPublished&&!months)return'';
  return`<div class="portal-box" style="margin-bottom:16px;background:linear-gradient(135deg,var(--bg2),var(--bg3))">
    <div class="portal-box-t">🏆 Tus logros con Mentedoras</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${totalPublished?`<div style="text-align:center;padding:12px;background:rgba(34,197,94,.08);border-radius:var(--r);border:1px solid rgba(34,197,94,.2)">
        <div style="font-size:28px;font-weight:700;color:#4ADE80">${totalPublished}</div>
        <div style="font-size:11px;color:var(--tx3);margin-top:2px">📹 Reels publicados</div>
      </div>`:''}
      ${months?`<div style="text-align:center;padding:12px;background:var(--cdim);border-radius:var(--r);border:1px solid rgba(0,229,229,.2)">
        <div style="font-size:28px;font-weight:700;color:var(--c)">${months}</div>
        <div style="font-size:11px;color:var(--tx3);margin-top:2px">📅 Meses juntos</div>
      </div>`:''}
    </div>
  </div>`;
}

    <div class="f"><label>Motivo de la reunión</label><input id="mt-motivo" placeholder="ej. Revisión de contenido del mes"></div>
    <div class="fg2">
      <div class="f"><label>Fecha preferida</label><input id="mt-fecha" type="date" value="${today()}"></div>
      <div class="f"><label>Hora preferida</label><input id="mt-hora" type="time" value="10:00"></div>
    </div>
    <div class="f"><label>Notas adicionales (opcional)</label><textarea id="mt-notas" rows="2" placeholder="Cualquier detalle que quieras añadir..."></textarea></div>
    <div class="modal-acts"><button class="btn btn-s" onclick="closeModal()">Cancelar</button><button class="btn btn-s btn-p" onclick="saveMeetingRequest()">Solicitar reunión</button></div>`;
  document.getElementById('mo').classList.add('open');
}
function saveMeetingRequest(){
  const motivo=document.getElementById('mt-motivo').value.trim();
  const fecha=document.getElementById('mt-fecha').value;
  const hora=document.getElementById('mt-hora').value;
  const notas=document.getElementById('mt-notas').value;
  if(!motivo||!fecha)return showToast('Añade motivo y fecha','err');
  const title=`📅 ${activePortalClient?.name} solicita reunión: "${motivo}" — ${fmtDate(fecha)} ${hora}${notas?' · '+notas:''}`;
  createAutoTask(title);
  closeModal();
  activePortalClient?.msgs.push({from:'team',text:`✅ ¡Solicitud de reunión recibida! Te confirmamos la cita para el **${fmtDate(fecha)} a las ${hora}** lo antes posible. Adri o Alan te contactarán para confirmar. 📅`,time:new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),who:'Mentedoras'});
  renderPortalMsgs(activePortalClient);
  saveClients();
  showToast('Solicitud enviada ✓','ok');
}
function showSuggestions(){
  const el=document.getElementById('portal-suggestions');if(!el)return;
  el.innerHTML=`
    <button class="sugg-btn" onclick="askBot('¿Cuándo es mi próxima grabación?')">📅 Mi grabación</button>
    <button class="sugg-btn" onclick="askBot('¿Cómo van mis reels?')">🎬 Estado reels</button>
    <button class="sugg-btn" onclick="askBot('¿Cuándo me entregan mi contenido?')">📤 Mi entrega</button>
    <button class="sugg-btn" onclick="askBot('¿Quién es mi editor?')">✂️ Mi editor</button>
    <button class="sugg-btn" onclick="askBot('¿Cuánto me queda de contrato?')">📄 Mi contrato</button>
    <button class="sugg-btn" onclick="askBot('¿Está pagada mi factura?')">💰 Mi factura</button>`;
}
function askBot(txt){
  document.getElementById('portal-inp').value=txt;
  sendPortalMsg();
}
function sendPortalMsg(){
  const inp=document.getElementById('portal-inp');const txt=inp.value.trim();
  if(!txt||!activePortalClient)return;
  inp.value='';
  const el=document.getElementById('portal-suggestions');if(el)el.innerHTML='';
  activePortalClient.msgs.push({from:'client',text:txt,time:new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),who:activePortalClient.name});
  renderPortalMsgs(activePortalClient);
  saveClients();
  // Typing indicator
  const msgs=document.getElementById('portal-msgs');
  const typing=document.createElement('div');
  typing.className='msg team';typing.id='typing-ind';
  typing.innerHTML='<div class="msg-bub" style="opacity:.7">✍️ Escribiendo...</div>';
  if(msgs)msgs.appendChild(typing);
  if(msgs)msgs.scrollTop=msgs.scrollHeight;
  setTimeout(()=>{
    const t=document.getElementById('typing-ind');if(t)t.remove();
    const resp=getBotResponse(txt,activePortalClient);
    activePortalClient.msgs.push({from:'team',text:resp,time:new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),who:'Mentedoras'});
    renderPortalMsgs(activePortalClient);
    saveClients();
    setTimeout(showSuggestions,500);
  },800+Math.random()*600);
}

function getBotResponse(txt,c){
  const tl=txt.toLowerCase();
  const mk=monthKey();
  const reels=c.reels[mk]||[];
  const driveMain=c.driveMain||'';
  const driveReels=(c.drive||{}).reelsEdit||'';
  const driveScripts=(c.drive||{}).scripts||'';
  const drivePics=(c.drive||{}).pictures||'';

  // IDENTIDAD / QUIÉN ERES
  if(tl.includes('quién eres')||tl.includes('quien eres')||tl.includes('qué eres')||tl.includes('que eres')||tl.includes('cómo te llamas')||tl.includes('como te llamas')){
    return`Soy el asistente virtual de **Mentedoras** 🤖✨ Creado con la inteligencia de Adri y Alan para ayudarte con todo lo relacionado con tu contenido. ¿En qué puedo ayudarte hoy?`;
  }
  // INFORMACIÓN INTERNA / CONFIDENCIAL
  if(tl.includes('cuántos clientes')||tl.includes('cuantos clientes')||tl.includes('otros clientes')||tl.includes('el equipo')||tl.includes('cuánto cobráis')||tl.includes('precio de otros')||tl.includes('cuántas personas')||tl.includes('herramienta')||tl.includes('qué usáis')){
    return`Eso es información interna de Mentedoras que no puedo compartir 😊 Si tienes alguna pregunta sobre tu proyecto, estaré encantado de ayudarte.`;
  }
  // SALUDOS / CONVERSACIÓN
  if(tl.includes('hola')||tl.includes('buenos')||tl.includes('buenas')||tl==='hi'||tl==='hey'||txt.length<8){
    const h=new Date().getHours();const g=h<13?'¡Buenos días':'¡Buenas';
    return`${g}, ${c.name}! 👋 Soy tu asistente de Mentedoras. Estoy aquí para contarte todo sobre tu contenido, grabaciones, entregas y más. ¿Qué necesitas?`;
  }
  if(tl.includes('cómo estás')||tl.includes('como estas')||tl.includes('qué tal')||tl.includes('que tal')){
    return`¡Muy bien, gracias por preguntar! 😄 Aquí, trabajando para que tu contenido sea el mejor. ¿Y tú qué tal? ¿En qué puedo ayudarte hoy?`;
  }
  if(tl.includes('gracias')||tl.includes('thank')||tl.includes('perfecto')||tl.includes('genial')||tl.includes('ok')){
    return`¡De nada, ${c.name}! 😊 Para eso estamos. Si necesitas cualquier cosa más, aquí me tienes. ¡Seguimos creando contenido increíble! 🚀`;
  }
  if(tl.includes('adiós')||tl.includes('adios')||tl.includes('hasta luego')||tl.includes('bye')){
    return`¡Hasta pronto, ${c.name}! 👋 Ha sido un placer. Recuerda que puedes escribirme cuando quieras. ¡Que tengas un gran día! ✨`;
  }
  // GRABACIÓN
  if(tl.includes('grab')){
    const next=reels.filter(r=>!r.grabado&&r.fechaGrab).sort((a,b)=>a.fechaGrab.localeCompare(b.fechaGrab))[0];
    if(next){
      const diff=Math.ceil((new Date(next.fechaGrab+'T12:00:00')-new Date())/864e5);
      const when=diff===0?'¡es hoy!':diff===1?'¡es mañana!':diff>0?`en ${diff} días`:'fue hace unos días';
      return`📅 Tu próxima grabación es el **${fmtDate(next.fechaGrab)}** (${next.label}) — ${when} 🎬${drivePics?`\n\n📸 ¿Necesitas preparar looks o referencias? Aquí tienes tu carpeta de fotos: [Ver fotos](${drivePics})`:''}`;
    }
    const yaGrabados=reels.filter(r=>r.grabado).length;
    if(yaGrabados===reels.length&&reels.length>0)return`✅ ¡Todos tus reels de este mes ya están grabados! Ahora están siendo editados por tu equipo. ✂️`;
    return`📅 Aún no tenemos fecha de grabación confirmada para los próximos reels. El equipo te lo confirmará en breve. También puedes solicitarla por aquí escribiendo "quiero agendar grabación".`;
  }
  // ENTREGA
  if(tl.includes('entrega')||tl.includes('cuando me')||tl.includes('cuándo me')||tl.includes('listo')||tl.includes('lista')||tl.includes('terminado')){
    const next=reels.filter(r=>r.grabado&&!r.subido&&r.fechaEdit).sort((a,b)=>a.fechaEdit.localeCompare(b.fechaEdit))[0];
    if(next){
      const diff=Math.ceil((new Date(next.fechaEdit+'T12:00:00')-new Date())/864e5);
      const when=diff<=0?'¡muy pronto!':diff===1?'mañana':diff+' días';
      return`🎬 La entrega del **${next.label}** está prevista para el **${fmtDate(next.fechaEdit)}** — ${when}${driveReels?`\n\n✂️ Cuando esté listo podrás verlo aquí: [Ver reels editados](${driveReels})`:''}`;
    }
    const sub=reels.filter(r=>r.subido).length;
    if(sub===reels.length&&reels.length>0)return`🎉 ¡Todo tu contenido de ${monthLabel(mk)} ya está entregado y publicado!${driveReels?` Puedes verlo todo aquí: [Ver reels](${driveReels})`:''}`;
    return`📤 El equipo está trabajando en tu contenido. Te avisaremos en cuanto esté listo.`;
  }
  // VER REELS / DRIVE
  if(tl.includes('ver')||tl.includes('enlace')||tl.includes('link')||tl.includes('drive')||tl.includes('carpeta')){
    if(tl.includes('guion')||tl.includes('script')){
      return driveScripts?`📝 Aquí tienes tus guiones: [Ver guiones](${driveScripts})`:`Tus guiones se te envían directamente antes de cada grabación. Si necesitas alguno, dímelo.`;
    }
    if(tl.includes('foto')||tl.includes('pic')){
      return drivePics?`📸 Aquí tienes tu carpeta de fotos: [Ver fotos](${drivePics})`:`No tenemos carpeta de fotos configurada. Contacta con el equipo.`;
    }
    if(driveReels)return`✂️ Aquí tienes todos tus reels editados: [Ver reels editados](${driveReels})${driveMain?`\n\n📁 Y tu carpeta completa: [Ver todo](${driveMain})`:''}`;
    if(driveMain)return`📁 Aquí tienes tu carpeta de Drive: [Ver todo mi contenido](${driveMain})`;
    return`No tenemos los links de Drive configurados aún. Contacta con el equipo y lo solucionamos.`;
  }
  // ESTADO REELS
  if(tl.includes('reel')||tl.includes('video')||tl.includes('vídeo')||tl.includes('contenido')||tl.includes('cómo van')||tl.includes('como van')||tl.includes('estado')){
    const sub=reels.filter(r=>r.subido).length;
    const ed=reels.filter(r=>r.editado&&!r.subido).length;
    const gr=reels.filter(r=>r.grabado&&!r.editado).length;
    const pe=reels.filter(r=>!r.grabado).length;
    if(!reels.length)return`No hay reels configurados para este mes. Contacta con el equipo para más info.`;
    let resp=`📊 **Tu contenido de ${monthLabel(mk)}:**\n✅ ${sub}/${reels.length} publicados\n✂️ ${ed} en edición\n🎬 ${gr} grabados\n⏳ ${pe} pendientes`;
    if(sub>0&&driveReels)resp+=`\n\n👀 ¿Quieres ver los editados? [Ver reels](${driveReels})`;
    return resp;
  }
  // EDITOR
  if(tl.includes('editor')||tl.includes('edita')||tl.includes('quién')||tl.includes('quien')){
    if(c.editors&&c.editors.length)return`✂️ Tu${c.editors.length>1?'s editors son':'editor es'} **${c.editors.join(' y ')}**. Son quienes dan vida a tu contenido con cada edición 🎬`;
    return`No hay editor asignado todavía. El equipo te lo confirmará en breve.`;
  }
  // CONTRATO / MESES RESTANTES
  if(tl.includes('contrato')||tl.includes('meses')||tl.includes('queda')||tl.includes('vence')||tl.includes('cuánto tiempo')||tl.includes('cuanto tiempo')){
    if(c.contractEnd){
      const diff=Math.ceil((new Date(c.contractEnd+'T12:00:00')-new Date())/864e5/30);
      const vencido=diff<0;
      if(vencido)return`⚠️ Tu contrato venció el **${fmtDate(c.contractEnd)}**. Contacta con Adri o Alan para renovarlo y seguir creando contenido juntos.`;
      const total=c.price?c.price*diff:0;
      return`📄 Tu contrato es válido hasta el **${fmtDate(c.contractEnd)}**.\n📅 Te quedan **${diff} mes${diff!==1?'es':''} restante${diff!==1?'s':''}**${total?`\n💰 Pagos pendientes: **${total.toLocaleString('es')}€** (${diff} × ${c.price}€)`:''}`;
    }
    if(c.contractStart)return`📄 Llevas trabajando con Mentedoras desde el **${fmtDate(c.contractStart)}**. ¡Ya somos un equipo! 💪`;
    return`No tengo datos de tu contrato. Contacta con Adri o Alan para más información.`;
  }
  // FACTURA / PAGO
  if(tl.includes('factura')||tl.includes('pago')||tl.includes('pagado')||tl.includes('cobro')||tl.includes('precio')){
    const cobro=cobrosList.find(co=>co.cliente===c.name&&co.month===mk);
    if(c.price){
      if(cobro?.paid)return`💰 Tu pago de **${c.price}€** de ${monthLabel(mk)} está **recibido y confirmado** ✅ ¡Gracias! Seguimos creando.`;
      return`💰 Tu mensualidad es **${c.price}€**. El estado de ${monthLabel(mk)}: **pendiente de recibir**. Si ya realizaste el pago y no se refleja, contacta con Adri o Alan.`;
    }
    return`Para información sobre facturas y pagos, contacta directamente con Adri o Alan. 💼`;
  }
  // REUNIÓN / MEETING
  if(tl.includes('reunión')||tl.includes('reunion')||tl.includes('meeting')||tl.includes('llamada')||tl.includes('hablar')||tl.includes('agendar')){
    const nextMeet=calEvents.filter(e=>e.type==='meet'&&e.client===c.name&&e.date>=today()).sort((a,b)=>a.date.localeCompare(b.date))[0];
    if(nextMeet)return`📞 Tienes una reunión con nosotros el **${fmtDate(nextMeet.date)}**: "${nextMeet.title}"\n\n¿Necesitas cambiarla o tienes alguna pregunta?`;
    createAutoTask(c.name+' quiere agendar una reunión: "'+txt+'"');
    return`¡Claro! Puedes solicitar una reunión directamente desde el botón **"Agendar reunión"** que tienes arriba. También le avisaré al equipo ahora mismo 👋`;
  }
  // GUIONES / SCRIPTS
  if(tl.includes('guion')||tl.includes('guión')||tl.includes('script')){
    return driveScripts?`📝 Aquí tienes tus guiones: [Ver guiones](${driveScripts})\n\nSi tienes algún cambio o corrección, dímelo aquí mismo.`:`Tus guiones se preparan antes de cada grabación y te los enviamos para revisión. ¿Tienes alguna duda sobre el contenido?`;
  }
  // SERVICIOS
  if(tl.includes('servicio')||tl.includes('incluye')||tl.includes('qué hac')||tl.includes('que hac')){
    const svcs=(Array.isArray(c.services)?c.services:[]).map(id=>SERVICES.find(s=>s.id===id)?.label).filter(Boolean);
    if(svcs.length)return`📋 Los servicios incluidos en tu contrato con Mentedoras son:\n${svcs.map(s=>'• '+s).join('\n')}\n\n¿Tienes alguna duda sobre alguno de ellos?`;
    return`Para conocer los detalles de tu contrato, contacta con Adri o Alan.`;
  }
  // NO SABE → tarjeta automática
  createAutoTask(c.name+' pregunta: "'+txt+'"');
  return`Hmm, esa pregunta se escapa de lo que sé 😅 Pero no te preocupes — le acabo de avisar a Adri y Alan con tu mensaje y te responderán lo antes posible. También puedes escribirles directamente si es urgente. 👋`;
}

// TOAST

function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');
  setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),3200);
}

loadTheme();

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
(async()=>{
  const isPortal=await checkRoute();
  if(!isPortal){
    const saved=sessionStorage.getItem('mu');
    if(saved){try{CU=JSON.parse(saved);showApp();}catch(e){}}
  }
})();
document.addEventListener('keydown',e=>{

});
