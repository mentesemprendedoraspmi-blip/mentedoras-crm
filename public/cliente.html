function initFB(){
  return new Promise(r=>{
    const s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
    s1.onload=()=>{
      const s2=document.createElement('script');
      s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';
      s2.onload=()=>{
        try{if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);db=firebase.firestore();}catch(e){}
        r();
      };s2.onerror=r;document.head.appendChild(s2);
    };s1.onerror=r;document.head.appendChild(s1);
  });
}
async function loadClient(cid){
  await initFB();
  try{
    const d=await db.collection('crm').doc('clients').get();
    if(d.exists){
      const list=d.data().list||[];
      const c=list.find(c=>c.id===cid);
      if(c)return{...c,editors:Array.isArray(c.editors)?c.editors:[],services:Array.isArray(c.services)?c.services:[]};
    }
  }catch(e){console.warn(e);}
  return null;
}
async function saveClientData(){
  if(!db||!client)return;
  try{
    const d=await db.collection('crm').doc('clients').get();
    if(d.exists){
      const list=d.data().list||[];
      const idx=list.findIndex(c=>c.id===client.id);
      if(idx>=0){list[idx]=client;await db.collection('crm').doc('clients').set({list,updatedAt:new Date().toISOString()});}
    }
  }catch(e){console.warn(e);}
}
async function loadPayments(){
  try{
    const d=await db.collection('crm').doc('payments').get();
    if(d.exists)return d.data();
  }catch(e){}
  return{list:[],cobros:[]};
}
function listenRealtime(){
  if(!db||!client)return;
  db.collection('crm').doc('clients').onSnapshot(snap=>{
    if(snap&&snap.exists){
      const list=snap.data().list||[];
      const updated=list.find(c=>c.id===client.id);
      if(updated){
        client={...updated,editors:Array.isArray(updated.editors)?updated.editors:[],services:Array.isArray(updated.services)?updated.services:[]};
        // Refresh current tab
        const activeTab=document.querySelector('.nav-tab.on')?.id?.replace('nt-','');
        if(activeTab)renderTab(activeTab);
      }
    }
  });
}

function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});}
function monthKey(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}
function monthLabel(k){if(!k)return'';const[y,m]=k.split('-');return MONTHS[parseInt(m)-1]+' '+y;}
function ini(n){return(n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}

function showTab(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-'+name)?.classList.add('on');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('nt-'+name)?.classList.add('on');
  renderTab(name);
}
function renderTab(name){
  if(name==='inicio')renderInicio();
  if(name==='calendario')renderCalendario();
  if(name==='reels')renderReels();
  if(name==='contrato')renderContrato();
  if(name==='modif')renderModif();
  if(name==='crecimiento')renderCrecimiento();
  if(name==='chat')renderChat();
  if(name==='ideas')renderIdeas();
  if(name==='ajustes')renderAjustes();
}

        <div style="font-size:12px;color:var(--tx3)">${idea.date} · ${idea.month}</div>
        <div style="font-size:13px">${idea.text}</div>
        ${idea.days?`<div style="font-size:12px;color:var(--c)">📅 ${idea.days}</div>`:''}
      </div>`).join('')}
    </div>`:''}`;

}

async function sendIdeas(){
  const text=document.getElementById('idea-text')?.value.trim();
  const days=document.getElementById('idea-days')?.value.trim();
  const ref=document.getElementById('idea-ref')?.value.trim();
  if(!text&&!days)return showToast(t('Escribe alguna idea o disponibilidad','Write an idea or availability'),'ok');
  const nowD=new Date();
  const nextM=new Date(nowD.getFullYear(),nowD.getMonth()+1,1);
  const nextMLabel=(['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'])[nextM.getMonth()];
  if(!client.ideas)client.ideas=[];
  client.ideas.push({text:text||'',days:days||'',ref:ref||'',month:nextMLabel,date:new Date().toLocaleDateString('es-ES')});
  await saveClientData();
  // Notify team
  let notif=`💡 ${client.name} tiene ideas para ${nextMLabel}`;
  if(text)notif+=`\n📝 "${text}"`;
  if(days)notif+=`\n📅 Días disponibles: ${days}`;
  if(ref)notif+=`\n🔗 Referencia: ${ref}`;
  await notifyTeam(notif);
  renderIdeas();
  showToast(t('¡Ideas enviadas al equipo! 🚀','Ideas sent to the team! 🚀'),'ok');
}

function renderInicio(){
  const mk=monthKey();

  const ed=reels.filter(r=>r.editado&&!r.subido).length;
  const gr=reels.filter(r=>r.grabado&&!r.editado).length;
  const pe=reels.filter(r=>!r.grabado).length;
  const nextGrab=reels.filter(r=>!r.grabado&&r.fechaGrab).sort((a,b)=>a.fechaGrab.localeCompare(b.fechaGrab))[0];
  const nextEdit=reels.filter(r=>r.grabado&&!r.subido&&r.fechaEdit).sort((a,b)=>a.fechaEdit.localeCompare(b.fechaEdit))[0];
  const allReels=Object.values(client.reels||{}).flat();
  const totalPub=allReels.filter(r=>r.subido).length;
  const months=Object.keys(client.reels||{}).length;

  let html=`
    <div style="margin-bottom:20px">
      <div style="font-size:22px;font-weight:600">'+tx('hola')+', ${client.name} 👋</div>
      <div style="font-size:14px;color:var(--tx3);margin-top:4px">${monthLabel(mk)}</div>
    </div>`;

  // Alertas
  if(nextGrab){
    const diff=Math.ceil((new Date(nextGrab.fechaGrab+'T12:00:00')-new Date())/864e5);
    if(diff<=3&&diff>=0)html+=`<div class="alert alert-warn"><i class="ti ti-calendar-event" style="font-size:18px"></i><div><div style="font-weight:600">'+tx('grabProxima')+'</div><div style="font-size:12px">${nextGrab.label} — ${fmtDate(nextGrab.fechaGrab)}</div></div></div>`;
  }
  if(nextEdit){
    const diff=Math.ceil((new Date(nextEdit.fechaEdit+'T12:00:00')-new Date())/864e5);
    if(diff<=2&&diff>=0)html+=`<div class="alert alert-info"><i class="ti ti-video" style="font-size:18px"></i><div><div style="font-weight:600">'+tx('reelProxListo')+'</div><div style="font-size:12px">${nextEdit.label} — ${fmtDate(nextEdit.fechaEdit)}</div></div></div>`;
  }
  if(sub>0)html+=`<div class="alert alert-ok"><i class="ti ti-check-circle" style="font-size:18px"></i><div><div style="font-weight:600">${sub} reel${sub>1?'s':''} publicado${sub>1?'s':''}  este mes</div><div style="font-size:12px">${sub}/${reels.length} en total</div></div></div>`;

  // Stats
  html+=`<div class="stat-grid">
    <div class="stat"><div class="stat-v" style="color:#4ADE80">${sub}/${reels.length}</div><div class="stat-l">✅ '+tx('publicados')+'</div></div>
    <div class="stat"><div class="stat-v" style="color:#C084FC">${ed}</div><div class="stat-l">✂️ ${tx('enEdicion')}</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--warn)">${gr}</div><div class="stat-l">🎬 '+tx('grabados')+'</div></div>
    <div class="stat"><div class="stat-v" style="color:var(--tx3)">${pe}</div><div class="stat-l">⏳ ${tx('pendientes')}</div></div>
  </div>`;

  // Próximas fechas
  if(nextGrab||nextEdit){
    html+=`<div class="card"><div class="card-t"><i class="ti ti-calendar"></i>Próximas fechas</div>`;
    if(nextGrab)html+=`<div class="pf"><span class="pf-l">📅 Grabación</span><span class="pf-v">${fmtDate(nextGrab.fechaGrab)} · ${nextGrab.label}</span></div>`;
    if(nextEdit)html+=`<div class="pf"><span class="pf-l">🎬 Entrega</span><span class="pf-v">${fmtDate(nextEdit.fechaEdit)} · ${nextEdit.label}</span></div>`;
    html+=`</div>`;
  }

  // Logros
  html+=`<div class="card" style="background:linear-gradient(135deg,var(--bg2),var(--bg3))">
    <div class="card-t"><i class="ti ti-trophy"></i>'+tx('tusLogros')+'</div>
    <div class="stat-grid" style="margin-bottom:0">
      <div class="stat"><div class="stat-v" style="color:#4ADE80">${totalPub}</div><div class="stat-l">📹 '+tx('reelsPublicados')+'</div></div>
      <div class="stat"><div class="stat-v" style="color:var(--c)">${months}</div><div class="stat-l">📅 '+tx('mesesJuntos')+'</div></div>
    </div>
  </div>`;

  // Acciones rápidas
  html+=`<div class="card">
    <div class="card-t"><i class="ti ti-bolt"></i>'+tx('accionesRapidas')+'</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-block" onclick="showTab('reels')"><i class="ti ti-video"></i>'+tx('verMisReels')+'</button>
      <button class="btn btn-block" onclick="openMeetingModal()"><i class="ti ti-calendar-plus"></i>'+tx('agendarReunion')+'</button>
      <button class="btn btn-block" onclick="showTab('chat')"><i class="ti ti-message-2"></i>'+tx('hablarEquipo')+'</button>
      <button class="btn btn-block" onclick="showTab('contrato')"><i class="ti ti-file-text"></i>'+tx('miContrato')+'</button>
    </div>
  </div>`;

  document.getElementById('view-inicio').innerHTML=html;

  // Show ideas notification in last 5 days of month
  const nowD=new Date();
  const lastDay=new Date(nowD.getFullYear(),nowD.getMonth()+1,0).getDate();
  const daysLeft=lastDay-nowD.getDate();
  if(daysLeft<=5){
    const nextM=new Date(nowD.getFullYear(),nowD.getMonth()+1,1);
    const nextMLabel=(lang==='en'?['January','February','March','April','May','June','July','August','September','October','November','December']:MONTHS)[nextM.getMonth()];
    const el=document.getElementById('view-inicio');

      </div>
    </div>`+el.innerHTML;
  }
}

function renderCalendario(){
  const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_L=lang==='en'?MONTHS_EN:MONTHS_ES;
  const now=new Date();const year=now.getFullYear();const month=now.getMonth();
  const events=[];
  Object.entries(client.reels||{}).forEach(([mk,reels])=>{
    (reels||[]).forEach(r=>{
      if(r.fechaGrab)events.push({date:r.fechaGrab,type:'grab',label:t('Grabación: ','Recording: ')+r.label,color:'var(--warn)'});
      if(r.fechaEdit&&!r.subido)events.push({date:r.fechaEdit,type:'edit',label:t('Entrega: ','Delivery: ')+r.label,color:'#C084FC'});
      if(r.subido&&r.fechaEdit)events.push({date:r.fechaEdit,type:'pub',label:t('Publicado: ','Published: ')+r.label,color:'#4ADE80'});
    });
  });
  const first=new Date(year,month,1);const last=new Date(year,month+1,0);
  const startDay=first.getDay()||7;
  const days=lang==='en'?['M','T','W','T','F','S','S']:['L','M','X','J','V','S','D'];
  const todayStr=new Date().toISOString().split('T')[0];
  let html=`<div class="card" style="margin-bottom:14px">
    <div class="card-t"><i class="ti ti-calendar"></i>${MONTHS_L[month]} ${year}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px">
      ${days.map(d=>`<div style="text-align:center;font-size:10px;font-weight:600;color:var(--tx3);padding:4px 0">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px" id="cal-grid">`;
  for(let i=1;i<startDay;i++)html+=`<div style="min-height:36px"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===todayStr;
    const dayEvs=events.filter(e=>e.date===ds);
    const dots=dayEvs.slice(0,3).map(e=>`<div style="width:5px;height:5px;border-radius:50%;background:${e.color};flex-shrink:0"></div>`).join('');
    html+=`<div onclick="showDayEvents('${ds}')" style="min-height:36px;background:${isToday?'var(--cdim)':'var(--bg3)'};border:1px solid ${isToday?'var(--c)':'var(--bd)'};border-radius:6px;padding:4px;cursor:${dayEvs.length?'pointer':'default'};transition:all .15s${dayEvs.length?';hover:background:var(--bg4)':''}">
      <div style="font-weight:600;font-size:11px;color:${isToday?'var(--c)':'var(--tx3)'};margin-bottom:3px">${d}</div>
      <div style="display:flex;flex-wrap:wrap;gap:2px">${dots}</div>
    </div>`;
  }
  html+=`</div></div>
  <div id="day-detail"></div>`;
  const upcoming=events.filter(e=>e.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
  html+=`<div class="card">
    <div class="card-t"><i class="ti ti-clock"></i>${tx('proximasFechas')}</div>
    ${upcoming.length?upcoming.map(e=>`<div class="pf">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:${e.color};flex-shrink:0"></div>
        <span style="font-size:13px">${e.label}</span>
      </div>
      <span style="font-size:12px;color:var(--tx3);white-space:nowrap">${fmtDate(e.date)}</span>
    </div>`).join(''):`<div style="text-align:center;padding:20px;color:var(--tx3);font-size:13px">${tx('sinFechas')}</div>`}
  </div>`;
  document.getElementById('view-calendario').innerHTML=html;
}

function showDayEvents(dateStr){
  const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const events=[];
  Object.entries(client.reels||{}).forEach(([mk,reels])=>{
    (reels||[]).forEach(r=>{
      if(r.fechaGrab===dateStr)events.push({label:t('Grabación: ','Recording: ')+r.label,color:'var(--warn)',icon:'ti-camera'});
      if(r.fechaEdit===dateStr&&!r.subido)events.push({label:t('Entrega: ','Delivery: ')+r.label,color:'#C084FC',icon:'ti-video'});
      if(r.subido&&r.fechaEdit===dateStr)events.push({label:t('Publicado: ','Published: ')+r.label,color:'#4ADE80',icon:'ti-check'});
    });
  });
  const el=document.getElementById('day-detail');
  if(!events.length){if(el)el.innerHTML='';return;}
  const[y,m,d]=dateStr.split('-');
  const label=parseInt(d)+' de '+(MONTHS_ES[parseInt(m)-1]);
  if(el)el.innerHTML=`<div class="card" style="border-left:3px solid var(--c);margin-bottom:14px">
    <div class="card-t"><i class="ti ti-calendar-event"></i>${label}</div>
    ${events.map(e=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)">
      <i class="ti ${e.icon}" style="color:${e.color};font-size:16px;flex-shrink:0"></i>
      <span style="font-size:13px;font-weight:500;color:${e.color}">${e.label}</span>
    </div>`).join('')}
  </div>`;
  el.scrollIntoView({behavior:'smooth'});
}

function renderReels(){

  const reels=client.reels[activeMonth]||[];

  const ed=reels.filter(r=>r.editado&&!r.subido).length;
  const gr=reels.filter(r=>r.grabado&&!r.editado).length;

  const hasStories=!!client.includeStories;

    ${months.map(m=>`<button class="mbtn${m===activeMonth?' on':''}" onclick="setActiveMonth('${m}')">${monthLabel(m)}</button>`).join('')}

      <div style="display:flex;flex-direction:column;gap:8px">
        ${drive.reelsEdit?`<a href="${drive.reelsEdit}" target="_blank" class="btn" style="text-decoration:none;justify-content:flex-start"><i class="ti ti-video" style="color:var(--c)"></i>Reels editados</a>`:''}

        ${client.driveMain?`<a href="${client.driveMain}" target="_blank" class="btn" style="text-decoration:none;justify-content:flex-start"><i class="ti ti-folder" style="color:var(--c)"></i>Carpeta principal</a>`:''}
      </div>
    </div>`;
  }

  html+=`<div class="card" style="margin-bottom:14px">
    <div class="card-t"><i class="ti ti-brand-instagram"></i>Reels Instagram — ${monthLabel(activeMonth)}</div>
    ${reels.length?reels.map(r=>{
      let estado='⏳ Pendiente';let color='var(--tx3)';

      else if(r.editado){estado='👁 En revisión';color='#C084FC';}
      else if(r.grabado){estado='✂️ Editándose';color='var(--warn)';}
      return`<div class="reel-row">
        <div>
          <div style="font-size:13px;font-weight:500">${r.label}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:2px">
            ${r.editor?'Editor: '+r.editor:''}
            ${r.fechaGrab&&!r.grabado?' · Grabación: '+fmtDate(r.fechaGrab):''}
            ${r.fechaEdit&&!r.subido?' · Entrega: '+fmtDate(r.fechaEdit):''}
          </div>
        </div>
        <span style="font-size:11px;font-weight:600;color:${color};white-space:nowrap">${estado}</span>
      </div>`;
    }).join(''):`<div style="text-align:center;padding:20px;color:var(--tx3)">'+tx('sinReelsMes')+'</div>`}
  </div>`;

  if(hasTiktok){
    const tiktoks=(client.tiktoks||{})[activeMonth]||[];
    html+=`<div class="card" style="margin-bottom:14px">
      <div class="card-t"><i class="ti ti-brand-tiktok"></i>TikTok — ${monthLabel(activeMonth)}</div>
      ${tiktoks.length?tiktoks.map(r=>{
        let estado='⏳ Pendiente';let color='var(--tx3)';
        if(r.subido){estado='✅ Publicado';color='#4ADE80';}
        else if(r.editado){estado='✂️ En edición';color='var(--warn)';}
        return`<div class="reel-row"><div><div style="font-size:13px;font-weight:500">${r.label}</div></div><span style="font-size:11px;font-weight:600;color:${color}">${estado}</span></div>`;
      }).join(''):`<div style="text-align:center;padding:16px;color:var(--tx3);font-size:13px">${t('El equipo añadirá el contenido de TikTok aquí pronto 🎵','The team will add your TikTok content here soon 🎵')}</div>`}
    </div>`;
  }

  if(hasStories){
    const stories=(client.stories||{})[activeMonth]||[];
    html+=`<div class="card" style="margin-bottom:14px">
      <div class="card-t"><i class="ti ti-circle-plus"></i>Historias — ${monthLabel(activeMonth)}</div>

    {label:'Edición',done:reels.some(r=>r.editado)},
    {label:'Publicación',done:reels.some(r=>r.subido)},
  ];
  const activeIdx=steps.findIndex(s=>!s.done);
  steps.forEach((s,i)=>{
    const isActive=i===activeIdx;
    html+=`<div class="tl-item">
      <div class="tl-dot ${s.done?'done':isActive?'active':''}"></div>
      <div class="tl-title" style="color:${s.done?'var(--tx3)':isActive?'var(--c)':'var(--tx2)'}">${s.label}</div>

    </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('view-reels').innerHTML=html;
}

      <div class="pf"><span class="pf-l">${tx('mesesRestantes')}</span><span class="pf-v">${leftMonths} ${t('meses','months')}</span></div>
      <div class="pf"><span class="pf-l">${tx('totalRestante')}</span><span class="pf-v" style="font-weight:600">${leftTotal.toLocaleString('es')}€</span></div>

        <div style="font-size:11px;color:var(--tx3);margin-bottom:4px">${t('Progreso del contrato','Contract progress')}</div>
        <div style="height:6px;background:var(--bd);border-radius:4px;overflow:hidden">
          <div style="height:100%;background:var(--c);width:${Math.min(100,Math.round(doneMonths/totalMonths*100))}%;border-radius:4px;transition:width .3s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-top:3px">
          <span>${fmtDate(client.contractStart)}</span><span>${fmtDate(client.contractEnd)}</span>
        </div>
      </div>
    </div>`;
  }

  // FAQ
  const faqData=FAQ[lang]||FAQ.es;
  html+=`<div class="card">
    <div class="card-t"><i class="ti ti-help-circle"></i>${t('Preguntas frecuentes','FAQ')}</div>
    ${faqData.map((f,i)=>`<div class="faq-item">
      <div class="faq-q" onclick="toggleFAQ(${i})">

      </div>
      <div class="faq-a" id="faq-a-${i}">${f.a}</div>
    </div>`).join('')}
  </div>`;

  document.getElementById('view-contrato').innerHTML=html;
}
function toggleFAQ(i){

async function submitRating(){

async function sendMsg(){
  const inp=document.getElementById('chat-inp');if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';
  const sugg=document.getElementById('chat-sugg');if(sugg)sugg.innerHTML='';
  chatMsgs.push({from:'client',text:txt,time:new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})});
  client.msgs=chatMsgs;
  renderChatMsgs();
  // Typing
  const msgs=document.getElementById('chat-msgs');

    const t=document.getElementById('typing');if(t)t.remove();

    await saveClientData();

function getBotResponse(txt){
  const tl=txt.toLowerCase();
  const mk=monthKey();
  const reels=client.reels?.[mk]||[];
  const drive=client.drive||{};
  const allMonthKeys=Object.keys(client.reels||{}).sort();

  // IDENTIDAD
  if(tl.includes('quién eres')||tl.includes('quien eres')||tl.includes('qué eres')||tl.includes('como te llamas')||tl.includes('cómo te llamas')){
    return`Soy el asistente virtual de **Mentedoras** 🤖✨ Creado con la inteligencia de Adri y Alan para ayudarte con todo lo relacionado con tu contenido. ¿En qué puedo ayudarte?`;
  }
  // CONFIDENCIAL
  if(tl.includes('cuántos clientes')||tl.includes('otros clientes')||tl.includes('cuánto cobráis')||tl.includes('el equipo tiene')||tl.includes('cuántas personas')||tl.includes('herramienta')||tl.includes('qué sistema')){
    return`Eso es información interna que no puedo compartir 😊 Pero si tienes alguna duda sobre tu proyecto, estoy aquí para ayudarte.`;
  }
  // EJEMPLOS DE TRABAJO

  }
  // SALUDOS
  if(tl.includes('hola')||tl.includes('buenos')||tl.includes('buenas')||tl==='hi'||tl==='hey'||txt.length<6){
    const h=new Date().getHours();
    return`${h<13?'¡Buenos días':'¡Buenas'}, ${client.name}! 👋 Soy tu asistente de Mentedoras. ¿En qué puedo ayudarte hoy?`;
  }
  if(tl.includes('cómo estás')||tl.includes('como estas')||tl.includes('qué tal')||tl.includes('que tal')){
    return`¡Muy bien, gracias! 😄 Aquí trabajando para que tu contenido sea increíble. ¿Y tú? ¿En qué puedo ayudarte?`;
  }
  if(tl.includes('gracias')||tl.includes('perfecto')||tl.includes('genial')||tl.includes('ok gracias')||tl.includes('entendido')){
    return`¡De nada, ${client.name}! 😊 Para eso estamos. ¿Necesitas algo más?`;
  }
  if(tl.includes('adiós')||tl.includes('adios')||tl.includes('hasta luego')||tl.includes('bye')||tl.includes('chao')){
    return`¡Hasta pronto, ${client.name}! 👋 Fue un placer. ¡Seguimos creando contenido increíble! ✨`;
  }
  // HABLAR CON EL EQUIPO
  if(tl.includes('hablar con')||tl.includes('hablar contigo')||tl.includes('hablar con adri')||tl.includes('hablar con alan')||tl.includes('necesito hablar')||tl.includes('quiero hablar')){
    return`Claro, puedes contactar directamente con el equipo por WhatsApp usando los botones que tienes aquí abajo en el Chat 👇 O si prefieres, solicita una reunión con el botón **"Agendar reunión"** desde la sección Inicio y te confirmarán la cita lo antes posible. 📅`;
  }
  // AGENDAR REUNIÓN
  if(tl.includes('reunión')||tl.includes('reunion')||tl.includes('meeting')||tl.includes('llamada')||tl.includes('agendar')||tl.includes('quedar')){
    return`¡Claro! Puedes solicitar una reunión directamente desde el botón **"Agendar reunión"** en la sección Inicio 📅 O dime la fecha y hora que te va mejor y le avisaré al equipo ahora mismo.`;
  }
  // GRABACIÓN - preguntar mes si hay varios
  if(tl.includes('grab')||tl.includes('cuando grabo')||tl.includes('cuándo grabo')||tl.includes('sesión')||tl.includes('sesion')){
    if(allMonthKeys.length>1&&!allMonthKeys.some(mk=>txt.toLowerCase().includes(monthLabel(mk).toLowerCase().split(' ')[0].toLowerCase()))){
      return`📅 ¿De qué mes me hablas? Tengo datos de: **${allMonthKeys.map(m=>monthLabel(m)).join(', ')}**. Dime el mes y te digo la fecha exacta.`;
    }
    const next=reels.filter(r=>!r.grabado&&r.fechaGrab).sort((a,b)=>a.fechaGrab.localeCompare(b.fechaGrab))[0];
    if(next){
      const diff=Math.ceil((new Date(next.fechaGrab+'T12:00:00')-new Date())/864e5);
      return`📅 Tu próxima grabación es el **${fmtDate(next.fechaGrab)}** (${next.label}) — ${diff<=0?'¡muy pronto!':diff===1?'¡mañana!':diff+' días'} 🎬${drive.pictures?`

📸 ¿Necesitas referencias o looks? [Ver carpeta de fotos](${drive.pictures})`:''}`;
    }
    const yaGrabados=reels.filter(r=>r.grabado).length;
    if(yaGrabados===reels.length&&reels.length>0)return`✅ ¡Todos tus reels de este mes ya están grabados! Ahora están siendo editados. ✂️`;
    return`No hay fecha de grabación confirmada aún. El equipo te lo confirmará en breve. También puedes solicitarla aquí mismo. 📅`;
  }
  // ENTREGA
  if(tl.includes('entrega')||tl.includes('cuando me')||tl.includes('cuándo me')||tl.includes('listo')||tl.includes('lista')||tl.includes('terminado')||tl.includes('termina')){
    const next=reels.filter(r=>r.grabado&&!r.subido&&r.fechaEdit).sort((a,b)=>a.fechaEdit.localeCompare(b.fechaEdit))[0];
    if(next){
      const diff=Math.ceil((new Date(next.fechaEdit+'T12:00:00')-new Date())/864e5);
      return`🎬 La entrega del **${next.label}** está prevista para el **${fmtDate(next.fechaEdit)}** — ${diff<=0?'¡muy pronto!':diff===1?'mañana':diff+' días'}${drive.reelsEdit?`

👀 Cuando esté listo lo verás aquí: [Ver reels editados](${drive.reelsEdit})`:''}`;
    }
    const sub=reels.filter(r=>r.subido).length;
    if(sub===reels.length&&reels.length>0)return`🎉 ¡Todo tu contenido de este mes ya está entregado!${drive.reelsEdit?` [Ver reels](${drive.reelsEdit})`:''}`;
    return`El equipo está trabajando en ello. Te avisaremos en cuanto esté listo.`;
  }
  // REELS / ESTADO - preguntar mes
  if(tl.includes('reel')||tl.includes('vídeo')||tl.includes('video')||tl.includes('contenido')||tl.includes('cómo van')||tl.includes('como van')||tl.includes('estado')){
    if(allMonthKeys.length>1&&!allMonthKeys.some(mk=>txt.toLowerCase().includes(monthLabel(mk).toLowerCase().split(' ')[0].toLowerCase()))){
      return`🎬 ¿De qué mes quieres saber? Tengo datos de: **${allMonthKeys.map(m=>monthLabel(m)).join(', ')}**. Dime el mes y te doy todos los detalles.`;
    }
    const sub=reels.filter(r=>r.subido).length;
    const ed=reels.filter(r=>r.editado&&!r.subido).length;
    const gr=reels.filter(r=>r.grabado&&!r.editado).length;
    const pe=reels.filter(r=>!r.grabado).length;
    let resp=`📊 **Resumen de ${monthLabel(mk)}:**
✅ ${sub}/${reels.length} publicados
✂️ ${ed} en edición
🎬 ${gr} grabados
⏳ ${pe} pendientes`;
    if(drive.reelsEdit)resp+=`

👀 [Ver reels editados](${drive.reelsEdit})`;
    return resp;
  }
  // MES ESPECÍFICO
  const mentionedMonth=allMonthKeys.find(mk=>txt.toLowerCase().includes(monthLabel(mk).toLowerCase().split(' ')[0].toLowerCase()));
  if(mentionedMonth){
    const mr=client.reels[mentionedMonth]||[];
    const sub=mr.filter(r=>r.subido).length;const ed=mr.filter(r=>r.editado&&!r.subido).length;const gr=mr.filter(r=>r.grabado&&!r.editado).length;const pe=mr.filter(r=>!r.grabado).length;
    return`📊 **${monthLabel(mentionedMonth)}:**
✅ ${sub}/${mr.length} publicados
✂️ ${ed} en edición
🎬 ${gr} grabados
⏳ ${pe} pendientes${drive.reelsEdit?`

[Ver reels](${drive.reelsEdit})`:''}`;
  }
  // VER / DRIVE
  if(tl.includes('ver')||tl.includes('enlace')||tl.includes('link')||tl.includes('drive')||tl.includes('carpeta')){
    if(tl.includes('guion')||tl.includes('script'))return drive.scripts?`📝 [Ver mis guiones](${drive.scripts})`:`Los guiones se comparten antes de cada grabación.`;
    if(tl.includes('foto'))return drive.pictures?`📸 [Ver mis fotos](${drive.pictures})`:`No hay carpeta de fotos configurada aún.`;
    if(drive.reelsEdit)return`✂️ [Ver reels editados](${drive.reelsEdit})${client.driveMain?`
📁 [Ver carpeta completa](${client.driveMain})`:''}`;
    if(client.driveMain)return`📁 [Ver mi carpeta completa](${client.driveMain})`;
    return`No tenemos los links de Drive configurados aún. Escríbele al equipo y lo añaden.`;
  }
  // EDITOR
  if(tl.includes('editor')||tl.includes('quién edita')||tl.includes('quien edita')){
    if(client.editors?.length)return`✂️ Tu${client.editors.length>1?'s editors son':'editor es'} **${client.editors.join(' y ')}**. Son quienes dan vida a tu contenido 🎬`;
    return`El editor será asignado próximamente.`;
  }
  // CONTRATO
  if(tl.includes('contrato')||tl.includes('meses')||tl.includes('queda')||tl.includes('vence')||tl.includes('cuánto tiempo')||tl.includes('cuanto tiempo')){
    if(client.contractEnd){
      const diff=Math.max(0,Math.ceil((new Date(client.contractEnd+'T12:00:00')-new Date())/864e5/30));
      const total=client.price?client.price*diff:0;
      let resp=`📄 **Tu contrato:**
`;
      if(client.contractStart)resp+=`📅 Inicio: **${fmtDate(client.contractStart)}**
`;
      resp+=`📅 Fin: **${fmtDate(client.contractEnd)}**
`;
      resp+=`⏳ Te quedan **${diff} mes${diff!==1?'es':''}**
`;
      if(client.price)resp+=`💰 Mensualidad: **${client.price}€**
`;
      if(total)resp+=`💳 Total restante: **${total.toLocaleString('es')}€**`;
      const svcs=(client.services||[]).map(id=>SERVICES.find(s=>s.id===id)?.label).filter(Boolean);
      if(svcs.length)resp+='\n\n📋 Servicios:\n'+svcs.map(s=>'• '+s).join('\n');
      if(svcs.length)resp+=(client.contractNotes?'\n\n📝 Detalle: '+client.contractNotes:'');
      return resp;
    }
    return`No tengo datos de tu contrato. Contacta con Adri o Alan para más info.`;
  }
  // FACTURA / PAGO
  if(tl.includes('factura')||tl.includes('pago')||tl.includes('pagado')||tl.includes('precio')||tl.includes('cuánto cuesta')||tl.includes('cuanto cuesta')){
    if(client.price)return`💰 Tu mensualidad es **${client.price}€**. Para ver el estado exacto de tu pago, revisa la sección **Contrato** de tu portal.`;
    return`Para información sobre pagos, contacta con Adri o Alan directamente.`;
  }
  // MODIFICACIONES / CAMBIOS
  if(tl.includes('cambio')||tl.includes('modificar')||tl.includes('no me gusta')||tl.includes('corregir')||tl.includes('corrección')||tl.includes('modificación')){
    return`¡Sin problema! Puedes solicitar cambios desde la sección **Modificaciones** de tu portal 📝 Describe qué quieres cambiar y el equipo lo gestiona lo antes posible. También puedes escribirlo aquí y lo anoto para el equipo.`;
  }
  // PAUSAR / CANCELAR
  if(tl.includes('pausar')||tl.includes('parar')||tl.includes('cancelar')||tl.includes('darme de baja')){
    notifyTeam(`⚠️ ${client.name} pregunta sobre pausar/cancelar el servicio`);
    return`Entiendo. Para gestionar cualquier cambio en tu contrato necesitas hablar directamente con Adri o Alan, ya que es una decisión importante 💼 Les acabo de avisar para que se pongan en contacto contigo lo antes posible.`;
  }
  // MÁS REELS / AMPLIAR
  if(tl.includes('más reels')||tl.includes('mas reels')||tl.includes('ampliar')||tl.includes('añadir más')||tl.includes('aumentar')){
    notifyTeam(`💡 ${client.name} pregunta por ampliar el número de reels`);
    return`¡Qué buena noticia que quieras más contenido! 🚀 Le avisaré a Adri y Alan ahora mismo para que os contacten y valoréis las opciones. También puedes escribirles directamente por WhatsApp.`;
  }
  // EMPEZAR / NUEVO CLIENTE
  if(tl.includes('cuándo empezamos')||tl.includes('cuando empezamos')||tl.includes('próximos pasos')||tl.includes('proximos pasos')){
    if(client.contractStart){
      return`📅 Empezasteis el **${fmtDate(client.contractStart)}**. Las primeras dos semanas las usamos para el análisis de competencia y estrategia, y a partir de ahí empieza la producción de contenido. ¿Tienes alguna duda sobre el proceso?`;
    }
    return`Los primeros pasos son: firma del contrato → 2 semanas de análisis y estrategia → primera sesión de grabación. El equipo te guiará en cada paso. ¿Tienes alguna pregunta específica?`;
  }
  // TIKTOK
  if(tl.includes('tiktok')||tl.includes('tik tok')){
    if(client.tiktokUrl)return`🎵 Tu perfil de TikTok: [${client.tiktokUrl}](${client.tiktokUrl})

El estado de tu contenido de TikTok lo puedes ver en la sección **Reels** de tu portal.`;
    return`Para gestionar TikTok como canal adicional, habla con Adri o Alan sobre incluirlo en tu contrato. 🎵`;
  }
  // INSTAGRAM
  if(tl.includes('instagram')||tl.includes('ig')||tl.includes('insta')){
    if(client.igUrl)return`📸 Tu perfil de Instagram: [Ver perfil](${client.igUrl})

El estado de tus reels lo puedes ver en la sección **Reels**.`;
    return`Puedes ver el estado de tus reels de Instagram en la sección **Reels** de tu portal. ¿Necesitas algo más?`;
  }
  // ESTRATEGIA
  if(tl.includes('estrategia')||tl.includes('cómo va')||tl.includes('como va')||tl.includes('resultados')||tl.includes('crecimiento')){
    const g=client.growth||{};
    if(g.igNow&&g.igStart){
      const pct=Math.round(((g.igNow-g.igStart)/g.igStart)*100);
      return`📈 **Tu crecimiento con Mentedoras:**
👥 Seguidores: ${g.igStart.toLocaleString('es')} → **${g.igNow.toLocaleString('es')}** (+${pct}%)
${g.avgViews?`👁 Media visitas/reel: **${g.avgViews.toLocaleString('es')}**
`:''}${g.bestReel?`🔥 Mejor reel: ${g.bestReel}
`:''}
Puedes ver todos los detalles en la sección **Crecimiento** de tu portal 📊`;
    }
    return`Puedes ver tus estadísticas de crecimiento en la sección **Crecimiento** de tu portal 📊 El equipo las actualiza regularmente.`;
  }
  // GUIONES
  if(tl.includes('guion')||tl.includes('guión')||tl.includes('script')){
    return drive.scripts?`📝 Aquí tienes tus guiones: [Ver guiones](${drive.scripts})

Si quieres hacer cambios antes de grabar, dímelo aquí o usa el apartado de Modificaciones.`:`Tus guiones se preparan antes de cada grabación y te los compartimos para revisión. ¿Tienes alguna duda sobre el contenido?`;
  }
  // SERVICIOS
  if(tl.includes('servicio')||tl.includes('incluye')||tl.includes('qué hace')||tl.includes('que hace')||tl.includes('qué estáis')){
    const svcs=(client.services||[]).map(id=>SERVICES.find(s=>s.id===id)?.label).filter(Boolean);
    if(svcs.length)return '📋 Tus servicios contratados:\n'+svcs.map(s=>'• '+s).join('\n')+(client.contractNotes?'\n\n📝 Además: '+client.contractNotes:'');
    return`Para ver los detalles de tu contrato, revisa la sección **Contrato** de tu portal.`;
  }
  // PROCESO
  if(tl.includes('proceso')||tl.includes('cómo funciona')||tl.includes('como funciona')||tl.includes('cómo trabajáis')){
    return`🎬 **Así funciona el proceso:**
1️⃣ Análisis de tu competencia y nicho
2️⃣ Guionización de tus reels
3️⃣ Tú apruebas los guiones
4️⃣ Sesión de grabación
5️⃣ Edición del contenido
6️⃣ Revisión y modificaciones si las hay
7️⃣ Publicación en tus redes

Puedes ver en qué paso está tu contenido en la sección **Reels** 👀`;
  }
  // NO SABE → tarjeta automática
  notifyTeam(`${client.name} pregunta: "${txt}"`);
  return`Esa pregunta me la anoto para consultarla con el equipo 📝 Le avisaré a Adri y Alan ahora mismo y te responderán lo antes posible. También puedes contactarles por WhatsApp si es urgente. 👋`;
}
async function notifyTeam(title){
  if(!db)return;
  try{
    const d=await db.collection('crm').doc('board').get();
    if(d.exists){
      const data=d.data();
      const cols=data.cols||[];
      const adri=cols.find(c=>c.id==='adri');const alan=cols.find(c=>c.id==='alan');
      const task={id:Date.now(),title,client:client.name,date:today(),done:false,labels:[0]};
      if(adri)adri.tasks.unshift({...task});
      if(alan)alan.tasks.unshift({...task,id:Date.now()+1});
      await db.collection('crm').doc('board').set({cols,updatedAt:new Date().toISOString()});
    }
  }catch(e){console.warn(e);}
}

          ${cr.platform}

  </div>

  <div class="card">

    <div class="f"><label>'+tx('nombre')+'</label><input id="u-name" value="${client.name||''}" placeholder="Tu nombre"></div>
    <div class="f"><label>'+tx('tipoNegocio')+'</label><input id="u-type" value="${client.type||''}" placeholder="ej. Restaurante"></div>
    <button class="btn btn-p btn-block" onclick="saveMyData()"><i class="ti ti-check"></i>'+tx('guardarCambios')+'</button>
  </div>

  <div class="card">
    <div class="card-t"><i class="ti ti-palette"></i>'+tx('apariencia')+'</div>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="th-btn th-dark${document.body.className===''?' on':''}" onclick="setTheme('dark')" style="width:30px;height:30px" title="Oscuro"></div>
      <div class="th-btn th-light${document.body.className==='light'?' on':''}" onclick="setTheme('light')" style="width:30px;height:30px" title="Claro"></div>
      <div class="th-btn th-blue${document.body.className==='blue'?' on':''}" onclick="setTheme('blue')" style="width:30px;height:30px" title="Azul"></div>
      <span style="font-size:12px;color:var(--tx3)">'+tx('eligeTema')+'</span>

  document.getElementById('view-ajustes').innerHTML=html;

function togglePass(id){const i=document.getElementById(id);if(i)i.type=i.type==='password'?'text':'password';}
function addCredential(){
  const platform=prompt('Plataforma (ej. TikTok, YouTube...):');if(!platform)return;
  if(!client.credentials)client.credentials=[{platform:'Instagram',user:'',pass:'',notes:''}];
  client.credentials.push({platform,user:'',pass:'',notes:''});
  renderAjustes();
}
function removeCred(i){if(!client.credentials)return;client.credentials.splice(i,1);renderAjustes();}
function updateCred(i,field,val){if(!client.credentials)return;client.credentials[i][field]=val;}
async function saveCredentials(){
  await saveClientData();
  showToast('Credenciales guardadas ✓','ok');
}
async function saveMyData(){
  const name=document.getElementById('u-name')?.value.trim();
  const type=document.getElementById('u-type')?.value.trim();
  if(name)client.name=name;
  if(type)client.type=type;
  await saveClientData();
  document.getElementById('hdr-name').textContent=client.name;
  showToast('Datos guardados ✓','ok');
}

function openMeetingModal(){
  const mc=document.getElementById('modal-c');
  mc.innerHTML=`<div class="modal-t">'+tx('solicitarReunion')+'</div>
    <div class="f"><label>${tx('motivo')}</label><input id="mt-m" placeholder="ej. Revisión de contenido"></div>

async function sendMeeting(){
  const m=document.getElementById('mt-m')?.value.trim();const f=document.getElementById('mt-f')?.value;
  const h=document.getElementById('mt-h')?.value;const n=document.getElementById('mt-n')?.value;
  if(!m||!f)return showToast('Rellena motivo y fecha','ok');
  await notifyTeam(`📅 ${client.name} solicita reunión: "${m}" — ${fmtDate(f)} ${h}${n?' · '+n:''}`);
  closeMo();
  chatMsgs.push({from:'team',text:`✅ Solicitud de reunión recibida. Te confirmamos la cita para el **${fmtDate(f)} a las ${h}** lo antes posible. 📅`,time:new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}),who:'Mentedoras'});
  client.msgs=chatMsgs;
  await saveClientData();
  showTab('chat');
  showToast('Solicitud enviada ✓','ok');
}
function closeMo(){document.getElementById('mo').classList.remove('open');}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===document.getElementById('mo'))closeMo();});

function closeWelcome(){document.getElementById('welcome').classList.remove('open');}

function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(type?' '+type:'');
  setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),3000);
}

loadTheme();
(async()=>{
  // Get client ID from URL params or path
  const params=new URLSearchParams(location.search);
  let cid=params.get('id');
  if(!cid){
    // Try from path like /cliente/greenwash or ?id=greenwash
    const pathMatch=location.pathname.match(/\/cliente\/([^\/]+)/);
    if(pathMatch)cid=pathMatch[1];
  }
  if(!cid){
    // Try from hash
    const hashMatch=location.hash.match(/#\/cliente\/([^\/]+)/);
    if(hashMatch)cid=hashMatch[1];
  }

  document.getElementById('loading').style.display='flex';

  if(!cid){
    document.getElementById('loading').style.display='none';
    document.getElementById('notfound').style.display='flex';
    return;
  }

  const c=await loadClient(cid);
  // Load app config
  try{const d=await db.collection('crm').doc('config').get();if(d.exists)appConfig={...appConfig,...d.data()};}catch(e){}
  // Load saved language
  lang=localStorage.getItem('ml')||'es';
  const lbtn=document.getElementById('lang-btn');
  if(lbtn)lbtn.textContent=lang==='es'?'🇪🇸 ES':'🇬🇧 EN';
  if(!c){
    document.getElementById('loading').style.display='none';
    document.getElementById('notfound').style.display='flex';
    return;
  }

  client=c;
  document.getElementById('loading').style.display='none';
  document.getElementById('app').classList.add('on');
  document.getElementById('hdr-name').textContent=client.name;

  // Set active month
  const months=Object.keys(client.reels||{}).sort();
  activeMonth=months[months.length-1]||monthKey();

  // Render initial tab
  renderInicio();

  // Welcome
  const h=new Date().getHours();
  document.getElementById('w-emoji').textContent=h<13?'☀️':h<20?'👋':'🌙';
  document.getElementById('w-title').textContent=`${h<13?'¡Buenos días':h<20?'¡Buenas tardes':'¡Buenas noches'}, ${client.name}!`;
  document.getElementById('w-sub').textContent='Aquí tienes toda la info de tu contenido 🚀';
  document.getElementById('welcome').classList.add('open');

  // Realtime
  listenRealtime();

  // Service worker
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
})();
